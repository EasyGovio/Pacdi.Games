<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sıra Hatırlama | PACDI Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game-container {
      max-width: 550px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(246,180,95,0.3);
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    .logo { font-size: 1.4rem; font-weight: bold; }
    .logo span { color: #F6B45F; }
    .back-link { color: #F6B45F; text-decoration: none; font-weight: bold; background: #0a1018; padding: 5px 12px; border-radius: 40px; }
    .stats {
      display: flex;
      justify-content: space-between;
      background: #0a1018;
      padding: 10px;
      border-radius: 60px;
      margin: 15px 0;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stats div { background: #1e2a3a; padding: 4px 12px; border-radius: 40px; color: #F6B45F; font-weight: bold; }
    .stats div span { color: #eaf2fb; }
    button {
      background: #F6B45F;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      color: #04162E;
      font-family: inherit;
      margin: 5px;
    }
    .buttons-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 20px;
    }
    .color-btn {
      aspect-ratio: 1;
      border-radius: 30px;
      cursor: pointer;
      opacity: 0.8;
      box-shadow: 0 6px 0 #8b5a2b;
      transition: 0.05s;
    }
    .color-btn.active { opacity: 1; transform: scale(0.97); box-shadow: 0 2px 0 #8b5a2b; }
    .green { background: #2ECC71; }
    .red { background: #E74C3C; }
    .yellow { background: #F6B45F; }
    .blue { background: #3498DB; }
    .message { margin-top: 20px; padding: 8px; background: #0a1018; border-radius: 40px; color: #eaf2fb; font-weight: bold; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="logo">PACDI<span>Games</span></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="stats">
    <div>🎯 Seviye: <span id="level">1</span></div>
    <div>🏆 En Yüksek: <span id="bestScore">—</span></div>
    <button id="startBtn">Başlat</button>
    <button id="resetBtn">Sıfırla</button>
  </div>
  <div class="buttons-panel">
    <div class="color-btn green" data-color="green"></div>
    <div class="color-btn red" data-color="red"></div>
    <div class="color-btn yellow" data-color="yellow"></div>
    <div class="color-btn blue" data-color="blue"></div>
  </div>
  <div class="message" id="message">"Başlat" ile oyuna başla, sırayı tekrarla</div>
</div>

<script>
  (function() {
    var sequence = [], playerTurn = false, currentStep = 0, level = 1;
    var canClick = false, gameActive = true, bestKey = "sequenceBest";
    var colors = ['green','red','yellow','blue'];
    var btnMap = {
      green: document.querySelector('.green'),
      red: document.querySelector('.red'),
      yellow: document.querySelector('.yellow'),
      blue: document.querySelector('.blue')
    };
    function updateBestDisplay() {
      var b = localStorage.getItem(bestKey);
      document.getElementById("bestScore").innerText = b ? b : "—";
    }
    function saveBest() {
      var currentBest = localStorage.getItem(bestKey);
      if(!currentBest || level > parseInt(currentBest)) {
        localStorage.setItem(bestKey, level);
        updateBestDisplay();
      }
    }
    function playSound(color) {
      try {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        var ctx = new AudioContext();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        var freq = color==='green'?523:color==='red'?392:color==='yellow'?440:330;
        osc.frequency.value = freq;
        gain.gain.value = 0.15;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.4);
        osc.stop(ctx.currentTime+0.4);
      } catch(e) {}
    }
    function animateButton(color) {
      var btn = btnMap[color];
      if(!btn) return;
      btn.classList.add('active');
      playSound(color);
      setTimeout(function(){ btn.classList.remove('active'); },300);
    }
    function showSequence() {
      playerTurn = false;
      canClick = false;
      var i=0;
      function showNext() {
        if(i >= sequence.length) {
          playerTurn = true;
          canClick = true;
          document.getElementById("message").innerText = "Şimdi sen tekrarla!";
          return;
        }
        animateButton(sequence[i]);
        i++;
        setTimeout(showNext, 600);
      }
      showNext();
    }
    function addRandomColor() {
      var rand = colors[Math.floor(Math.random()*colors.length)];
      sequence.push(rand);
    }
    function startGame() {
      sequence = [];
      level = 1;
      currentStep = 0;
      playerTurn = false;
      canClick = false;
      document.getElementById("level").innerText = level;
      addRandomColor();
      document.getElementById("message").innerText = "İzle ve hatırla...";
      setTimeout(function(){ showSequence(); },500);
    }
    function nextLevel() {
      level++;
      document.getElementById("level").innerText = level;
      currentStep = 0;
      addRandomColor();
      document.getElementById("message").innerText = "Seviye "+level+"! İzle...";
      setTimeout(function(){ showSequence(); },800);
    }
    function gameOver() {
      document.getElementById("message").innerHTML = "❌ Oyun bitti! Son seviye: "+level+".<br><button onclick='resetGame()'>Tekrar Oyna</button>";
      saveBest();
      playerTurn = false;
      canClick = false;
    }
    function handlePlayerClick(color) {
      if(!playerTurn || !canClick) return;
      if(color === sequence[currentStep]) {
        animateButton(color);
        currentStep++;
        if(currentStep === sequence.length) {
          playerTurn = false;
          canClick = false;
          document.getElementById("message").innerText = "Doğru! Sonraki seviye...";
          setTimeout(function(){ nextLevel(); },1000);
        }
      } else {
        animateButton(color);
        gameOver();
      }
    }
    function resetGame() {
      sequence = [];
      level = 1;
      currentStep = 0;
      playerTurn = false;
      canClick = false;
      document.getElementById("level").innerText = level;
      document.getElementById("message").innerText = "Oyun sıfırlandı. Başlat'a bas.";
      document.getElementById("message").innerHTML = "Oyun sıfırlandı. Başlat'a bas.";
    }
    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    document.querySelectorAll('.color-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var color = this.getAttribute('data-color');
        handlePlayerClick(color);
      });
    });
    resetGame();
    updateBestDisplay();
  })();
</script>
</body>
</html>
