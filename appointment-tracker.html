<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">📅 RANDEVU TAKİBİ</div>
        <div class="top-actions">

        </div>

        </div>
        <div class="input-group">
            <label id="labelDesc">Açıklama</label>
            <textarea id="apptDesc" rows="2" placeholder="Opsiyonel not..."></textarea>
        </div>

    </div>

        <div class="empty-state" id="emptyState">Henüz randevu yok.</div>
    </div>

</div>

<script>
(function() {
    var L = {
        tr: { title:"📅 RANDEVU TAKİBİ", back:"← Geri", name:"Randevu Adı", date:"Tarih", time:"Saat", desc:"Açıklama", save:"💾 Kaydet", empty:"Henüz randevu yok.", past:"Geçmiş", today:"Bugün", upcoming:"Yaklaşan", footer:"PACDI Games · Randevu takibi", nextLang:"de" },
        de: { title:"📅 TERMINVERWALTUNG", back:"← Zurück", name:"Terminname", date:"Datum", time:"Uhrzeit", desc:"Beschreibung", save:"💾 Speichern", empty:"Noch keine Termine.", past:"Vergangen", today:"Heute", upcoming:"Bevorstehend", footer:"PACDI Games · Terminverwaltung", nextLang:"en" },
        en: { title:"📅 APPOINTMENT TRACKER", back:"← Back", name:"Appointment Name", date:"Date", time:"Time", desc:"Description", save:"💾 Save", empty:"No appointments yet.", past:"Past", today:"Today", upcoming:"Upcoming", footer:"PACDI Games · Appointment Tracker", nextLang:"tr" }
    };
    var currentLang = (navigator.language||'en').toLowerCase().indexOf('de')===0 ? 'de' : (navigator.language||'en').toLowerCase().indexOf('tr')===0 ? 'tr' : 'en';
    var appointments = [];

    function loadAppointments() {
        var saved = localStorage.getItem('pacdi_appointments_' + currentLang);
        if (saved) { try { appointments = JSON.parse(saved); } catch(e) { appointments = []; } }
        else appointments = [];
        renderAppointments();
    }

    function saveAppointments() { localStorage.setItem('pacdi_appointments_' + currentLang, JSON.stringify(appointments)); }

    function setLang(lang) {
        currentLang = lang;
        var t = L[lang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('labelName').innerText = t.name;
        document.getElementById('labelDate').innerText = t.date;
        document.getElementById('labelTime').innerText = t.time;
        document.getElementById('labelDesc').innerText = t.desc;
        document.getElementById('saveBtn').innerText = t.save;
        document.getElementById('footerText').innerText = t.footer;
        loadAppointments();
    }

    function addAppointment() {
        var name = document.getElementById('apptName').value.trim();
        var date = document.getElementById('apptDate').value;
        var time = document.getElementById('apptTime').value;
        var desc = document.getElementById('apptDesc').value.trim();
        if (!name || !date) return;
        appointments.push({ name:name, date:date, time:time, desc:desc });
        appointments.sort(function(a, b) { return new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00')); });
        saveAppointments();
        document.getElementById('apptName').value = '';
        document.getElementById('apptDesc').value = '';
        renderAppointments();
    }

    function deleteAppointment(idx) { appointments.splice(idx, 1); saveAppointments(); renderAppointments(); }

    function renderAppointments() {
        var list = document.getElementById('listArea');
        var t = L[currentLang];
        if (appointments.length === 0) { list.innerHTML = '<div class="empty-state">' + t.empty + '</div>'; return; }
        
        var today = new Date().toISOString().split('T')[0];
        list.innerHTML = '';
        
        for (var i = 0; i < appointments.length; i++) {
            var a = appointments[i];
            var item = document.createElement('div');
            var isPast = a.date < today;
            var isToday = a.date === today;
            item.className = 'appt-item' + (isPast ? ' past' : '') + (isToday ? ' today' : '');
            
            var html = '<div class="appt-name">' + a.name + '</div>';
            html += '<div class="appt-date">📅 ' + a.date + (a.time ? ' 🕐 ' + a.time : '') + '</div>';
            if (a.desc) html += '<div class="appt-desc">' + a.desc + '</div>';
            html += '<div class="appt-actions"><button class="del-appt" onclick="window._delAppt('+i+')">✕ Sil</button></div>';
            item.innerHTML = html;
            list.appendChild(item);
        }
    }

    window._delAppt = deleteAppointment;

    document.getElementById('saveBtn').addEventListener('click', addAppointment);
    document.getElementById('langToggle').addEventListener('click', function() { setLang(L[currentLang].nextLang); });
    document.getElementById('apptDate').value = new Date().toISOString().split('T')[0];
    setLang(currentLang);
})();
</script>

<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandalone = ('standalone' in navigator && navigator.standalone);
  var shown = sessionStorage.getItem('pwa-banner-shown');
  if (shown || isInStandalone) return;

  // iOS Safari — manuel yönlendirme
  if (isIOS) {
    setTimeout(function() {
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:14px 16px;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div>' +
            '<div style="color:#F6B45F;font-size:0.82rem;font-weight:700;margin-bottom:4px;">📲 Ana ekrana ekle</div>' +
            '<div style="color:#b0b5bf;font-size:0.75rem;line-height:1.5;">' +
              'Safari'de <strong style="color:#eaf2fb;">&#11015; Paylaş</strong> butonuna bas, ' +
              'ardından <strong style="color:#eaf2fb;">Ana Ekrana Ekle</strong> seçeneğini seç.' +
            '</div>' +
            '<div style="color:#4a6a88;font-size:0.68rem;margin-top:4px;">&#9432; iOS'ta otomatik kurulum desteklenmiyor — bu adım gerekli.</div>' +
          '</div>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" ' +
            'style="background:transparent;border:none;color:#7a9ab8;font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>' +
        '</div>';
      document.body.appendChild(bar);
      sessionStorage.setItem('pwa-banner-shown', '1');
    }, 3000);
    return;
  }

  // Android / Desktop Chrome — otomatik install prompt
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() {
      if (!deferredPrompt) return;
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +
        '</div>';
      document.body.appendChild(bar);
    }, 3000);
  });

  window.installPWA = function() {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    var b = document.getElementById('pwa-banner'); if (b) b.remove();
    sessionStorage.setItem('pwa-banner-shown', '1');
  };
})();
</script>
