<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PeerJS Bağlantı Testi | PACDI Games</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        h3 { color:#F6B45F; margin-bottom:10px; }
        .room-input { width:100%; padding:12px 16px; border-radius:16px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:1rem; text-align:center; outline:none; margin-bottom:10px; }
        .btn { background:#F6B45F; border:none; font-weight:bold; padding:12px 24px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.9rem; margin:6px; }
        .btn.small { padding:8px 16px; font-size:0.8rem; }
        .message { color:#F6B45F; font-size:0.85rem; font-weight:bold; min-height:24px; margin:8px 0; }
        .info { color:#9bb7d4; font-size:0.8rem; margin:8px 0; }
        .info.success { color:#2ECC71; }
        .info.error { color:#E74C3C; }
        .chat-area { background:#1e2a3a; border-radius:16px; padding:12px; max-height:200px; overflow-y:auto; margin:10px 0; text-align:left; }
        .chat-msg { padding:4px 8px; margin:2px 0; border-radius:8px; font-size:0.8rem; }
        .chat-msg.me { background:rgba(52,152,219,0.2); color:#3498DB; }
        .chat-msg.peer { background:rgba(231,76,60,0.2); color:#E74C3C; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">PEERJS BAĞLANTI TESTİ</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>

    <div id="lobbyArea">
        <h3>Odaya Katıl</h3>
        <p style="color:#9bb7d4; font-size:0.8rem; margin-bottom:12px;">
            📋 <strong>Nasıl kullanılır?</strong><br>
            ❶ <strong>"Yeni Oda"</strong> → ID'ni kopyala<br>
            ❷ ID'yi <strong>arkadaşına gönder</strong><br>
            ❸ Arkadaşın ID'yi girip <strong>"Katıl"</strong>a bassın
        </p>
        <button id="createBtn" class="btn">🏠 Yeni Oda (ID Oluştur)</button>
        <div class="info" id="myIdInfo" style="margin:10px 0;"></div>
        <input type="text" id="peerIdInput" class="room-input" placeholder="Arkadaşının ID'sini yapıştır...">
        <button id="connectBtn" class="btn">🚪 Katıl</button>
        <div class="info" id="statusInfo"></div>
    </div>

    <div id="gameArea" class="hidden">
        <h3>💬 Bağlantı Kuruldu!</h3>
        <div class="chat-area" id="chatArea">
            <div style="color:#6c8fb0; text-align:center;">Bağlantı başarılı! Mesaj gönderebilirsiniz.</div>
        </div>
        <div style="display:flex; gap:8px; margin-top:8px;">
            <input type="text" id="msgInput" class="room-input" placeholder="Mesaj yaz..." style="flex:1;">
            <button id="sendBtn" class="btn small">Gönder</button>
        </div>
        <div class="message" id="gameMessage"></div>
    </div>

    <div class="footer">PACDI Games · PeerJS bağlantı testi.</div>
</div>

<script>
    var peer = null;
    var conn = null;
    var myId = '';

    function setStatus(msg, type) {
        var el = document.getElementById('statusInfo');
        el.innerText = msg;
        el.className = 'info ' + (type || '');
    }

    function addChatMessage(text, sender) {
        var chat = document.getElementById('chatArea');
        var msgDiv = document.createElement('div');
        msgDiv.className = 'chat-msg ' + sender;
        msgDiv.innerText = text;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
    }

    function createRoom() {
        if (peer) peer.destroy();
        
        peer = new Peer();
        
        peer.on('open', function(id) {
            myId = id;
            document.getElementById('myIdInfo').innerHTML = '✅ <strong>Senin ID\'n:</strong><br><span style="font-size:1.2rem; color:#F6B45F;">' + id + '</span><br><span style="font-size:0.7rem;">Bu ID\'yi arkadaşına gönder</span>';
        });

        peer.on('connection', function(connection) {
            conn = connection;
            setupConnection();
        });

        peer.on('error', function(err) {
            setStatus('❌ Hata: ' + err.message, 'error');
        });
    }

    function connectToPeer() {
        var peerId = document.getElementById('peerIdInput').value.trim();
        if (!peerId) {
            setStatus('⚠️ Lütfen bir ID girin.', 'error');
            return;
        }

        if (peer) peer.destroy();
        
        peer = new Peer();
        
        peer.on('open', function(id) {
            myId = id;
            conn = peer.connect(peerId);
            setupConnection();
        });

        peer.on('error', function(err) {
            setStatus('❌ Bağlantı hatası: ' + err.message, 'error');
        });
    }

    function setupConnection() {
        conn.on('open', function() {
            document.getElementById('lobbyArea').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('gameMessage').innerText = '✅ Bağlantı kuruldu! Mesajlaşabilirsiniz.';
        });

        conn.on('data', function(data) {
            addChatMessage(data, 'peer');
        });

        conn.on('close', function() {
            document.getElementById('gameMessage').innerText = '🔌 Bağlantı koptu.';
        });

        conn.on('error', function(err) {
            setStatus('❌ Bağlantı hatası: ' + err.message, 'error');
        });
    }

    function sendMessage() {
        var input = document.getElementById('msgInput');
        var text = input.value.trim();
        if (!text || !conn) return;
        
        conn.send(text);
        addChatMessage(text, 'me');
        input.value = '';
    }

    document.getElementById('createBtn').addEventListener('click', function() {
        setStatus('⏳ ID oluşturuluyor...');
        createRoom();
    });

    document.getElementById('connectBtn').addEventListener('click', function() {
        setStatus('⏳ Bağlanıyor...');
        connectToPeer();
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // İlk yüklemede otomatik oda oluştur
    createRoom();
</script>
</body>
</html>
