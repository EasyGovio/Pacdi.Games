<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rente Berater PRO | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:620px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.2rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .question-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; text-align:left; }
        .step-indicator { color:#6c8fb0; font-size:0.7rem; margin-bottom:10px; }
        .question-text { font-size:1rem; font-weight:bold; color:#F6B45F; margin-bottom:16px; }
        .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .opt-btn { background:#1e2a3a; border:2px solid #1ABC9C; border-radius:60px; padding:12px 8px; font-weight:bold; color:#1ABC9C; cursor:pointer; font-size:0.85rem; text-align:center; }
        .opt-btn:active { background:#1ABC9C; color:#04162E; transform:scale(0.96); }
        .result-box { background:#0a1018; border-radius:28px; padding:20px; margin-top:20px; border:2px solid #F6B45F; text-align:left; }
        .result-title { font-size:1.3rem; font-weight:800; color:#F6B45F; margin-bottom:10px; }
        .result-detail { color:#eaf2fb; font-size:0.85rem; line-height:1.6; margin-bottom:12px; }
        .info-badge { background:rgba(246,180,95,0.15); border:1px solid #F6B45F; border-radius:16px; padding:12px; margin:12px 0; font-size:0.78rem; color:#eaf2fb; text-align:left; line-height:1.5; }
        .pdf-btn { display:inline-block; background:#E74C3C; color:white; font-weight:bold; padding:10px 20px; border-radius:40px; font-size:0.85rem; text-decoration:none; margin-top:12px; cursor:pointer; border:none; }
        .warning-box { background:rgba(231,76,60,0.2); border-left:4px solid #E74C3C; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .community-box { background:rgba(46,204,113,0.2); border-left:4px solid #2ECC71; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .back-btn { background:#1e2a3a; border:1px solid #F6B45F; color:#F6B45F; padding:8px 16px; border-radius:40px; cursor:pointer; font-weight:bold; margin-top:10px; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
        @media print { body { background:white; } .game-container { box-shadow:none; border:none; } .back-btn,.lang-selector,.footer { display:none; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">RENTE BERATER PRO</div>
        <a href="index.html" class="back-link" id="backLink">← Zurück</a>
    </div>
    <div class="lang-selector" id="langSelector">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="question-area" id="questionArea">
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>
    </div>
    <div class="footer" id="footerText">PACDI Games · Ihre Rentenberatung in Deutschland</div>
</div>
<script>
(function(){
    var langData = {
        de: {
            title: "RENTE BERATER PRO",
            back: "← Zurück",
            steps: "Schritt {0} von {1}",
            footer: "PACDI Games · Ihre Rentenberatung in Deutschland",
            resultTitle: "Ihre Renten-Empfehlung",
            regelaltersrente: "Regelaltersrente",
            emRente: "Erwerbsminderungsrente (EM-Rente)",
            witwenrente: "Witwen-/Witwerrente",
            schwerbehinderung: "Altersrente für schwerbehinderte Menschen",
            kvdR: "KVdR (Krankenversicherung der Rentner)",
            abzug: "Abschlag: {0}% (pro Monat vorzeitiger Rente 0,3%)",
            keinAbzug: "Kein Abschlag",
            fruehestens: "Frühestmöglicher Rentenbeginn: {0} Jahre",
            regelaltersgrenze: "Regelaltersgrenze: {0} Jahre",
            gdbInfo: "Mit einem GdB von 50 oder mehr können Sie früher und ohne Abschläge in Rente gehen.",
            zurechnungszeitInfo: "Bei der EM-Rente werden Zurechnungszeiten bis zum 67. Lebensjahr berücksichtigt. Die tatsächliche Rente kann höher ausfallen als die Basisberechnung.",
            pdfBtn: "📄 Als PDF speichern / drucken",
            communityTitle: "Gemeinschaftshilfe",
            communityText: "Viele türkische Rentner in Deutschland sind Mitglied in einem Rentnerverein oder einer Gemeinde wie DİTİB. Diese Gemeinschaften bieten oft ehrenamtliche Beratung. Sie sind nicht allein."
        },
        tr: {
            title: "EMEKLİLİK DANIŞMANI PRO",
            back: "← Geri",
            steps: "Adım {0} / {1}",
            footer: "PACDI Games · Almanya emeklilik danışmanınız",
            resultTitle: "Emeklilik Öneriniz",
            regelaltersrente: "Normal Emeklilik (Regelaltersrente)",
            emRente: "Çalışma Gücü Kaybı Emekliliği (EM-Rente)",
            witwenrente: "Dul/Yetim Aylığı",
            schwerbehinderung: "Ağır Engelli Emekliliği",
            kvdR: "Emeklilerin Sağlık Sigortası (KVdR)",
            abzug: "Kesinti: %{0} (erken emeklilikte her ay için %0,3)",
            keinAbzug: "Kesinti yok",
            fruehestens: "En erken emeklilik yaşı: {0}",
            regelaltersgrenze: "Normal emeklilik yaşı: {0}",
            gdbInfo: "GdB 50 ve üzeri engel derecesiyle daha erken ve kesintisiz emekli olabilirsiniz.",
            zurechnungszeitInfo: "EM-Rente hesaplamasında 67 yaşa kadar ekleme süreleri (Zurechnungszeit) dikkate alınır. Gerçek emekli maaşı daha yüksek olabilir.",
            pdfBtn: "📄 PDF olarak kaydet / yazdır",
            communityTitle: "Topluluk Dayanışması",
            communityText: "Almanya'daki birçok Türk emekli, bir emekli derneğine veya DİTİB gibi bir cemaate üyedir. Bu topluluklar gönüllü danışmanlık sunar. Yalnız değilsiniz."
        },
        en: {
            title: "PENSION ADVISOR PRO",
            back: "← Back",
            steps: "Step {0} of {1}",
            footer: "PACDI Games · Your pension advisor in Germany",
            resultTitle: "Your Pension Recommendation",
            regelaltersrente: "Standard Old-Age Pension",
            emRente: "Reduced Earning Capacity Pension",
            witwenrente: "Survivor's Pension",
            schwerbehinderung: "Pension for Severely Disabled",
            kvdR: "Health Insurance for Pensioners",
            abzug: "Deduction: {0}% (0.3% per month of early retirement)",
            keinAbzug: "No deduction",
            fruehestens: "Earliest retirement age: {0}",
            regelaltersgrenze: "Standard retirement age: {0}",
            gdbInfo: "With a GdB of 50 or more, you can retire earlier and without deductions.",
            zurechnungszeitInfo: "For EM-Rente, additional crediting periods (Zurechnungszeit) up to age 67 are included. The actual pension may be higher.",
            pdfBtn: "📄 Save as PDF / Print",
            communityTitle: "Community Support",
            communityText: "Many Turkish retirees in Germany are members of a pensioners' association or a community like DİTİB. These communities offer volunteer advice. You are not alone."
        }
    };
    var currentLang = 'de';
    var currentStep = 0;
    var answers = {};
    var questions = [
        { question:"In welchem Jahr sind Sie geboren?", opts:["Vor 1958","1958–1963","1964 oder später"], key:"geburtsjahr", values:["vor1958","1958-1963","nach1964"] },
        { question:"Sind Sie derzeit berufstätig?", opts:["Ja, vollzeit","Ja, teilzeit","Nein, arbeitslos","Nein, krankgeschrieben"], key:"beschaeftigt", values:["vollzeit","teilzeit","arbeitslos","krank"] },
        { question:"Haben Sie eine gesundheitliche Einschränkung, die Ihre Arbeitsfähigkeit dauerhaft beeinträchtigt?", opts:["Ja, weniger als 3 Stunden täglich","Ja, 3–6 Stunden täglich","Ja, aber mehr als 6 Stunden","Nein"], key:"gesundheit", values:["unter3","3-6","ueber6","nein"] },
        { question:"Haben Sie einen Schwerbehindertenausweis (GdB 50 oder höher)?", opts:["Ja","Nein"], key:"gdb", values:["ja","nein"] },
        { question:"Sind Sie verheiratet oder verwitwet?", opts:["Verheiratet","Verwitwet","Ledig"], key:"familienstand", values:["verheiratet","verwitwet","ledig"] }
    ];
    var totalSteps = questions.length;

    function updateLanguage() {
        var t = langData[currentLang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('backBtn').innerText = t.back;
    }
    function setLanguage(lang) {
        currentLang = lang; updateLanguage();
        var btns = document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
        if(currentStep < totalSteps) renderQuestion(); else renderResult();
    }
    function renderQuestion() {
        var q = questions[currentStep];
        var t = langData[currentLang];
        document.getElementById('stepIndicator').innerText = t.steps.replace('{0}',currentStep+1).replace('{1}',totalSteps);
        document.getElementById('questionText').innerText = q.question;
        var grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
        for(var i=0;i<q.opts.length;i++) {
            var btn = document.createElement('button'); btn.className='opt-btn'; btn.innerText=q.opts[i];
            btn.addEventListener('click', (function(key,value){ return function(){
                answers[key]=value; currentStep++;
                if(key==='gesundheit' && value==='nein') answers['emRente']=false;
                if(key==='familienstand' && value==='verwitwet') answers['witwenrente']=true;
                if(currentStep<totalSteps) renderQuestion(); else renderResult();
            };})(q.key, q.values[i]));
            grid.appendChild(btn);
        }
        document.getElementById('backBtn').style.display = currentStep>0 ? 'inline-block' : 'none';
    }
    function renderResult() {
        var t = langData[currentLang];
        var rentenart = t.regelaltersrente;
        var regelaltersgrenze = 67;
        var fruehestens = 63;
        var abzugProzent = 0;
        var kvdR = false;
        var isGdb = answers.gdb === 'ja';
        var isEM = false;

        if(answers.geburtsjahr === 'vor1958') { regelaltersgrenze = 65; fruehestens = 63; }
        else if(answers.geburtsjahr === '1958-1963') { regelaltersgrenze = 66; fruehestens = 63; }
        else { regelaltersgrenze = 67; fruehestens = 63; }

        if(isGdb) {
            rentenart = t.schwerbehinderung;
            fruehestens = regelaltersgrenze - 5;
            abzugProzent = 0;
        }
        if(answers.gesundheit === 'unter3') { rentenart = t.emRente + " (volle Erwerbsminderung)"; abzugProzent = 0; isEM = true; }
        else if(answers.gesundheit === '3-6') { rentenart = t.emRente + " (teilweise Erwerbsminderung)"; abzugProzent = 0; isEM = true; }
        else if(answers.familienstand === 'verwitwet' && answers.witwenrente && !isGdb && !isEM) { rentenart = t.witwenrente; abzugProzent = 0; }

        if(!isGdb && !isEM && answers.beschaeftigt !== 'krank' && answers.gesundheit === 'nein') {
            var jahreVorzeitig = regelaltersgrenze - fruehestens;
            abzugProzent = jahreVorzeitig * 12 * 0.3;
        }
        if(answers.beschaeftigt === 'vollzeit' || answers.beschaeftigt === 'teilzeit') kvdR = true;

        var html = '<div class="result-box" id="printArea">';
        html += '<div class="result-title">' + t.resultTitle + '</div>';
        html += '<div class="result-detail">';
        html += '● <strong>' + t.regelaltersgrenze.replace('{0}', regelaltersgrenze) + '</strong><br>';
        html += '● <strong>' + t.fruehestens.replace('{0}', fruehestens) + '</strong><br>';
        html += '● Empfohlene Rentenart: <strong>' + rentenart + '</strong><br>';
        html += '● ' + (abzugProzent > 0 ? t.abzug.replace('{0}', abzugProzent.toFixed(1)) : t.keinAbzug) + '<br>';
        if(kvdR) html += '● ' + t.kvdR + ': <strong>Wahrscheinlich berechtigt</strong><br>';
        html += '</div>';
        if(isGdb) html += '<div class="info-badge">✅ ' + t.gdbInfo + '</div>';
        if(isEM) html += '<div class="info-badge">📊 ' + t.zurechnungszeitInfo + '</div>';
        html += '<div class="warning-box"><strong>⚠ Achtung:</strong> Dies ist eine unverbindliche Ersteinschätzung. Für verbindliche Auskünfte wenden Sie sich an die Deutsche Rentenversicherung oder einen Sozialverband.</div>';
        html += '<div class="community-box"><strong>🤝 ' + t.communityTitle + ':</strong><br>' + t.communityText + '</div>';
        html += '<button class="pdf-btn" onclick="window.print()">' + t.pdfBtn + '</button>';
        html += '<button class="back-btn" onclick="resetBerater()">Wiederholen</button>';
        html += '</div>';
        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('backBtn').style.display = 'none';
    }

    window.resetBerater = function() {
        currentStep = 0; answers = {};
        document.getElementById('questionArea').innerHTML = '<div class="step-indicator" id="stepIndicator"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>';
        updateLanguage(); renderQuestion();
    };

    document.getElementById('backBtn').addEventListener('click', function(){ if(currentStep>0){ currentStep--; renderQuestion(); } });
    var langBtns = document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var lang=this.getAttribute('data-lang'); if(lang!==currentLang) setLanguage(lang); });

    setLanguage('de'); renderQuestion();
})();
</script>
</body>
</html>
