<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PACDI Domino | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:600px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .info-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1018; border-radius:40px; padding:7px 16px; margin-bottom:14px; }
        .player-turn { color:#F6B45F; font-weight:bold; font-size:1rem; display:flex; align-items:center; gap:8px; }
        .player-dot { width:16px; height:16px; border-radius:50%; display:inline-block; }
        .player1-dot { background:#3498DB; }
        .player2-dot { background:#E74C3C; }
        .new-btn { background:#F6B45F; border:none; font-weight:bold; padding:5px 14px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.78rem; }
        .board-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; min-height:200px; }
        .board-line { display:flex; flex-wrap:wrap; justify-content:center; gap:4px; margin:10px 0; }
        .board-tile { width:60px; height:30px; border-radius:8px; border:2px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.8rem; cursor:default; }
        .hand-area { background:#0a1018; border-radius:28px; padding:16px; margin-bottom:20px; }
        .hand-title { color:#F6B45F; font-size:0.8rem; margin-bottom:8px; }
        .hand-tiles { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
        .tile { width:64px; height:34px; background:#1e2a3a; border:2px solid rgba(246,180,95,0.3); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.85rem; color:#eaf2fb; cursor:pointer; transition:0.1s; }
        .tile:active { background:#F6B45F; color:#04162E; transform:scale(0.95); }
        .tile.playable { border-color:#2ECC71; }
        .tile.not-playable { opacity:0.3; pointer-events:none; }
        .message { color:#F6B45F; font-size:0.9rem; font-weight:bold; min-height:30px; margin:8px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">DOMINO</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div class="info-bar">
        <div class="player-turn" id="turnDisplay">
            <span class="player-dot player1-dot"></span> Oyuncu 1
        </div>
        <button class="new-btn" onclick="resetGame()">↺ Yeni Oyun</button>
    </div>
    <div class="board-area" id="boardArea">
        <div class="board-line" id="boardLine"></div>
    </div>
    <div class="hand-area">
        <div class="hand-title" id="handTitle">Oyuncu 1'in Taşları</div>
        <div class="hand-tiles" id="handTiles"></div>
    </div>
    <div class="message" id="message">Sıra Oyuncu 1'de</div>
    <div class="footer">PACDI Games · İki kişilik domino, sırayla oynayın.</div>
</div>
<script>
(function(){
    var tiles = [];
    var board = [];
    var players = [[], []];
    var currentPlayer = 0;
    var gameOver = false;
    var allTiles = [];

    function generateTiles() {
        var t = [];
        for(var i=0;i<=6;i++) for(var j=i;j<=6;j++) t.push([i,j]);
        return t;
    }

    function shuffle(a) { for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

    function resetGame() {
        allTiles = generateTiles();
        allTiles = shuffle(allTiles);
        players[0] = allTiles.slice(0,7);
        players[1] = allTiles.slice(7,14);
        board = [];
        currentPlayer = 0;
        gameOver = false;
        document.getElementById('message').innerText = 'Sıra Oyuncu 1\'de';
        updateDisplay();
    }

    function getBoardEnds() {
        if(board.length === 0) return null;
        return { left: board[0][0], right: board[board.length-1][1] };
    }

    function canPlay(tile) {
        var ends = getBoardEnds();
        if(!ends) return true;
        return tile[0] === ends.left || tile[1] === ends.left || tile[0] === ends.right || tile[1] === ends.right;
    }

    function playTile(playerIdx, tileIdx) {
        if(gameOver || playerIdx !== currentPlayer) return;
        var tile = players[playerIdx][tileIdx];
        if(!canPlay(tile)) return;

        players[playerIdx].splice(tileIdx, 1);
        var ends = getBoardEnds();
        if(!ends) {
            board.push([tile[0], tile[1]]);
        } else {
            if(tile[1] === ends.left) board.unshift([tile[1], tile[0]]);
            else if(tile[0] === ends.left) board.unshift([tile[0], tile[1]]);
            else if(tile[0] === ends.right) board.push([tile[0], tile[1]]);
            else if(tile[1] === ends.right) board.push([tile[1], tile[0]]);
        }

        if(players[playerIdx].length === 0) {
            gameOver = true;
            document.getElementById('message').innerText = '🎉 Oyuncu ' + (playerIdx+1) + ' kazandı!';
        } else {
            var nextHasMove = false;
            for(var i=0;i<players[1-playerIdx].length;i++) {
                if(canPlay(players[1-playerIdx][i])) { nextHasMove = true; break; }
            }
            if(!nextHasMove) {
                gameOver = true;
                var sum0 = players[0].reduce(function(a,b){ return a+b[0]+b[1]; }, 0);
                var sum1 = players[1].reduce(function(a,b){ return a+b[0]+b[1]; }, 0);
                if(sum0 < sum1) document.getElementById('message').innerText = '🎉 Oyuncu 1 kazandı!';
                else if(sum1 < sum0) document.getElementById('message').innerText = '🎉 Oyuncu 2 kazandı!';
                else document.getElementById('message').innerText = '🤝 Berabere!';
            }
        }
        currentPlayer = 1 - currentPlayer;
        if(!gameOver) document.getElementById('message').innerText = 'Sıra Oyuncu ' + (currentPlayer+1) + '\'de';
        updateDisplay();
    }

    function updateDisplay() {
        var boardLine = document.getElementById('boardLine');
        boardLine.innerHTML = '';
        for(var i=0;i<board.length;i++) {
            var tile = document.createElement('div');
            tile.className = 'board-tile';
            tile.innerText = board[i][0] + '|' + board[i][1];
            tile.style.background = (i===0 || i===board.length-1) ? 'rgba(46,204,113,0.2)' : 'transparent';
            boardLine.appendChild(tile);
        }

        var handTiles = document.getElementById('handTiles');
        handTiles.innerHTML = '';
        document.getElementById('handTitle').innerText = 'Oyuncu ' + (currentPlayer+1) + '`in Taşları';
        for(var i=0;i<players[currentPlayer].length;i++) {
            var t = document.createElement('div');
            t.className = 'tile';
            t.innerText = players[currentPlayer][i][0] + '|' + players[currentPlayer][i][1];
            if(canPlay(players[currentPlayer][i])) t.classList.add('playable');
            else t.classList.add('not-playable');
            t.addEventListener('click', (function(idx){ return function(){ playTile(currentPlayer, idx); }; })(i));
            handTiles.appendChild(t);
        }

        var turnDot = document.querySelector('.player-dot');
        turnDot.className = 'player-dot ' + (currentPlayer===0 ? 'player1-dot' : 'player2-dot');
        document.getElementById('turnDisplay').innerHTML = '<span class="player-dot ' + (currentPlayer===0 ? 'player1-dot' : 'player2-dot') + '"></span> Oyuncu ' + (currentPlayer+1);
    }

    resetGame();
})();
</script>
</body>
</html>
