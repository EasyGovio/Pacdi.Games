<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deniz Savaşı | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:600px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .info-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1018; border-radius:40px; padding:7px 16px; margin-bottom:14px; }
        .player-turn { color:#F6B45F; font-weight:bold; font-size:0.9rem; }
        .new-btn { background:#F6B45F; border:none; font-weight:bold; padding:5px 14px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.78rem; }
        .phase-info { color:#9bb7d4; font-size:0.8rem; margin:8px 0; }
        .boards-container { display:flex; flex-wrap:wrap; justify-content:center; gap:16px; margin-bottom:16px; }
        .board-panel { display:flex; flex-direction:column; align-items:center; }
        .board-title { color:#F6B45F; font-size:0.8rem; margin-bottom:6px; font-weight:bold; }
        .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:2px; }
        .cell { width:36px; height:36px; background:#1e2a3a; border:1px solid rgba(246,180,95,0.2); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:#eaf2fb; }
        .cell.ship { background:rgba(52,152,219,0.3); }
        .cell.hit { background:#E74C3C; }
        .cell.miss { background:#2c3e50; color:#6c8fb0; }
        .cell.sunk { background:#c0392b; }
        .cell.disabled { pointer-events:none; }
        .message { color:#F6B45F; font-size:0.9rem; font-weight:bold; min-height:24px; margin:4px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">DENİZ SAVAŞI</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div class="info-bar">
        <div class="player-turn" id="turnDisplay">Ateş Sırası: <span style="color:#3498DB">Oyuncu 1</span></div>
        <button class="new-btn" onclick="resetGame()">↺ Yeni Oyun</button>
    </div>
    <div class="phase-info" id="phaseInfo">Gizli yerleştirme tamamlandı. Ateş etme sırası!</div>
    <div class="boards-container">
        <div class="board-panel">
            <div class="board-title" style="color:#3498DB">Oyuncu 1'in Tahtası</div>
            <div class="grid" id="board1"></div>
        </div>
        <div class="board-panel">
            <div class="board-title" style="color:#E74C3C">Oyuncu 2'nin Tahtası</div>
            <div class="grid" id="board2"></div>
        </div>
    </div>
    <div class="message" id="message">Oyuncu 1 ateş ediyor</div>
    <div class="footer">PACDI Games · İki kişilik deniz savaşı.</div>
</div>
<script>
(function(){
    var size = 5;
    var boards = [[], []];
    var shipsLeft = [3, 3]; // her oyuncuda 3 gemi (tek hücreli)
    var currentPlayer = 0;
    var gameOver = false;

    function randomShips() {
        var b = [];
        for(var r=0;r<size;r++) { b[r]=[]; for(var c=0;c<size;c++) b[r][c]=0; }
        var placed=0;
        while(placed<3) {
            var r=Math.floor(Math.random()*size), c=Math.floor(Math.random()*size);
            if(b[r][c]===0) { b[r][c]=1; placed++; }
        }
        return b;
    }

    function initBoards() {
        boards[0] = randomShips();
        boards[1] = randomShips();
    }

    function resetGame() {
        initBoards();
        shipsLeft = [3, 3];
        currentPlayer = 0;
        gameOver = false;
        document.getElementById('message').innerText = 'Oyuncu 1 ateş ediyor';
        document.getElementById('turnDisplay').innerHTML = 'Ateş Sırası: <span style="color:#3498DB">Oyuncu 1</span>';
        document.getElementById('phaseInfo').innerText = 'Rakibin tahtasından bir kare seç, gemileri batır!';
        renderBoth();
    }

    function renderBoth() {
        renderBoard(0, 'board1', true);
        renderBoard(1, 'board2', false);
    }

    function renderBoard(playerIdx, containerId, hideShips) {
        var container = document.getElementById(containerId);
        container.innerHTML = '';
        for(var r=0;r<size;r++) {
            for(var c=0;c<size;c++) {
                var cell = document.createElement('div');
                cell.className = 'cell';
                var val = boards[playerIdx][r][c];
                if(val === 1 && !hideShips) cell.classList.add('ship');
                if(val === 2) cell.classList.add('hit');
                if(val === 3) cell.classList.add('miss');

                // Sadece rakip tahtası tıklanabilir
                if(playerIdx !== currentPlayer && val < 2 && !gameOver) {
                    cell.addEventListener('click', (function(row, col) {
                        return function() { fire(row, col); };
                    })(r, c));
                } else {
                    cell.classList.add('disabled');
                }

                var symbols = ['', '', '💥', '💧'];
                if(val >= 2) cell.innerText = symbols[val];
                container.appendChild(cell);
            }
        }
    }

    function fire(r, c) {
        if(gameOver) return;
        var targetBoard = boards[1 - currentPlayer];
        if(targetBoard[r][c] >= 2) return; // zaten vuruldu

        if(targetBoard[r][c] === 1) {
            targetBoard[r][c] = 2;
            shipsLeft[1 - currentPlayer]--;
            document.getElementById('message').innerText = '🎯 İsabet! Oyuncu ' + (currentPlayer+1) + ' vurdu!';
        } else {
            targetBoard[r][c] = 3;
            document.getElementById('message').innerText = '💧 Karavana! Oyuncu ' + (currentPlayer+1) + ' vuramadı.';
        }

        renderBoth();

        // Kazanma kontrolü
        if(shipsLeft[1 - currentPlayer] === 0) {
            gameOver = true;
            document.getElementById('message').innerText = '🎉 Oyuncu ' + (currentPlayer+1) + ' kazandı! Tüm gemileri batırdı!';
            document.getElementById('turnDisplay').innerHTML = '🏆 Oyun Bitti';
            return;
        }

        // Sıra değişimi
        currentPlayer = 1 - currentPlayer;
        document.getElementById('turnDisplay').innerHTML = 'Ateş Sırası: <span style="color:' + (currentPlayer===0?'#3498DB':'#E74C3C') + '">Oyuncu ' + (currentPlayer+1) + '</span>';
        document.getElementById('message').innerText += ' Sıra Oyuncu ' + (currentPlayer+1) + '\'de.';
    }

    resetGame();
})();
</script>
</body>
</html>
