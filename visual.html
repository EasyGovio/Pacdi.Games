<div class="game-container">
  <div class="header">
    <div class="logo">PACDI<span>Games</span></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="stats">
    <div>🎯 Tur: <span id="round">1</span>/15</div>
    <div>⏱️ Süre: <span id="timer">00:00</span></div>
    <div>🏆 En İyi: <span id="bestScore">—</span></div>
    <button id="resetBtn">Yeniden Başla</button>
  </div>
  <div id="grid" class="grid"></div>
  <div class="message" id="message">Farklı olan nesneyi bul!</div>
</div>

<script>
  (function() {
    var emojis = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮"];
    var currentRound = 1, totalRounds = 15, gridSize = 2;
    var timerSeconds = 0, timerInterval = null, gameActive = true;
    var bestKey = "visualBest";
    var currentDiffIndex = -1;

    function updateBestDisplay() {
      var b = localStorage.getItem(bestKey);
      document.getElementById("bestScore").innerText = b ? b : "—";
    }
    function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
    function startTimer() {
      stopTimer();
      timerInterval = setInterval(function() {
        if(gameActive) {
          timerSeconds++;
          var m = Math.floor(timerSeconds/60), s = timerSeconds%60;
          document.getElementById("timer").innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
        }
      }, 1000);
    }
    function generateGrid() {
      gridSize = Math.min(2 + Math.floor(currentRound/3), 6);
      var total = gridSize * gridSize;
      var commonEmoji = emojis[Math.floor(Math.random()*emojis.length)];
      var differentEmoji;
      do { differentEmoji = emojis[Math.floor(Math.random()*emojis.length)]; } while(differentEmoji === commonEmoji);
      var diffIndex = Math.floor(Math.random()*total);
      var gridArray = [];
      for(var i=0;i<total;i++) gridArray.push(i===diffIndex ? differentEmoji : commonEmoji);
      return { items: gridArray, cols: gridSize, diffIndex: diffIndex };
    }
    function renderGrid() {
      var data = generateGrid();
      var container = document.getElementById("grid");
      container.style.gridTemplateColumns = "repeat("+data.cols+", 1fr)";
      container.style.gap = "10px";
      container.innerHTML = "";
      for(var i=0;i<data.items.length;i++) {
        var cell = document.createElement("div");
        cell.className = "grid-item";
        cell.innerText = data.items[i];
        cell.addEventListener("click", (function(idx) {
          return function() { checkAnswer(idx, data.diffIndex); };
        })(i));
        container.appendChild(cell);
      }
      currentDiffIndex = data.diffIndex;
      return data.diffIndex;
    }
    function checkAnswer(clickedIdx, correctIdx) {
      if(!gameActive) return;
      if(clickedIdx === correctIdx) {
        currentRound++;
        document.getElementById("round").innerText = currentRound;
        if(currentRound > totalRounds) {
          gameActive = false;
          stopTimer();
          var best = localStorage.getItem(bestKey);
          if(!best || timerSeconds < parseInt(best)) {
            localStorage.setItem(bestKey, timerSeconds);
            updateBestDisplay();
            document.getElementById("message").innerHTML = "🎉 TEBRİKLER! YENİ REKOR! Süre: "+timerSeconds+" sn<br><button onclick='resetGame()'>Tekrar Oyna</button>";
          } else {
            document.getElementById("message").innerHTML = "🎉 OYUN TAMAMLANDI! Süre: "+timerSeconds+" sn<br><button onclick='resetGame()'>Tekrar Oyna</button>";
          }
          return;
        }
        renderGrid();
        document.getElementById("message").innerText = "Doğru! Sonraki tur.";
      } else {
        document.getElementById("message").innerText = "Yanlış! Tekrar dene.";
        setTimeout(function(){
          renderGrid();
          document.getElementById("message").innerText = "Farklı olanı bul!";
        }, 800);
      }
    }
    function resetGame() {
      stopTimer();
      timerSeconds = 0;
      currentRound = 1;
      document.getElementById("round").innerText = "1";
      gameActive = true;
      document.getElementById("timer").innerText = "00:00";
      renderGrid();
      startTimer();
    }
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    resetGame();
    updateBestDisplay();
  })();
</script>

<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandalone = ('standalone' in navigator && navigator.standalone);
  var shown = sessionStorage.getItem('pwa-banner-shown');
  if (shown || isInStandalone) return;

  // iOS Safari — manuel yönlendirme
  if (isIOS) {
    setTimeout(function() {
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:14px 16px;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div>' +
            '<div style="color:#F6B45F;font-size:0.82rem;font-weight:700;margin-bottom:4px;">📲 Ana ekrana ekle</div>' +
            '<div style="color:#b0b5bf;font-size:0.75rem;line-height:1.5;">' +
              'Safari'de <strong style="color:#eaf2fb;">&#11015; Paylaş</strong> butonuna bas, ' +
              'ardından <strong style="color:#eaf2fb;">Ana Ekrana Ekle</strong> seçeneğini seç.' +
            '</div>' +
            '<div style="color:#4a6a88;font-size:0.68rem;margin-top:4px;">&#9432; iOS'ta otomatik kurulum desteklenmiyor — bu adım gerekli.</div>' +
          '</div>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" ' +
            'style="background:transparent;border:none;color:#7a9ab8;font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>' +
        '</div>';
      document.body.appendChild(bar);
      sessionStorage.setItem('pwa-banner-shown', '1');
    }, 3000);
    return;
  }

  // Android / Desktop Chrome — otomatik install prompt
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() {
      if (!deferredPrompt) return;
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +
        '</div>';
      document.body.appendChild(bar);
    }, 3000);
  });

  window.installPWA = function() {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    var b = document.getElementById('pwa-banner'); if (b) b.remove();
    sessionStorage.setItem('pwa-banner-shown', '1');
  };
})();
</script>
