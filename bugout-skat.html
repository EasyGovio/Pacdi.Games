<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bugout Skat | PACDI Games</title>
    <script src="https://cdn.jsdelivr.net/npm/bugout@0.0.13/dist/bugout.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:600px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lobby-area, .game-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        h3 { color:#F6B45F; margin-bottom:10px; }
        .room-input { width:100%; padding:12px 16px; border-radius:16px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:1rem; text-align:center; outline:none; margin-bottom:10px; }
        .btn { background:#F6B45F; border:none; font-weight:bold; padding:10px 20px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.85rem; margin:4px; }
        .btn:disabled { opacity:0.3; pointer-events:none; }
        .trump-select { display:flex; justify-content:center; gap:6px; margin:10px 0; flex-wrap:wrap; }
        .trump-btn { background:#1e2a3a; border:2px solid rgba(246,180,95,0.3); color:#eaf2fb; padding:6px 12px; border-radius:20px; cursor:pointer; font-weight:bold; font-size:0.75rem; }
        .trump-btn.active { background:#F6B45F; color:#04162E; }
        .played-cards { display:flex; justify-content:center; gap:20px; min-height:80px; align-items:center; }
        .played-card { width:60px; height:84px; border-radius:10px; background:#fff; border:2px solid #F6B45F; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:0.8rem; font-weight:bold; }
        .played-card.red { color:#E74C3C; }
        .played-card.black { color:#000; }
        .player-hand { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-top:8px; }
        .card { width:52px; height:72px; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:bold; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px solid rgba(246,180,95,0.3); background:#fff; color:#000; transition:0.1s; }
        .card.red { color:#E74C3C; }
        .card.black { color:#000; }
        .card:active { transform:scale(0.95); }
        .score-bar { display:flex; justify-content:space-around; margin:8px 0; }
        .score-box { background:#0a1018; border-radius:20px; padding:8px 16px; font-weight:bold; font-size:0.8rem; }
        .message { color:#F6B45F; font-size:0.8rem; font-weight:bold; min-height:20px; margin:4px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:8px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">BUGOUT SKAT</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div id="lobbyArea" class="lobby-area">
  <h3>Oyun Odasına Katıl</h3>
  <div style="color:#9bb7d4; font-size:0.72rem; margin-bottom:12px; line-height:1.5; text-align:left; background:rgba(246,180,95,0.05); padding:10px; border-radius:12px; border:1px solid rgba(246,180,95,0.15);">
    <strong style="color:#F6B45F;">📋 Nasıl oynanır?</strong><br>
    ❶ Kutuyu boş bırakıp <strong>"Odaya Bağlan"</strong>a bas.<br>
    ❷ Çıkan <strong>kodu arkadaşına</strong> gönder.<br>
    ❸ Arkadaşın kodu girip <strong>"Odaya Bağlan"</strong>a bassın.<br>
    ❹ 🎮 Oyun başlasın!
  </div>
  <input type="text" id="roomIdInput" class="room-input" placeholder="Arkadaşından aldığın kodu buraya yaz...">
  <button id="connectBtn" class="btn">Odaya Bağlan</button>
  <p style="color:#9bb7d4; font-size:0.8rem; margin-top:8px;" id="roomInfo"></p>
</div>
    <div id="gameArea" class="game-area hidden">
        <h3>🃏 Bugout Skat</h3>
        <div class="trump-select" id="trumpSelect">
            <button class="trump-btn" data-trump="kreuz">♣ Kreuz</button>
            <button class="trump-btn" data-trump="pik">♠ Pik</button>
            <button class="trump-btn" data-trump="herz">♥ Herz</button>
            <button class="trump-btn" data-trump="karo">♦ Karo</button>
            <button class="trump-btn" data-trump="grand">👑 Grand</button>
            <button class="trump-btn" data-trump="null">🚫 Null</button>
        </div>
        <div class="played-cards">
            <div class="played-card" id="oppCard">—</div>
            <div class="played-card" id="myCard">—</div>
        </div>
        <div class="player-hand" id="playerHand"></div>
        <div class="score-bar">
            <div class="score-box" style="color:#3498DB">Sen: <span id="scoreMe">0</span></div>
            <div class="score-box" style="color:#E74C3C">Rakip: <span id="scoreOpp">0</span></div>
        </div>
        <div class="message" id="gameMessage">Rakip bekleniyor...</div>
    </div>
    <div class="footer">PACDI Games · Bugout ile uzaktan skat.</div>
</div>
<script>
var bugout, myId, peerId, isHost = false;
var suits = ['kreuz','pik','herz','karo'];
var suitSymbols = { kreuz:'♣', pik:'♠', herz:'♥', karo:'♦' };
var ranks = ['7','8','9','10','Bube','Dame','König','As'];
var rankValues = { '7':0, '8':0, '9':0, '10':10, Bube:2, Dame:3, König:4, As:11 };
var myHand = [], oppHandCount = 10;
var currentTrump = 'kreuz', trumpSelected = false;
var myCard = null, oppCard = null;
var scoreMe = 0, scoreOpp = 0, roundCount = 0, maxRounds = 10;
var myTurn = false, gameOver = false;

function sendMessage(data) { if(bugout && peerId) bugout.send(peerId, JSON.stringify(data)); }

function handleMessage(raw) {
    var msg; try { msg = JSON.parse(raw); } catch(e) { return; }
    if(msg.type === 'init') { myHand = msg.oppHand; oppHandCount = msg.myHand.length; updateDisplay(); myTurn = !isHost; document.getElementById('gameMessage').innerText = myTurn ? 'Koz seç ve kart oyna.' : 'Rakip başlayacak...'; }
    else if(msg.type === 'trump') { currentTrump = msg.trump; trumpSelected = true; updateTrumpButtons(); }
    else if(msg.type === 'play') { oppCard = msg.card; document.getElementById('oppCard').innerHTML = oppCard.rank+suitSymbols[oppCard.suit]; document.getElementById('oppCard').className = 'played-card'+(oppCard.suit==='herz'||oppCard.suit==='karo'?' red':' black'); myTurn = true; updateDisplay(); document.getElementById('gameMessage').innerText = 'Sıra sende! Bir kart oyna.'; }
    else if(msg.type === 'trick') { if(msg.winner === 'me') { scoreMe += msg.points; } else { scoreOpp += msg.points; } document.getElementById('scoreMe').innerText = scoreMe; document.getElementById('scoreOpp').innerText = scoreOpp; myCard = null; oppCard = null; document.getElementById('myCard').innerHTML = '—'; document.getElementById('oppCard').innerHTML = '—'; roundCount++; if(roundCount >= maxRounds || myHand.length === 0) { endGame(); } else { myTurn = msg.next === 'me'; document.getElementById('gameMessage').innerText = myTurn ? 'Yeni el. Koz seç ve oyna.' : 'Rakip oynuyor...'; if(myTurn) { trumpSelected = false; updateTrumpButtons(true); } } updateDisplay(); }
    else if(msg.type === 'gameOver') { gameOver = true; document.getElementById('gameMessage').innerText = msg.winner === 'me' ? '🎉 Sen kazandın!' : '😔 Kaybettin.'; }
}

function initGame() {
    var fullDeck = [];
    for(var s=0; s<suits.length; s++) for(var r=0; r<ranks.length; r++) fullDeck.push({ suit:suits[s], rank:ranks[r], value:rankValues[ranks[r]] });
    fullDeck = shuffle(fullDeck);
    myHand = fullDeck.splice(0, 10);
    var oppHand = fullDeck.splice(0, 10);
    oppHandCount = oppHand.length;
    sendMessage({ type:'init', myHand:myHand, oppHand:oppHand });
}

function shuffle(a) { for(var i=a.length-1; i>0; i--) { var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function selectTrump(trump) { if(myTurn && !trumpSelected) { currentTrump = trump; trumpSelected = true; updateTrumpButtons(); sendMessage({ type:'trump', trump:trump }); document.getElementById('gameMessage').innerText = 'Koz seçildi. Bir kart oyna.'; } }

function playCard(idx) {
    if(!myTurn || !trumpSelected || gameOver) return;
    myCard = myHand.splice(idx, 1)[0];
    document.getElementById('myCard').innerHTML = myCard.rank+suitSymbols[myCard.suit];
    document.getElementById('myCard').className = 'played-card'+(myCard.suit==='herz'||myCard.suit==='karo'?' red':' black');
    myTurn = false;
    sendMessage({ type:'play', card:myCard });
    updateDisplay();
    if(oppCard) resolveTrick();
    else document.getElementById('gameMessage').innerText = 'Rakibin kartını bekle...';
}

function resolveTrick() {
    var myWon = compareCards(myCard, oppCard);
    var points = myCard.value + oppCard.value;
    if(myWon) scoreMe += points; else scoreOpp += points;
    document.getElementById('scoreMe').innerText = scoreMe;
    document.getElementById('scoreOpp').innerText = scoreOpp;
    sendMessage({ type:'trick', winner:myWon?'me':'opp', points:points, next:myWon?'me':'opp' });
    myCard = null; oppCard = null;
    document.getElementById('myCard').innerHTML = '—';
    document.getElementById('oppCard').innerHTML = '—';
    roundCount++;
    if(roundCount >= maxRounds || myHand.length === 0) endGame();
    else { myTurn = myWon; document.getElementById('gameMessage').innerText = myTurn ? 'Yeni el. Koz seç ve oyna.' : 'Rakip oynuyor...'; if(myTurn) { trumpSelected = false; updateTrumpButtons(true); } }
    updateDisplay();
}

function getCardPower(card) {
    if(currentTrump === 'null') return rankValues[card.rank];
    if(currentTrump === 'grand') {
        if(card.rank === 'Bube') return 100 + rankValues[card.rank];
        return rankValues[card.rank];
    }
    if(card.suit === currentTrump || card.rank === 'Bube') return 100 + rankValues[card.rank];
    return rankValues[card.rank];
}

function compareCards(my, opp) {
    var myPow = getCardPower(my), oppPow = getCardPower(opp);
    if(myPow > 100 && oppPow > 100) {
        if(my.rank === 'Bube' && opp.rank !== 'Bube') return true;
        if(opp.rank === 'Bube' && my.rank !== 'Bube') return false;
        if(my.rank === 'Bube' && opp.rank === 'Bube') return rankValues[my.rank] > rankValues[opp.rank];
        if(my.suit === currentTrump && opp.suit !== currentTrump) return true;
        if(opp.suit === currentTrump && my.suit !== currentTrump) return false;
    }
    return myPow > oppPow;
}

function endGame() {
    gameOver = true;
    var winner = scoreMe > scoreOpp ? 'me' : (scoreOpp > scoreMe ? 'opp' : 'draw');
    if(winner === 'me') document.getElementById('gameMessage').innerText = '🎉 Sen kazandın!';
    else if(winner === 'opp') document.getElementById('gameMessage').innerText = '😔 Kaybettin.';
    else document.getElementById('gameMessage').innerText = '🤝 Berabere!';
    sendMessage({ type:'gameOver', winner:winner === 'me' ? 'me' : 'opp' });
}

function updateDisplay() {
    var hand = document.getElementById('playerHand'); hand.innerHTML = '';
    for(var i=0; i<myHand.length; i++) {
        var c = myHand[i];
        var card = document.createElement('div');
        card.className = 'card'+(c.suit==='herz'||c.suit==='karo'?' red':' black');
        card.innerHTML = c.rank+'<br>'+suitSymbols[c.suit];
        card.addEventListener('click', (function(idx){ return function(){ playCard(idx); }; })(i));
        hand.appendChild(card);
    }
}

function updateTrumpButtons(enable) {
    var btns = document.querySelectorAll('.trump-btn');
    for(var i=0; i<btns.length; i++) {
        btns[i].disabled = !enable;
        btns[i].classList.remove('active');
        if(btns[i].getAttribute('data-trump') === currentTrump && trumpSelected) btns[i].classList.add('active');
    }
}

var trumpBtns = document.querySelectorAll('.trump-btn');
for(var i=0; i<trumpBtns.length; i++) trumpBtns[i].addEventListener('click', function(){ selectTrump(this.getAttribute('data-trump')); });

document.getElementById('connectBtn').addEventListener('click', function() {
    var roomId = document.getElementById('roomIdInput').value.trim();
    bugout = roomId ? new Bugout(roomId) : new Bugout();
    bugout.address().then(function(address) {
        myId = address;
        document.getElementById('roomInfo').innerHTML = 'Senin adresin: <b>'+myId+'</b><br>Bu kodu arkadaşına gönder.';
        if(!roomId) isHost = true;
    });
    bugout.on('message', function(address, message) {
        if(!peerId) {
            peerId = address;
            document.getElementById('lobbyArea').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            if(isHost) { initGame(); myTurn = true; document.getElementById('gameMessage').innerText = 'Sıra sende! Koz seç ve kart oyna.'; updateTrumpButtons(true); }
            else document.getElementById('gameMessage').innerText = 'Host bekleniyor...';
        }
        handleMessage(message);
    });
});
</script>
</body>
</html>
