<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Water Sort · Renk Sıralama | PACDI Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 650px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.4);
      border: 1px solid rgba(246,180,95,0.3);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .logo { font-size: 1.5rem; font-weight: bold; color: #F6B45F; }
    .sub { font-size: 0.62rem; color: #9bb7d4; margin-top: 2px; }
    .back-link { color: #F6B45F; text-decoration: none; font-weight: bold; font-size: 0.78rem; background: #0a1018; padding: 5px 12px; border-radius: 40px; }
    .info-bar { display: flex; justify-content: space-between; align-items: center; background: #0a1018; border-radius: 40px; padding: 7px 16px; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
    .info-box span { color: #eaf2fb; }
    .select-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
    .select-item label { font-size: 0.7rem; color: #F6B45F; margin-right: 6px; }
    select { background: #0a1018; border: 1px solid #F6B45F; border-radius: 40px; padding: 6px 12px; color: #F6B45F; font-size: 0.8rem; }
    button { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #04162E; cursor: pointer; font-size: 0.78rem; }
    .tubes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      justify-items: center;
      margin: 20px 0;
    }
    .tube {
      width: 85px;
      background: #0a1018;
      border-radius: 40px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 2px solid #F6B45F40;
      transition: all 0.1s ease;
      min-height: 150px;
    }
    .tube.selected { border: 3px solid #F6B45F; background: rgba(246,180,95,0.1); transform: scale(1.02); }
    .color-unit { width: 100%; height: 24px; border-radius: 20px; transition: transform 0.08s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2); }
    .empty-slot { width: 100%; height: 24px; background: rgba(255,255,255,0.04); border-radius: 20px; border: 1px dashed #F6B45F30; }
    .message { text-align: center; margin-top: 15px; padding: 8px; background: #0a1018; border-radius: 40px; color: #eaf2fb; font-weight: bold; font-size: 0.8rem; }
    .footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 12px; display: flex; justify-content: center; gap: 16px; }
    @media (max-width: 550px) { .tube { width: 70px; } .color-unit, .empty-slot { height: 20px; } .tubes-grid { gap: 10px; } }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div><div class="logo">WATER SORT PRO</div><div class="sub">PACDI Games · Renk Sıralama</div></div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>
  <div class="info-bar">
    <div class="info-box">📌 Hamle: <span id="moveCount">0</span></div>
    <div class="info-box">🏆 En İyi: <span id="bestScore">—</span></div>
    <button id="newGameBtn">↺ Yeni Oyun</button>
  </div>

  <div class="select-group">
    <div class="select-item"><label>🎯 Zorluk:</label><select id="difficultySelect"><option value="easy">Kolay (4 renk)</option><option value="medium" selected>Orta (5 renk)</option><option value="hard">Zor (6 renk)</option></select></div>
  </div>

  <div id="tubesContainer" class="tubes-grid"></div>
  <div class="message" id="gameMsg">Bir tüpe dokun → top seç → başka tüpe taşı</div>
  <div class="footer">
    <span>✔ Aynı renk üst üste</span>
    <span>✨ Boş tüpe her renk</span>
    <span>🏆 Kazanmak için tüm tüpleri tek renk yap</span>
  </div>
</div>

<script>
  (function() {
    // -- RENK PALETİ (6 renk, zorluk seviyesine göre kullanılacak)
    var ALL_COLORS = ["#F6B45F", "#2ECC71", "#E74C3C", "#3498DB", "#9B59B6", "#1ABC9C"];
    var TUBE_CAP = 4;
    var tubes = [];
    var selectedTube = null;
    var moves = 0;
    var bestScore = 0;
    var gameActive = true;
    var bestKey = "watersort_pro_best";

    // DOM elementleri
    var container = document.getElementById('tubesContainer');
    var moveSpan = document.getElementById('moveCount');
    var bestSpan = document.getElementById('bestScore');
    var newGameBtn = document.getElementById('newGameBtn');
    var gameMsgDiv = document.getElementById('gameMsg');
    var difficultySelect = document.getElementById('difficultySelect');

    function loadBest() {
      var saved = localStorage.getItem(bestKey);
      bestScore = saved ? parseInt(saved,10) : 0;
      bestSpan.innerText = bestScore || '—';
    }
    function saveBest() {
      if (moves < bestScore || bestScore === 0) {
        bestScore = moves;
        localStorage.setItem(bestKey, bestScore);
        bestSpan.innerText = bestScore;
      }
    }

    // Zorluğa göre kullanılacak renk sayısı
    function getColorCount() {
      var diff = difficultySelect.value;
      if (diff === 'easy') return 4;
      if (diff === 'medium') return 5;
      return 6;
    }

    // Rastgele ama çözülmesi zor bir başlangıç dizilimi üret
    function generateUnsolvedLayout(colorCount) {
      var colors = ALL_COLORS.slice(0, colorCount);
      var unitsPerColor = 4;
      var totalUnits = colorCount * unitsPerColor;
      var colorPool = [];
      for (var c=0; c<colorCount; c++) {
        for (var q=0; q<unitsPerColor; q++) colorPool.push(colors[c]);
      }
      // Fisher-Yates karıştır
      for (var i=colorPool.length-1; i>0; i--) {
        var j = Math.floor(Math.random()*(i+1));
        var tmp = colorPool[i]; colorPool[i]=colorPool[j]; colorPool[j]=tmp;
      }
      // Tüp sayısı = renk sayısı + 2 (en az 6 tüp, max 8)
      var tubeCount = Math.min(8, colorCount + 2);
      var newTubes = [];
      for (var t=0; t<tubeCount; t++) newTubes.push([]);
      // Dağıtım: rastgele tüplere yerleştir, ancak tüm tüplerin dolmaması için karıştır
      for (var idx=0; idx<colorPool.length; idx++) {
        var placed = false;
        var attempts = 0;
        while (!placed && attempts < 40) {
          var randTube = Math.floor(Math.random() * tubeCount);
          if (newTubes[randTube].length < TUBE_CAP) {
            newTubes[randTube].push(colorPool[idx]);
            placed = true;
          }
          attempts++;
        }
        if (!placed) {
          for (var k=0; k<tubeCount; k++) {
            if (newTubes[k].length < TUBE_CAP) {
              newTubes[k].push(colorPool[idx]);
              break;
            }
          }
        }
      }
      // Boş tüpleri doldurma (en az 2 boş tüp bırak)
      // Mevcut boş tüp sayısını kontrol et
      var emptyCount = 0;
      for (var i=0; i<tubeCount; i++) if (newTubes[i].length===0) emptyCount++;
      if (emptyCount < 2) {
        // ekstra boşluk oluşturmak için rastgele bir dolu tüpten bir topu başka yere taşı (zorluk artır)
        for (var i=0; i<tubeCount && emptyCount<2; i++) {
          if (newTubes[i].length>0 && newTubes[i].length < TUBE_CAP) {
            // zaten kısmen dolu, boş tüpe taşı
            for (var j=0; j<tubeCount; j++) {
              if (newTubes[j].length===0) {
                var ball = newTubes[i].pop();
                newTubes[j].push(ball);
                emptyCount++;
                break;
              }
            }
          }
        }
      }
      return newTubes;
    }

    function initGame() {
      var colorCount = getColorCount();
      var newLayout = generateUnsolvedLayout(colorCount);
      tubes = newLayout;
      selectedTube = null;
      moves = 0;
      gameActive = true;
      moveSpan.innerText = "0";
      renderGame();
      gameMsgDiv.innerHTML = "Bir tüpe dokun → top seç → başka tüpe taşı";
    }

    function renderGame() {
      container.innerHTML = '';
      for (var i=0; i<tubes.length; i++) {
        var tubeData = tubes[i];
        var tubeDiv = document.createElement('div');
        tubeDiv.className = 'tube';
        if (selectedTube === i) tubeDiv.classList.add('selected');
        tubeDiv.setAttribute('data-idx', i);
        for (var slot=0; slot<TUBE_CAP; slot++) {
          var unitDiv = document.createElement('div');
          if (slot < tubeData.length) {
            unitDiv.className = 'color-unit';
            unitDiv.style.backgroundColor = tubeData[slot];
          } else {
            unitDiv.className = 'empty-slot';
          }
          tubeDiv.appendChild(unitDiv);
        }
        tubeDiv.addEventListener('click', (function(idx) { return function() { onTubeClick(idx); }; })(i));
        container.appendChild(tubeDiv);
      }
    }

    function isValidMove(fromIdx, toIdx) {
      if (fromIdx === toIdx) return false;
      var src = tubes[fromIdx];
      var dst = tubes[toIdx];
      if (src.length === 0) return false;
      if (dst.length === TUBE_CAP) return false;
      if (dst.length === 0) return true;
      var srcTop = src[src.length-1];
      var dstTop = dst[dst.length-1];
      return srcTop === dstTop;
    }

    function applyMove(fromIdx, toIdx) {
      if (!isValidMove(fromIdx, toIdx)) return false;
      var srcTop = tubes[fromIdx].pop();
      tubes[toIdx].push(srcTop);
      moves++;
      moveSpan.innerText = moves;
      selectedTube = null;
      renderGame();
      return true;
    }

    function isGameWon() {
      var totalUnits = 0;
      for (var i=0; i<tubes.length; i++) {
        var tube = tubes[i];
        if (tube.length === 0) continue;
        var firstColor = tube[0];
        for (var j=1; j<tube.length; j++) {
          if (tube[j] !== firstColor) return false;
        }
        totalUnits += tube.length;
      }
      var expected = getColorCount() * 4;
      return totalUnits === expected;
    }

    function onTubeClick(idx) {
      if (!gameActive) return;
      if (selectedTube === null) {
        if (tubes[idx].length > 0) {
          selectedTube = idx;
          renderGame();
          gameMsgDiv.innerHTML = "✅ Top seçildi. Hedef tüpe dokun.";
        } else {
          gameMsgDiv.innerHTML = "⚠️ Boş tüp seçemezsin. Önce dolu bir tüp seç.";
        }
        return;
      }
      var success = applyMove(selectedTube, idx);
      if (success) {
        if (isGameWon()) {
          gameActive = false;
          saveBest();
          gameMsgDiv.innerHTML = "🎉 TEBRİKLER! OYUNU KAZANDINIZ! 🎉";
          renderGame();
        } else {
          gameMsgDiv.innerHTML = "✔️ Hamle yapıldı. Devam et.";
        }
      } else {
        gameMsgDiv.innerHTML = "❌ Geçersiz hamle! Aynı renk üst üste olmalı veya hedef boş olmalı.";
        selectedTube = null;
        renderGame();
      }
    }

    function newGame() {
      initGame();
      gameMsgDiv.innerHTML = "🔁 Yeni oyun başladı. Zorluk: " + difficultySelect.options[difficultySelect.selectedIndex].text;
    }

    difficultySelect.addEventListener('change', function() {
      newGame();
    });
    newGameBtn.addEventListener('click', newGame);

    loadBest();
    initGame();
  })();
</script>
</body>
</html>
