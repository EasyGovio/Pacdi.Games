<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pacdi Rulo · Kule Dizme | PACDI Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body { background: #04162E; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    .game-container { max-width: 500px; width: 100%; background: rgba(4,22,46,0.8); border-radius: 56px; padding: 20px 16px 24px; box-shadow: 0 20px 35px rgba(0,0,0,0.5); backdrop-filter: blur(2px); border: 1px solid rgba(246,180,95,0.3); }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .logo { font-size: 1.5rem; font-weight: bold; color: #F6B45F; }
    .sub { font-size: 0.62rem; color: #9bb7d4; margin-top: 2px; }
    .back-link { color: #F6B45F; text-decoration: none; font-weight: bold; font-size: 0.78rem; background: #0a1018; padding: 5px 12px; border-radius: 40px; }
    .info-bar { display: flex; justify-content: space-between; align-items: center; background: #0a1018; border-radius: 40px; padding: 7px 16px; margin-bottom: 14px; }
    .info-box { color: #F6B45F; font-weight: bold; font-size: 0.78rem; }
    .info-box span { color: #eaf2fb; }
    .new-btn { background: #F6B45F; border: none; font-weight: bold; padding: 5px 14px; border-radius: 40px; color: #0F1318; cursor: pointer; font-size: 0.78rem; }
    .canvas-wrap { background: #0a1018; border-radius: 28px; padding: 12px; margin-bottom: 14px; display: flex; justify-content: center; }
    canvas { display: block; background: #1e2a3a; border-radius: 20px; width: 100%; aspect-ratio: 1/1; cursor: pointer; touch-action: none; }
    .status { text-align: center; font-size: 0.85rem; font-weight: bold; color: #F6B45F; min-height: 28px; margin-bottom: 10px; }
    .controls { display: flex; gap: 16px; justify-content: center; margin-bottom: 12px; }
    .action-btn { background: #1e2a3a; border: 2px solid #1ABC9C; color: #1ABC9C; padding: 10px 20px; font-size: 1rem; border-radius: 60px; cursor: pointer; font-weight: bold; transition: 0.05s linear; }
    .action-btn:active { background: #1ABC9C; color: #04162E; transform: scale(0.96); }
    .footer { text-align: center; font-size: 0.6rem; color: #6c8fb0; margin-top: 10px; }
    @media (max-width: 550px) { .action-btn { padding: 8px 16px; font-size: 0.85rem; } }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header"><div><div class="logo">PACDI RULO</div><div class="sub">Kule Dizme · Denge Oyunu</div></div><a href="index.html" class="back-link">← Geri</a></div>
  <div class="info-bar"><div class="info-box">🎯 Skor: <span id="scoreNum">0</span></div><div class="info-box">🏆 En İyi: <span id="bestNum">—</span></div><button class="new-btn" id="resetBtn">↺ Yeni Oyun</button></div>
  <div class="canvas-wrap"><canvas id="gameCanvas" width="500" height="500"></canvas></div>
  <div class="status" id="statusMsg">⚡ Hareket eden bloğu durdurmak için dokun</div>
  <div class="controls"><button class="action-btn" id="leftBtn">◀ Sol</button><button class="action-btn" id="rightBtn">Sağ ▶</button></div>
  <div class="footer">Bloğu tam üstüne yerleştir · Taşan kısım kesilir · Her blok +1 puan</div>
</div>
<script>
  (function(){
    var canvas = document.getElementById('gameCanvas');
    var ctx = canvas.getContext('2d');
    var CANVAS_W = 500, CANVAS_H = 500;
    var BLOCK_H = 40;
    var BLOCK_W_START = 80;
    var MOVE_SPEED = 3.5;
    var gameActive = true;
    var score = 0;
    var bestScore = 0;
    var blocks = [];
    var movingBlock = null;
    var movingDirection = 1;
    var fallingBlock = null;
    var animationId = null;
    var bestKey = 'pacdi_rulo_best';
    function loadBest(){ var s=localStorage.getItem(bestKey); bestScore=s?parseInt(s):0; document.getElementById('bestNum').innerText=bestScore||'—'; }
    function saveBest(){ if(score>bestScore){ bestScore=score; localStorage.setItem(bestKey,score); document.getElementById('bestNum').innerText=score; } }
    function updateScoreUI(){ document.getElementById('scoreNum').innerText=score; }
    function getBlockColor(idx){ return (idx%2===0)?'#F6B45F':'#1ABC9C'; }
    function resetGame(){
      if(animationId) cancelAnimationFrame(animationId);
      gameActive=true; score=0; updateScoreUI();
      var baseX=(CANVAS_W-BLOCK_W_START)/2;
      blocks=[{x:baseX, y:CANVAS_H-BLOCK_H, width:BLOCK_W_START, color:getBlockColor(0)}];
      movingBlock={x:0, y:blocks[0].y-BLOCK_H, width:BLOCK_W_START, color:getBlockColor(1), direction:1};
      movingDirection=1; fallingBlock=null;
      drawCanvas(); requestAnimationFrame(gameLoop);
    }
    function drawCanvas(){
      if(!ctx) return;
      canvas.width=CANVAS_W; canvas.height=CANVAS_H;
      ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
      ctx.fillStyle='#0a1018'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
      ctx.strokeStyle='#1e2a3a'; ctx.lineWidth=1;
      for(var i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo(0,i*100); ctx.lineTo(CANVAS_W,i*100); ctx.stroke(); ctx.beginPath(); ctx.moveTo(i*100,0); ctx.lineTo(i*100,CANVAS_H); ctx.stroke(); }
      for(var i=0;i<blocks.length;i++){ var b=blocks[i]; ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.width,BLOCK_H); ctx.strokeStyle='#FFFFFF30'; ctx.strokeRect(b.x,b.y,b.width,BLOCK_H); }
      if(fallingBlock){ ctx.fillStyle=fallingBlock.color; ctx.fillRect(fallingBlock.x,fallingBlock.y,fallingBlock.width,BLOCK_H); ctx.strokeStyle='#FFFFFF50'; ctx.strokeRect(fallingBlock.x,fallingBlock.y,fallingBlock.width,BLOCK_H); }
      if(movingBlock&&gameActive){ ctx.fillStyle=movingBlock.color; ctx.fillRect(movingBlock.x,movingBlock.y,movingBlock.width,BLOCK_H); ctx.strokeStyle='#FFFFFF80'; ctx.lineWidth=2; ctx.strokeRect(movingBlock.x,movingBlock.y,movingBlock.width,BLOCK_H); }
      ctx.font='bold 24px monospace'; ctx.fillStyle='#F6B45F'; ctx.fillText(''+score,20,50);
    }
    function placeBlock(){
      if(!gameActive||!movingBlock) return;
      var lastBlock=blocks[blocks.length-1];
      var movingLeft=movingBlock.x, movingRight=movingBlock.x+movingBlock.width;
      var lastLeft=lastBlock.x, lastRight=lastBlock.x+lastBlock.width;
      var overlapLeft=Math.max(movingLeft,lastLeft);
      var overlapRight=Math.min(movingRight,lastRight);
      var overlap=overlapRight-overlapLeft;
      if(overlap<=0){ gameOver(); return; }
      var newWidth=overlap, newX=overlapLeft;
      var newColor=getBlockColor(blocks.length);
      var newBlock={x:newX, y:lastBlock.y-BLOCK_H, width:newWidth, color:newColor};
      blocks.push(newBlock);
      score++; updateScoreUI(); saveBest();
      // kesilen parça (düşen)
      if(movingLeft<lastLeft){
        fallingBlock={x:movingLeft, y:movingBlock.y, width:lastLeft-movingLeft, color:movingBlock.color, vy:0};
      } else if(movingRight>lastRight){
        fallingBlock={x:lastRight, y:movingBlock.y, width:movingRight-lastRight, color:movingBlock.color, vy:0};
      }
      // yeni hareketli blok (sonraki kat)
      var nextDir=(blocks.length%2===1)?1:-1;
      movingBlock={x:newX, y:newBlock.y-BLOCK_H, width:newWidth, color:getBlockColor(blocks.length+1), direction:nextDir};
      movingDirection=nextDir;
      if(fallingBlock) gameActive=false;  // düşüş başladı, hareketli blok durdurulur
      drawCanvas();
    }
    function updateMoving(){
      if(!gameActive||!movingBlock) return;
      movingBlock.x+=MOVE_SPEED*movingDirection;
      var minX=0, maxX=CANVAS_W-movingBlock.width;
      if(movingBlock.x<minX){ movingBlock.x=minX; movingDirection=1; }
      if(movingBlock.x>maxX){ movingBlock.x=maxX; movingDirection=-1; }
      movingBlock.direction=movingDirection;
    }
    function updateFalling(){
      if(!fallingBlock) return true;
      fallingBlock.vy+=0.5;
      fallingBlock.y+=fallingBlock.vy;
      if(fallingBlock.y+BLOCK_H>CANVAS_H){ gameOver(); return false; }
      return true;
    }
    function gameOver(){
      if(!gameActive) return;
      gameActive=false;
      movingBlock=null;
      fallingBlock=null;
      document.getElementById('statusMsg').innerHTML='💥 Kule devrildi! Yeni oyun başlat.';
      drawCanvas();
    }
    function onTap(){
      if(gameActive&&!fallingBlock){
        placeBlock();
        drawCanvas();
        if(fallingBlock){
          document.getElementById('statusMsg').innerHTML='⚠️ Düşüş...';
        } else {
          document.getElementById('statusMsg').innerHTML='Blok yerleşti. Devam et.';
        }
      }
    }
    function moveLeft(){ if(gameActive&&!fallingBlock){ movingDirection=-1; if(movingBlock) movingBlock.direction=-1; } }
    function moveRight(){ if(gameActive&&!fallingBlock){ movingDirection=1; if(movingBlock) movingBlock.direction=1; } }
    function gameLoop(){
      if(!gameActive&&!fallingBlock){ drawCanvas(); animationId=requestAnimationFrame(gameLoop); return; }
      if(gameActive&&!fallingBlock) updateMoving();
      if(fallingBlock){ var still=updateFalling(); if(!still){ fallingBlock=null; drawCanvas(); gameActive=false; document.getElementById('statusMsg').innerHTML='💥 Kule devrildi! Yeni oyun başlat.'; animationId=requestAnimationFrame(gameLoop); return; } }
      drawCanvas();
      animationId=requestAnimationFrame(gameLoop);
    }
    function attachEvents(){
      canvas.addEventListener('click',function(e){ e.preventDefault(); onTap(); });
      canvas.addEventListener('touchstart',function(e){ e.preventDefault(); onTap(); });
      document.getElementById('leftBtn').addEventListener('click',function(e){ e.preventDefault(); moveLeft(); });
      document.getElementById('leftBtn').addEventListener('touchstart',function(e){ e.preventDefault(); moveLeft(); });
      document.getElementById('rightBtn').addEventListener('click',function(e){ e.preventDefault(); moveRight(); });
      document.getElementById('rightBtn').addEventListener('touchstart',function(e){ e.preventDefault(); moveRight(); });
      document.getElementById('resetBtn').addEventListener('click',function(e){ e.preventDefault(); resetGame(); });
      document.getElementById('resetBtn').addEventListener('touchstart',function(e){ e.preventDefault(); resetGame(); });
    }
    loadBest(); attachEvents(); resetGame();
  })();
</script>
</body>
</html>
