<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Su İçme Hatırlatıcı | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .water-area { background:#0a1018; border-radius:28px; padding:24px 16px; margin-bottom:20px; }
        .water-icon { font-size:5rem; margin:10px 0; }
        .glass-counter { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin:16px 0; }
        .glass { width:40px; height:56px; border-radius:12px 12px 4px 4px; border:2px solid rgba(246,180,95,0.3); display:flex; align-items:flex-end; justify-content:center; font-size:0.7rem; color:#9bb7d4; padding-bottom:4px; }
        .glass.filled { background:rgba(52,152,219,0.4); border-color:#3498DB; color:#eaf2fb; }
        .add-btn { background:#3498DB; border:none; font-weight:bold; padding:14px 40px; border-radius:60px; color:#fff; cursor:pointer; font-size:1.1rem; margin:10px; }
        .add-btn:active { transform:scale(0.96); }
        .timer-selector { display:flex; justify-content:center; align-items:center; gap:10px; margin:12px 0; color:#9bb7d4; font-size:0.8rem; }
        .timer-selector select { background:#1e2a3a; border:1px solid rgba(246,180,95,0.3); border-radius:12px; padding:6px 10px; color:#eaf2fb; outline:none; font-family:inherit; }
        .goal-display { font-size:1.2rem; font-weight:bold; color:#F6B45F; margin:10px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">SU İÇME</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="water-area">
        <div class="water-icon">💧</div>
        <div class="goal-display" id="goalDisplay">Bugün: 0 / 8 bardak</div>
        <div class="glass-counter" id="glassCounter"></div>
        <button class="add-btn" id="addBtn">+ 1 Bardak</button>
        <div class="timer-selector">
            <span id="reminderLabel">⏰ Hatırlatma:</span>
            <select id="intervalSelect">
                <option value="0">Kapalı</option>
                <option value="30">30 dk</option>
                <option value="60" selected>1 saat</option>
                <option value="90">1,5 saat</option>
                <option value="120">2 saat</option>
            </select>
            <span id="reminderStatus">Aktif</span>
        </div>
    </div>
    <div class="footer" id="footerText">PACDI Games · Sağlıklı yaşam, düzenli su.</div>
</div>
<script>
(function(){
    var langData = {
        tr: { title:"SU İÇME", back:"← Geri", goal:"Bugün: {0} / 8 bardak", add:"+ 1 Bardak", reminder:"⏰ Hatırlatma:", statusActive:"Aktif", statusOff:"Kapalı", footer:"PACDI Games · Sağlıklı yaşam, düzenli su." },
        de: { title:"WASSERTRINKEN", back:"← Zurück", goal:"Heute: {0} / 8 Gläser", add:"+ 1 Glas", reminder:"⏰ Erinnerung:", statusActive:"Aktiv", statusOff:"Aus", footer:"PACDI Games · Gesund leben, regelmäßig trinken." },
        en: { title:"WATER REMINDER", back:"← Back", goal:"Today: {0} / 8 glasses", add:"+ 1 Glass", reminder:"⏰ Reminder:", statusActive:"Active", statusOff:"Off", footer:"PACDI Games · Healthy living, regular water." }
    };
    var currentLang = "tr";
    var glasses = 0;
    var goal = 8;
    var interval = 60;
    var notificationTimer = null;
    var notificationPermission = false;

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('addBtn').innerText=t.add;
        document.getElementById('reminderLabel').innerText=t.reminder;
        document.getElementById('footerText').innerText=t.footer;
        updateStatusText();
        updateDisplay();
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    function updateStatusText() {
        var t=langData[currentLang];
        document.getElementById('reminderStatus').innerText = interval>0 ? t.statusActive : t.statusOff;
    }

    function loadData() {
        var d = new Date();
        var today = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
        var saved = localStorage.getItem('water_today');
        if(saved) {
            var data = JSON.parse(saved);
            if(data.date === today) glasses = data.glasses;
            else { glasses = 0; saveData(); }
        }
        var savedInterval = localStorage.getItem('water_interval');
        if(savedInterval) { interval = parseInt(savedInterval); document.getElementById('intervalSelect').value = interval; }
        updateDisplay();
        if(interval>0) requestNotification();
    }

    function saveData() {
        var d = new Date();
        var today = d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
        localStorage.setItem('water_today', JSON.stringify({ date:today, glasses:glasses }));
    }

    function updateDisplay() {
        var t=langData[currentLang];
        document.getElementById('goalDisplay').innerText = t.goal.replace('{0}', glasses);
        var counter = document.getElementById('glassCounter');
        counter.innerHTML = '';
        for(var i=0;i<goal;i++) {
            var g = document.createElement('div');
            g.className = 'glass' + (i<glasses ? ' filled' : '');
            g.innerText = i<glasses ? '💧' : '';
            g.addEventListener('click', (function(idx){ return function(){
                if(idx < glasses) { glasses = idx; }
                else { glasses = idx + 1; }
                glasses = Math.min(glasses, goal);
                saveData(); updateDisplay();
            };})(i));
            counter.appendChild(g);
        }
    }

    function addGlass() {
        if(glasses < goal) { glasses++; saveData(); updateDisplay(); }
    }

    function requestNotification() {
        if('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission().then(function(p){ notificationPermission = p === 'granted'; });
        } else if(Notification.permission === 'granted') {
            notificationPermission = true;
        }
    }

    function startReminder() {
        if(notificationTimer) clearInterval(notificationTimer);
        if(interval > 0) {
            notificationTimer = setInterval(function(){
                if(notificationPermission && glasses < goal) {
                    try { new Notification('💧 Su İç!', { body:'Bugün ' + glasses + ' bardak içtin. Hedef: ' + goal + ' bardak.', icon:'' }); } catch(e){}
                }
            }, interval * 60 * 1000);
        }
        updateStatusText();
    }

    document.getElementById('addBtn').addEventListener('click', addGlass);
    document.getElementById('intervalSelect').addEventListener('change', function(){
        interval = parseInt(this.value);
        localStorage.setItem('water_interval', interval);
        startReminder();
    });

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) setLanguage(l); });

    setLanguage('tr');
    loadData();
    requestNotification();
    startReminder();
})();
</script>
</body>
</html>
