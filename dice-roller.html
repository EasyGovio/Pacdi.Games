<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zar Atma | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .dice-area { background:#0a1018; border-radius:28px; padding:24px 16px; margin-bottom:20px; }
        .dice-container { display:flex; justify-content:center; gap:16px; flex-wrap:wrap; min-height:100px; align-items:center; margin-bottom:20px; }
        .die { width:80px; height:80px; background:#1e2a3a; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:bold; color:#F6B45F; border:2px solid rgba(246,180,95,0.3); transition:0.1s; }
        .die.rolling { animation:shake 0.15s infinite; }
        @keyframes shake { 0%{transform:rotate(0deg)} 25%{transform:rotate(10deg)} 50%{transform:rotate(0deg)} 75%{transform:rotate(-10deg)} 100%{transform:rotate(0deg)} }
        .dice-selector { display:flex; justify-content:center; gap:10px; margin-bottom:16px; }
        .dice-count-btn { width:44px; height:44px; border-radius:50%; background:#1e2a3a; border:2px solid rgba(246,180,95,0.3); color:#eaf2fb; font-size:1.2rem; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .dice-count-btn.active { background:#F6B45F; color:#04162E; border-color:#F6B45F; }
        .roll-btn { background:#F6B45F; border:none; font-weight:bold; padding:14px 40px; border-radius:60px; color:#04162E; cursor:pointer; font-size:1.2rem; width:100%; max-width:250px; }
        .roll-btn:active { transform:scale(0.96); }
        .total-display { margin-top:16px; font-size:1.5rem; font-weight:800; color:#F6B45F; }
        .history { margin-top:16px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
        .history-item { background:#1e2a3a; padding:6px 12px; border-radius:20px; font-size:0.8rem; color:#9bb7d4; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">ZAR ATMA</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="dice-area">
        <div class="dice-selector">
            <button class="dice-count-btn" data-count="1">1</button>
            <button class="dice-count-btn active" data-count="2">2</button>
            <button class="dice-count-btn" data-count="3">3</button>
            <button class="dice-count-btn" data-count="4">4</button>
            <button class="dice-count-btn" data-count="5">5</button>
        </div>
        <div class="dice-container" id="diceContainer">
            <div class="die">⚀</div>
            <div class="die">⚁</div>
        </div>
        <button class="roll-btn" id="rollBtn">🎲 At</button>
        <div class="total-display" id="totalDisplay">Toplam: 0</div>
        <div class="history" id="history"></div>
    </div>
    <div class="footer" id="footerText">PACDI Games · Şansını dene, zar at.</div>
</div>
<script>
(function(){
    var langData = {
        tr: { title:"ZAR ATMA", back:"← Geri", total:"Toplam: ", roll:"🎲 At", footer:"PACDI Games · Şansını dene, zar at." },
        de: { title:"WÜRFELN", back:"← Zurück", total:"Summe: ", roll:"🎲 Würfeln", footer:"PACDI Games · Versuche dein Glück, würfle." },
        en: { title:"DICE ROLLER", back:"← Back", total:"Total: ", roll:"🎲 Roll", footer:"PACDI Games · Try your luck, roll the dice." }
    };
    var currentLang = "tr";
    var diceCount = 2;
    var diceFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    var history = [];

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('rollBtn').innerText=t.roll;
        document.getElementById('footerText').innerText=t.footer;
        updateTotal();
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    function updateTotal() {
        var sum = 0;
        var dice = document.querySelectorAll('.die');
        for(var i=0;i<dice.length;i++) {
            sum += diceFaces.indexOf(dice[i].innerText) + 1;
        }
        document.getElementById('totalDisplay').innerText = langData[currentLang].total + sum;
    }

    function rollDice() {
        var dice = document.querySelectorAll('.die');
        for(var i=0;i<dice.length;i++) dice[i].classList.add('rolling');
        var rollCount = 0;
        var maxRolls = 8;
        var interval = setInterval(function(){
            for(var i=0;i<dice.length;i++) {
                dice[i].innerText = diceFaces[Math.floor(Math.random()*6)];
            }
            rollCount++;
            if(rollCount >= maxRolls) {
                clearInterval(interval);
                for(var i=0;i<dice.length;i++) dice[i].classList.remove('rolling');
                var sum = 0;
                var values = [];
                for(var j=0;j<dice.length;j++) {
                    var val = diceFaces.indexOf(dice[j].innerText) + 1;
                    sum += val;
                    values.push(val);
                }
                document.getElementById('totalDisplay').innerText = langData[currentLang].total + sum;
                history.unshift(values.join('+')+'='+sum);
                if(history.length > 10) history.pop();
                renderHistory();
            }
        }, 80);
    }

    function renderHistory() {
        var h = document.getElementById('history');
        h.innerHTML = '';
        for(var i=0;i<history.length;i++) {
            h.innerHTML += '<span class="history-item">'+history[i]+'</span>';
        }
    }

    function setDiceCount(count) {
        diceCount = count;
        var container = document.getElementById('diceContainer');
        container.innerHTML = '';
        for(var i=0;i<count;i++) {
            var die = document.createElement('div');
            die.className = 'die';
            die.innerText = diceFaces[Math.floor(Math.random()*6)];
            container.appendChild(die);
        }
        updateTotal();
    }

    document.getElementById('rollBtn').addEventListener('click', rollDice);

    var countBtns = document.querySelectorAll('.dice-count-btn');
    for(var i=0;i<countBtns.length;i++) {
        countBtns[i].addEventListener('click', function(){
            var count = parseInt(this.getAttribute('data-count'));
            setDiceCount(count);
            for(var j=0;j<countBtns.length;j++) countBtns[j].classList.remove('active');
            this.classList.add('active');
        });
    }

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) setLanguage(l); });

    setLanguage('tr'); setDiceCount(2);
})();
</script>
</body>
</html>
