<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Taş Kağıt Makas | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .info-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1018; border-radius:40px; padding:7px 16px; margin-bottom:14px; }
        .info-box { color:#F6B45F; font-weight:bold; font-size:0.78rem; }
        .new-btn { background:#F6B45F; border:none; font-weight:bold; padding:5px 14px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.78rem; }
        .battle-area { background:#0a1018; border-radius:28px; padding:24px 16px; margin-bottom:20px; }
        .vs-display { display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:24px; }
        .player-side, .ai-side { display:flex; flex-direction:column; align-items:center; gap:8px; }
        .choice-icon { font-size:3.5rem; width:80px; height:80px; border-radius:50%; background:#1e2a3a; display:flex; align-items:center; justify-content:center; transition:0.15s; }
        .choice-icon.selected { background:#F6B45F; transform:scale(1.1); }
        .choice-label { font-size:0.7rem; color:#9bb7d4; }
        .vs-text { font-size:1.5rem; font-weight:800; color:#F6B45F; }
        .choices { display:flex; justify-content:center; gap:12px; }
        .choice-btn { width:70px; height:70px; border-radius:50%; background:#1e2a3a; border:2px solid rgba(246,180,95,0.3); font-size:2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.1s; }
        .choice-btn:active { background:#F6B45F; transform:scale(0.95); }
        .result-area { margin-top:16px; padding:12px; border-radius:40px; font-weight:bold; font-size:1rem; min-height:48px; display:flex; align-items:center; justify-content:center; }
        .result-area.win { background:rgba(46,204,113,0.2); color:#2ECC71; }
        .result-area.lose { background:rgba(231,76,60,0.2); color:#E74C3C; }
        .result-area.draw { background:rgba(246,180,95,0.2); color:#F6B45F; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">TAŞ KAĞIT MAKAS</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="info-bar">
        <div class="info-box" id="scoreLabel">🎯 Skor: <span id="scoreNum">0</span></div>
        <div class="info-box" id="bestLabel">🏆 En İyi: <span id="bestNum">—</span></div>
        <button class="new-btn" id="resetBtn"><span id="resetText">↺ Sıfırla</span></button>
    </div>
    <div class="battle-area">
        <div class="vs-display">
            <div class="player-side">
                <div class="choice-icon" id="playerChoice">❓</div>
                <div class="choice-label" id="playerLabel">Sen</div>
            </div>
            <div class="vs-text">VS</div>
            <div class="ai-side">
                <div class="choice-icon" id="aiChoice">❓</div>
                <div class="choice-label" id="aiLabel">PACDI</div>
            </div>
        </div>
        <div class="choices">
            <button class="choice-btn" onclick="play('rock')" title="Taş">🪨</button>
            <button class="choice-btn" onclick="play('paper')" title="Kağıt">📄</button>
            <button class="choice-btn" onclick="play('scissors')" title="Makas">✂️</button>
        </div>
        <div class="result-area" id="resultArea">Seçimini yap!</div>
    </div>
    <div class="footer" id="footerText">PACDI Games · Taş kağıt makas, şans ve strateji.</div>
</div>
<script>
(function(){
    var langData = {
        tr: { title:"TAŞ KAĞIT MAKAS", back:"← Geri", score:"🎯 Skor:", best:"🏆 En İyi:", reset:"↺ Sıfırla", player:"Sen", ai:"PACDI", choose:"Seçimini yap!", win:"🎉 Kazandın!", lose:"😔 Kaybettin!", draw:"🤝 Berabere!", footer:"PACDI Games · Taş kağıt makas, şans ve strateji." },
        de: { title:"SCHERE STEIN PAPIER", back:"← Zurück", score:"🎯 Punkt:", best:"🏆 Beste:", reset:"↺ Reset", player:"Du", ai:"PACDI", choose:"Wähle!", win:"🎉 Gewonnen!", lose:"😔 Verloren!", draw:"🤝 Unentschieden!", footer:"PACDI Games · Schere Stein Papier, Glück und Strategie." },
        en: { title:"ROCK PAPER SCISSORS", back:"← Back", score:"🎯 Score:", best:"🏆 Best:", reset:"↺ Reset", player:"You", ai:"PACDI", choose:"Choose!", win:"🎉 You win!", lose:"😔 You lose!", draw:"🤝 Draw!", footer:"PACDI Games · Rock paper scissors, luck and strategy." }
    };
    var icons = { rock:'🪨', paper:'📄', scissors:'✂️' };
    var choices = ['rock','paper','scissors'];
    var currentLang = "tr";
    var score = 0, bestScore = 0;

    function loadBest() { var s=localStorage.getItem('rps_best_'+currentLang); bestScore=s?parseInt(s):0; document.getElementById('bestNum').innerText=bestScore||'—'; }
    function saveBest() { if(score>bestScore){ bestScore=score; localStorage.setItem('rps_best_'+currentLang,bestScore); document.getElementById('bestNum').innerText=bestScore; } }

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('scoreLabel').innerHTML=t.score+' <span id="scoreNum">'+score+'</span>';
        document.getElementById('bestLabel').innerHTML=t.best+' <span id="bestNum">'+(bestScore||'—')+'</span>';
        document.getElementById('resetText').innerText=t.reset;
        document.getElementById('playerLabel').innerText=t.player;
        document.getElementById('aiLabel').innerText=t.ai;
        document.getElementById('resultArea').innerText=t.choose;
        document.getElementById('resultArea').className='result-area';
        document.getElementById('footerText').innerText=t.footer;
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage(); loadBest();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    window.play = function(playerChoice) {
        var aiChoice = choices[Math.floor(Math.random()*3)];
        document.getElementById('playerChoice').innerText = icons[playerChoice];
        document.getElementById('aiChoice').innerText = icons[aiChoice];
        var t=langData[currentLang];
        var result = document.getElementById('resultArea');
        result.className='result-area';
        if(playerChoice === aiChoice) {
            result.innerText = t.draw;
            result.classList.add('draw');
        } else if(
            (playerChoice==='rock' && aiChoice==='scissors') ||
            (playerChoice==='paper' && aiChoice==='rock') ||
            (playerChoice==='scissors' && aiChoice==='paper')
        ) {
            result.innerText = t.win;
            result.classList.add('win');
            score++; document.getElementById('scoreNum').innerText=score; saveBest();
        } else {
            result.innerText = t.lose;
            result.classList.add('lose');
        }
    };

    document.getElementById('resetBtn').addEventListener('click', function(){
        score=0; document.getElementById('scoreNum').innerText='0';
        document.getElementById('playerChoice').innerText='❓';
        document.getElementById('aiChoice').innerText='❓';
        document.getElementById('resultArea').innerText=langData[currentLang].choose;
        document.getElementById('resultArea').className='result-area';
    });

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) setLanguage(l); });

    setLanguage('tr'); loadBest();
})();
</script>
</body>
</html>
