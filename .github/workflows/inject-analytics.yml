name: Inject Analytics & Canonical

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run inject script
        run: python3 inject.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PACDI Bot"
          git add -A
          git diff --staged --quiet || (git commit -m "Auto: Analytics + AdSense + Canonical" && git push)
