<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Krankenkasse Vergleich PRO | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:620px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.2rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .question-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; text-align:left; }
        .step-indicator { color:#6c8fb0; font-size:0.7rem; margin-bottom:10px; }
        .question-text { font-size:1rem; font-weight:bold; color:#F6B45F; margin-bottom:16px; }
        .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
        .opt-btn { background:#1e2a3a; border:2px solid #1ABC9C; border-radius:60px; padding:12px 8px; font-weight:bold; color:#1ABC9C; cursor:pointer; font-size:0.85rem; text-align:center; }
        .opt-btn:active { background:#1ABC9C; color:#04162E; transform:scale(0.96); }
        .result-box { background:#0a1018; border-radius:28px; padding:20px; margin-top:20px; border:2px solid #F6B45F; text-align:left; }
        .result-title { font-size:1.3rem; font-weight:800; color:#F6B45F; margin-bottom:10px; }
        .result-detail { color:#eaf2fb; font-size:0.85rem; line-height:1.6; margin-bottom:12px; }
        .kk-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:0.75rem; }
        .kk-table th { background:#F6B45F; color:#04162E; padding:8px; text-align:left; }
        .kk-table td { padding:8px; border-bottom:1px solid rgba(246,180,95,0.2); color:#eaf2fb; vertical-align:top; }
        .mini-btn { background:#2ECC71; color:#04162E; border:none; padding:3px 8px; border-radius:20px; font-size:0.65rem; font-weight:bold; cursor:pointer; text-decoration:none; display:inline-block; margin-top:4px; }
        .info-badge { background:rgba(246,180,95,0.15); border:1px solid #F6B45F; border-radius:16px; padding:12px; margin:12px 0; font-size:0.78rem; color:#eaf2fb; text-align:left; line-height:1.5; }
        .warning-box { background:rgba(231,76,60,0.2); border-left:4px solid #E74C3C; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .community-box { background:rgba(46,204,113,0.2); border-left:4px solid #2ECC71; padding:12px; border-radius:12px; margin:12px 0; font-size:0.8rem; }
        .back-btn { background:#1e2a3a; border:1px solid #F6B45F; color:#F6B45F; padding:8px 16px; border-radius:40px; cursor:pointer; font-weight:bold; margin-top:10px; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">KRANKENKASSE VERGLEICH PRO</div>
        <a href="index.html" class="back-link" id="backLink">← Zurück</a>
    </div>
    <div class="lang-selector" id="langSelector">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="question-area" id="questionArea">
        <div class="step-indicator" id="stepIndicator"></div>
        <div class="question-text" id="questionText"></div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>
    </div>
    <div class="footer" id="footerText">PACDI Games · Ihr Krankenkassen-Vergleich in Deutschland</div>
</div>
<script>
(function(){
    var langData = {
        de: {
            title: "KRANKENKASSE VERGLEICH PRO",
            back: "← Zurück",
            steps: "Schritt {0} von {1}",
            footer: "PACDI Games · Ihr Krankenkassen-Vergleich in Deutschland",
            resultTitle: "Ihre Krankenkassen-Empfehlung",
            gkv: "Gesetzliche Krankenversicherung (GKV)",
            pkv: "Private Krankenversicherung (PKV)",
            kvdR: "KVdR (Krankenversicherung der Rentner)",
            zusatzbeitrag: "Zusatzbeitrag: {0}%",
            bonusProgramme: "Bonus-Programme",
            empfehlung: "Empfehlung",
            beitragInfo: "💡 Der allgemeine Beitragssatz beträgt 14,6%. Bei Rentnern in der KVdR übernimmt die Rentenversicherung die Hälfte (7,3%). Der Zusatzbeitrag wird allein vom Rentner getragen.",
            partnerLink: "Jetzt informieren",
            communityTitle: "Gemeinschaftshilfe",
            communityText: "Viele türkische Rentner in Deutschland sind Mitglied in einem Rentnerverein oder einer Gemeinde wie DİTİB. Diese Gemeinschaften bieten oft ehrenamtliche Beratung bei Krankenkassen-Fragen. Sie sind nicht allein."
        },
        tr: {
            title: "SAĞLIK SİGORTASI KARŞILAŞTIRMA PRO",
            back: "← Geri",
            steps: "Adım {0} / {1}",
            footer: "PACDI Games · Almanya sağlık sigortası karşılaştırmanız",
            resultTitle: "Sağlık Sigortası Öneriniz",
            gkv: "Yasal Sağlık Sigortası (GKV)",
            pkv: "Özel Sağlık Sigortası (PKV)",
            kvdR: "Emeklilerin Sağlık Sigortası (KVdR)",
            zusatzbeitrag: "Ek prim: %{0}",
            bonusProgramme: "Bonus Programları",
            empfehlung: "Öneri",
            beitragInfo: "💡 Genel prim oranı %14,6'dır. KVdR kapsamındaki emeklilerde bu oranın yarısını (%7,3) emeklilik sigortası karşılar. Ek primin tamamı emekli tarafından ödenir.",
            partnerLink: "Şimdi bilgi al",
            communityTitle: "Topluluk Dayanışması",
            communityText: "Almanya'daki birçok Türk emekli, bir emekli derneğine veya DİTİB gibi bir cemaate üyedir. Bu topluluklar, sağlık sigortası sorularında gönüllü danışmanlık sunar. Yalnız değilsiniz."
        },
        en: {
            title: "HEALTH INSURANCE COMPARISON PRO",
            back: "← Back",
            steps: "Step {0} of {1}",
            footer: "PACDI Games · Your health insurance comparison in Germany",
            resultTitle: "Your Health Insurance Recommendation",
            gkv: "Statutory Health Insurance (GKV)",
            pkv: "Private Health Insurance (PKV)",
            kvdR: "Health Insurance for Pensioners (KVdR)",
            zusatzbeitrag: "Additional contribution: {0}%",
            bonusProgramme: "Bonus Programs",
            empfehlung: "Recommendation",
            beitragInfo: "💡 The general contribution rate is 14.6%. For pensioners in KVdR, the pension insurance covers half (7.3%). The additional contribution is paid entirely by the pensioner.",
            partnerLink: "Get info",
            communityTitle: "Community Support",
            communityText: "Many Turkish retirees in Germany are members of a pensioners' association or a community like DİTİB. These communities offer volunteer advice on health insurance questions. You are not alone."
        }
    };

    var krankenkassen = [
        { name:"Techniker Krankenkasse (TK)", zusatz:1.2, bonus:"Bonusprogramm (bis 240€), Reiseimpfungen, Zahnreinigung", link:"https://www.tk.de" },
        { name:"AOK Bayern", zusatz:1.6, bonus:"Bonusprogramm, Zuschüsse Vorsorge, Sportkurse", link:"https://www.aok.de" },
        { name:"Barmer", zusatz:1.5, bonus:"Bonusprogramm (bis 300€), Gesundheitskurse", link:"https://www.barmer.de" },
        { name:"DAK-Gesundheit", zusatz:1.7, bonus:"Bonusprogramm, Zahnreinigung, Osteopathie", link:"https://www.dak.de" },
        { name:"KKH", zusatz:1.5, bonus:"Bonusprogramm, Reiseimpfungen, Sportkurse", link:"https://www.kkh.de" }
    ];

    var currentLang = 'de';
    var currentStep = 0;
    var answers = {};
    var questions = [
        { question:"Sind Sie derzeit rentenversichert oder Rentner?", opts:["Ja, Rentner","Ja, rentenversichert","Nein"], key:"rentner", values:["rentner","versichert","nein"] },
        { question:"Sind Sie freiwillig gesetzlich oder privat versichert?", opts:["Gesetzlich (GKV)","Privat (PKV)","Ich bin unsicher"], key:"versicherung", values:["gkv","pkv","unsicher"] },
        { question:"Haben Sie in der zweiten Hälfte Ihres Erwerbslebens überwiegend in der GKV verbracht? (9/10-Regelung)", opts:["Ja","Nein","Ich bin unsicher"], key:"kvdr", values:["ja","nein","unsicher"] }
    ];
    var totalSteps = questions.length;

    function updateLanguage() {
        var t = langData[currentLang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('backBtn').innerText = t.back;
    }
    function setLanguage(lang) {
        currentLang = lang; updateLanguage();
        var btns = document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
        if(currentStep < totalSteps) renderQuestion(); else renderResult();
    }
    function renderQuestion() {
        var q = questions[currentStep];
        var t = langData[currentLang];
        document.getElementById('stepIndicator').innerText = t.steps.replace('{0}',currentStep+1).replace('{1}',totalSteps);
        document.getElementById('questionText').innerText = q.question;
        var grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
        for(var i=0;i<q.opts.length;i++) {
            var btn = document.createElement('button'); btn.className='opt-btn'; btn.innerText=q.opts[i];
            btn.addEventListener('click', (function(key,value){ return function(){
                answers[key]=value; currentStep++;
                if(currentStep<totalSteps) renderQuestion(); else renderResult();
            };})(q.key, q.values[i]));
            grid.appendChild(btn);
        }
        document.getElementById('backBtn').style.display = currentStep>0 ? 'inline-block' : 'none';
    }
    function renderResult() {
        var t = langData[currentLang];
        var empfehlung = t.gkv;
        var kvdrStatus = false;

        if(answers.kvdr === 'ja') { kvdrStatus = true; empfehlung = t.kvdR; }
        else if(answers.versicherung === 'pkv') { empfehlung = t.pkv; }
        else if(answers.rentner === 'nein') { empfehlung = t.gkv + " (Pflichtversicherung)"; }

        var html = '<div class="result-box">';
        html += '<div class="result-title">'+t.resultTitle+'</div>';
        html += '<div class="result-detail">';
        html += '● <strong>'+t.empfehlung+':</strong> '+empfehlung+'<br>';
        if(kvdrStatus) html += '● Sie sind wahrscheinlich KVdR-berechtigt (9/10-Regelung erfüllt)<br>';
        if(answers.versicherung === 'pkv') html += '● Als PKV-Versicherter prüfen Sie bitte die Rückkehr in die GKV vor der Rente<br>';
        html += '</div>';

        // Beitragsinfo
        html += '<div class="info-badge">'+t.beitragInfo+'</div>';

        // Vergleichstabelle mit Affiliate-Buttons
        html += '<table class="kk-table"><tr><th>Krankenkasse</th><th>Zusatzbeitrag</th><th>Bonus</th><th></th></tr>';
        for(var i=0;i<krankenkassen.length;i++) {
            var kk = krankenkassen[i];
            html += '<tr><td>'+kk.name+'</td><td>'+t.zusatzbeitrag.replace('{0}',kk.zusatz.toFixed(1))+'</td><td>'+kk.bonus+'</td><td><a href="'+kk.link+'" target="_blank" class="mini-btn">'+t.partnerLink+'</a></td></tr>';
        }
        html += '</table>';

        html += '<div class="warning-box"><strong>⚠ Achtung:</strong> Dies ist eine unverbindliche Ersteinschätzung. Für eine verbindliche Auskunft wenden Sie sich an Ihre Krankenkasse oder einen Sozialverband.</div>';
        html += '<div class="community-box"><strong>🤝 '+t.communityTitle+':</strong><br>'+t.communityText+'</div>';
        html += '<button class="back-btn" onclick="resetBerater()">Wiederholen</button>';
        html += '</div>';
        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('backBtn').style.display = 'none';
    }

    window.resetBerater = function() {
        currentStep = 0; answers = {};
        document.getElementById('questionArea').innerHTML = '<div class="step-indicator" id="stepIndicator"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>';
        updateLanguage(); renderQuestion();
    };

    document.getElementById('backBtn').addEventListener('click', function(){ if(currentStep>0){ currentStep--; renderQuestion(); } });
    var langBtns = document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var lang=this.getAttribute('data-lang'); if(lang!==currentLang) setLanguage(lang); });

    setLanguage('de'); renderQuestion();
})();
</script>
</body>
</html>
