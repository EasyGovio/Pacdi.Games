<script>
(function () {

    var L = {
        tr: {
            title:"MAAŞ HESAPLAYICI", back:"← Geri", country:"Ülke", gross:"Brüt Maaş",
            taxClass:"Vergi Dilimi", taxClassDE:"Steuerklasse", church:"Kirchensteuer",
            children:"Çocuk sayısı (Pflegevers.)", healthIns:"KK Zusatzbeitrag",
            grossResult:"Brüt Maaş:", tax:"Vergi:", sgk:"Sozialabgaben / SGK:", net:"Net Maaş:",
            breakdownTR:"SGK %14 + İşsizlik %1 + Damga %0,759",
            breakdownDE:"RV 9,3% + GKV 7,3%+½ZZ + PV + AV 1,3% + Soli",
            warning:"⚠️ Bilgilendirme amaçlıdır. Kesin sonuç için Steuerberater'a danışın.",
            footer:"PACDI Games · Maaş hesaplayıcı", nextLang:"de"
        },
        de: {
            title:"GEHALTSRECHNER", back:"← Zurück", country:"Land", gross:"Bruttogehalt",
            taxClass:"Steuersatz", taxClassDE:"Steuerklasse", church:"Kirchensteuer",
            children:"Anzahl Kinder (Pflegevers.)", healthIns:"KK Zusatzbeitrag",
            grossResult:"Bruttogehalt:", tax:"Steuer:", sgk:"Sozialabgaben:", net:"Nettogehalt:",
            breakdownTR:"SGK 14% + İşsizlik 1%",
            breakdownDE:"RV 9,3% + GKV 7,3%+½ZZ + PV + AV 1,3% + Soli",
            warning:"⚠️ Diese Berechnung dient nur zur Information. Steuerberater konsultieren.",
            footer:"PACDI Games · Gehaltsrechner", nextLang:"en"
        },
        en: {
            title:"SALARY CALCULATOR", back:"← Back", country:"Country", gross:"Gross Salary",
            taxClass:"Tax Bracket", taxClassDE:"Tax Class", church:"Church Tax",
            children:"Children (Care Ins.)", healthIns:"Health Add. Contribution",
            grossResult:"Gross Salary:", tax:"Tax:", sgk:"Social Insurance:", net:"Net Salary:",
            breakdownTR:"SGK 14% + Unemployment 1%",
            breakdownDE:"Pension 9.3% + Health 7.3%+½add + Care + Unemp 1.3% + Soli",
            warning:"⚠️ For information only. Consult a tax advisor for exact results.",
            footer:"PACDI Games · Salary Calculator", nextLang:"tr"
        }
    };

    var currentLang = 'tr';
    var navLang = (navigator.language || 'en').toLowerCase();
    if (navLang.indexOf('de') === 0) currentLang = 'de';
    else if (navLang.indexOf('tr') === 0) currentLang = 'tr';
    else currentLang = 'en';

    /* ---- ALMANYA VERGİ HESABI ---- */
    function lohnsteuerMonatlich(jahresZvE, klasse) {
        /*
         * Alman gelir vergisi progresif tarifesi (2026 yaklaşık)
         * Steuerklasse I, II, IV → Grundfreibetrag 12.348 € geçerli
         * Steuerklasse III       → Grundfreibetrag 2x = 24.696 € (basitleştirilmiş)
         * Steuerklasse V, VI     → Grundfreibetrag YOK, 0'dan başlar
         */
        var zvE = jahresZvE;
        var steuer = 0;
        var freibetrag = 12348;

        if (klasse === '3') {
            freibetrag = 24696; /* çift muafiyet */
        } else if (klasse === '5' || klasse === '6') {
            freibetrag = 0; /* muafiyet yok */
        }

        var taxable = zvE - freibetrag;
        if (taxable <= 0) return 0;

        /* Progresif dilimler (2026 Grundtabelle - taxable gelire göre) */
        if (taxable <= 5195) {
            /* %14-%24 arası lineer artış */
            var Y1 = taxable / 10000.0;
            steuer = (932.30 * Y1 + 1400) * Y1;
        } else if (taxable <= 56131) {
            /* %24-%42 arası lineer artış */
            var Z1 = (taxable - 5195) / 10000.0;
            steuer = (176.64 * Z1 + 2397) * Z1 + 966.53;
        } else if (taxable <= 265326) {
            /* %42 sabit */
            steuer = 0.42 * taxable - 9972.98;
        } else {
            /* %45 sabit */
            steuer = 0.45 * taxable - 17961.64;
        }

        return steuer / 12; /* aylık */
    }

    function calculateDE(gross) {
        var klasse = document.getElementById('taxClassDE').value;
        var zusatz = parseFloat(document.getElementById('healthZusatz').value) || 2.9;
        var children = parseInt(document.getElementById('children').value) || 0;
        var kircheJa = document.getElementById('churchTax').value === 'yes';

        /* --- Sozialabgaben (işçi payı) 2026 --- */
        var rv  = gross * 0.093;                        /* Rentenversicherung */
        var gkv = gross * (0.073 + zusatz / 200);       /* Krankenversicherung */
        var pv  = gross * (children >= 1 ? 0.018 : 0.021); /* Pflegeversicherung */
        var av  = gross * 0.013;                        /* Arbeitslosenversicherung */
        var sozial = rv + gkv + pv + av;

        /* --- Lohnsteuer --- */
        var zvE = (gross - sozial) * 12;                /* yıllık vergiye tabi gelir */
        var lohnsteuer = lohnsteuerMonatlich(zvE, klasse);

        /* --- Solidaritätszuschlag --- */
        /* Yıllık Lohnsteuer > 18.130 € ise %5,5 uygulanır */
        var soli = 0;
        if (lohnsteuer * 12 > 18130) {
            soli = lohnsteuer * 0.055;
        }

        /* --- Kirchensteuer %9 --- */
        var kirche = kircheJa ? lohnsteuer * 0.09 : 0;

        var steuerTotal = lohnsteuer + soli + kirche;
        var netto = gross - sozial - steuerTotal;

        return { sozial: sozial, steuer: steuerTotal, netto: netto };
    }

    /* ---- TÜRKİYE VERGİ HESABI ---- */
    function calculateTR(gross) {
        var sgkRate = 0.14 + 0.01;         /* SGK + işsizlik */
        var sgk = gross * sgkRate;
        var damga = gross * 0.00759;
        var taxBase = gross - sgk;
        var taxRate = parseFloat(document.getElementById('taxClassTR').value) / 100;
        var tax = taxBase * taxRate;
        var net = gross - sgk - tax - damga;
        return { sgk: sgk, tax: tax + damga, net: net };
    }

    /* ---- ANA HESAPLAMA ---- */
    function calculate() {
        var country = document.getElementById('country').value;
        var gross   = parseFloat(document.getElementById('grossSalary').value) || 0;
        var sym     = country === 'tr' ? '₺' : '€';
        var t       = L[currentLang];

        document.getElementById('deFields').style.display = country === 'de' ? 'block' : 'none';
        document.getElementById('trFields').style.display = country === 'tr' ? 'block' : 'none';
        document.getElementById('grossResult').innerText = sym + gross.toFixed(2);

        if (country === 'tr') {
            var r = calculateTR(gross);
            document.getElementById('sgkResult').innerText  = sym + r.sgk.toFixed(2);
            document.getElementById('taxResult').innerText  = sym + r.tax.toFixed(2);
            document.getElementById('netResult').innerText  = sym + r.net.toFixed(2);
            document.getElementById('breakdownText').innerText = t.breakdownTR;
        } else {
            var r = calculateDE(gross);
            document.getElementById('sgkResult').innerText  = sym + r.sozial.toFixed(2);
            document.getElementById('taxResult').innerText  = sym + r.steuer.toFixed(2);
            document.getElementById('netResult').innerText  = sym + r.netto.toFixed(2);
            document.getElementById('breakdownText').innerText = t.breakdownDE;
        }
    }

    /* ---- DİL ---- */
    function setLang(lang) {
        currentLang = lang;
        var t = L[lang];
        document.getElementById('gameTitle').innerText      = t.title;
        document.getElementById('backLink').innerText       = t.back;
        document.getElementById('labelCountry').innerText   = t.country;
        document.getElementById('labelGross').innerText     = t.gross;
        document.getElementById('labelTaxClass').innerText  = t.taxClass;
        document.getElementById('labelTaxClassDE').innerText= t.taxClassDE;
        document.getElementById('labelChurch').innerText    = t.church;
        document.getElementById('labelChildren').innerText  = t.children;
        document.getElementById('labelHealthIns').innerText = t.healthIns;
        document.getElementById('labelGrossResult').innerText = t.grossResult;
        document.getElementById('labelTax').innerText       = t.tax;
        document.getElementById('labelSGK').innerText       = t.sgk;
        document.getElementById('labelNet').innerText       = t.net;
        document.getElementById('warningText').innerText    = t.warning;
        document.getElementById('footerText').innerText     = t.footer;
        calculate();
    }

    /* ---- EVENTLER ---- */
    document.getElementById('country').addEventListener('change', calculate);
    document.getElementById('grossSalary').addEventListener('input', calculate);
    document.getElementById('taxClassTR').addEventListener('change', calculate);
    document.getElementById('taxClassDE').addEventListener('change', calculate);
    document.getElementById('churchTax').addEventListener('change', calculate);
    document.getElementById('children').addEventListener('change', calculate);
    document.getElementById('healthZusatz').addEventListener('change', calculate);
    document.getElementById('langToggle').addEventListener('click', function () {
        setLang(L[currentLang].nextLang);
    });

    /* ---- BAŞLAT ---- */
    setLang(currentLang);
}());
</script>

</body>
