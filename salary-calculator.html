<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maaş Hesaplayıcı | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:24px 20px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:1.4rem; font-weight:800; color:#F6B45F; }
        .lang-btn { font-size:1.3rem; cursor:pointer; background:#0a1018; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid rgba(246,180,95,0.3); color:#F6B45F; }
        .top-actions { display:flex; gap:8px; align-items:center; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.75rem; background:#0a1018; padding:5px 10px; border-radius:30px; border:1px solid rgba(246,180,95,0.3); }
        .calc-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        .input-group { margin-bottom:16px; text-align:left; }
        .input-group label { color:#9bb7d4; font-size:0.8rem; display:block; margin-bottom:6px; }
        .input-group input, .input-group select { width:100%; padding:12px 16px; border-radius:14px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:1rem; outline:none; font-family:inherit; }
        .input-group select { cursor:pointer; appearance:none; -webkit-appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="%23F6B45F"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat:no-repeat; background-position:right 12px center; }
        .input-group input:focus, .input-group select:focus { border-color:#F6B45F; }
        .result-box { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); border-radius:20px; padding:16px; margin-top:12px; }
        .result-row { display:flex; justify-content:space-between; padding:6px 0; color:#eaf2fb; font-size:0.9rem; }
        .result-row.total { font-weight:bold; color:#F6B45F; font-size:1.1rem; border-top:1px solid rgba(246,180,95,0.2); margin-top:6px; padding-top:10px; }
        .result-breakdown { font-size:0.65rem; color:#6c8fb0; margin-top:6px; text-align:left; }
        .warning-text { font-size:0.65rem; color:#E74C3C; margin-top:10px; text-align:center; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">MAAŞ HESAPLAYICI</div>
        <div class="top-actions">
            <div class="lang-btn" id="langToggle" title="Dil değiştir">🌐</div>
            <a href="index.html" class="back-link" id="backLink">← Geri</a>
        </div>
    </div>
    <div class="calc-area">
        <div class="input-group">
            <label id="labelCountry">Ülke</label>
            <select id="country">
                <option value="tr">🇹🇷 Türkiye</option>
                <option value="de">🇩🇪 Deutschland</option>
            </select>
        </div>
        <div class="input-group">
            <label id="labelGross">Brüt Maaş</label>
            <input type="number" id="grossSalary" placeholder="0" value="2770" step="any">
        </div>
        <div id="deFields">
            <div class="input-group">
                <label id="labelTaxClassDE">Steuerklasse (Vergi Sınıfı)</label>
                <select id="taxClassDE">
                    <option value="1">I - Bekar / Ledig</option>
                    <option value="2">II - Tek Ebeveyn / Alleinerziehend</option>
                    <option value="3">III - Evli (Eş Çalışmıyor)</option>
                    <option value="4">IV - Evli (Eşler Benzer Gelir)</option>
                    <option value="5" selected>V - Evli (Eş Steuerklasse III'te)</option>
                    <option value="6">VI - İkinci İş / Nebenjob</option>
                </select>
            </div>
            <div class="input-group">
                <label id="labelChurch">Kirchensteuer (Kilise Vergisi)</label>
                <select id="churchTax">
                    <option value="no" selected>Hayır / Nein</option>
                    <option value="yes">Evet / Ja (%8-9)</option>
                </select>
            </div>
            <div class="input-group">
                <label id="labelChildren">Çocuk Sayısı (Pflegevers. için)</label>
                <select id="children">
                    <option value="0" selected>0 (çocuksuz, 23+ yaş)</option>
                    <option value="1">1</option>
                    <option value="2">2+</option>
                </select>
            </div>
            <div class="input-group">
                <label id="labelHealthIns">Krankenkasse Zusatzbeitrag</label>
                <select id="healthZusatz">
                    <option value="2.9" selected>%2,9 (ortalama 2026)</option>
                    <option value="1.7">%1,7 (düşük)</option>
                    <option value="0.9">%0,9 (en düşük)</option>
                </select>
            </div>
        </div>
        <div id="trFields" style="display:none;">
            <div class="input-group">
                <label id="labelTaxClass">Vergi Dilimi</label>
                <select id="taxClassTR">
                    <option value="15">%15 (70.000 TL'ye kadar)</option>
                    <option value="20" selected>%20 (70.000 - 150.000 TL)</option>
                    <option value="27">%27 (150.000 - 370.000 TL)</option>
                    <option value="35">%35 (370.000 TL üzeri)</option>
                </select>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            <div class="result-row"><span id="labelGrossResult">Brüt Maaş:</span> <span id="grossResult">0</span></div>
            <div class="result-row"><span id="labelTax">Vergi (+Dayanışma Vergisi):</span> <span id="taxResult">0</span></div>
            <div class="result-row"><span id="labelSGK">SGK / Sozialabgaben:</span> <span id="sgkResult">0</span></div>
            <div class="result-row total"><span id="labelNet">Net Maaş:</span> <span id="netResult">0</span></div>
            <div class="result-breakdown" id="breakdownText"></div>
        </div>
        <div class="warning-text" id="warningText">⚠️ Bu hesaplama bilgilendirme amaçlıdır. Kesin sonuç için bir Steuerberater'a danışın.</div>
    </div>
    <div class="footer" id="footerText">PACDI Games · Maaş hesaplayıcı</div>
</div>

<script>
(function() {
    var L = {
        tr: { title:"MAAŞ HESAPLAYICI", back:"← Geri", country:"Ülke", gross:"Brüt Maaş", taxClass:"Vergi Dilimi", taxClassDE:"Steuerklasse (Vergi Sınıfı)", church:"Kirchensteuer (Kilise Vergisi)", children:"Çocuk Sayısı (Pflegevers. için)", healthIns:"Krankenkasse Zusatzbeitrag", grossResult:"Brüt Maaş:", tax:"Vergi (+Dayanışma Vergisi):", sgk:"SGK / Sozialabgaben:", net:"Net Maaş:", breakdownTR:"SGK (%14) + İşsizlik (%1) + Damga V. (%0,759)", breakdownDE:"RV %9,3 + GKV %7,3+½ ZZ + PV %2,4 + AV %1,3 + Solidaritätszuschlag %5,5", warningTR:"⚠️ Bu hesaplama bilgilendirme amaçlıdır. Kesin sonuç için mali müşavirinize danışın.", warningDE:"⚠️ Diese Berechnung dient nur zur Information. Für ein genaues Ergebnis konsultieren Sie Ihren Steuerberater.", footer:"PACDI Games · Maaş hesaplayıcı", nextLang:"de" },
        de: { title:"GEHALTSRECHNER", back:"← Zurück", country:"Land", gross:"Bruttogehalt", taxClass:"Steuerklasse", taxClassDE:"Steuerklasse", church:"Kirchensteuer", children:"Anzahl Kinder (Pflegevers.)", healthIns:"Krankenkasse Zusatzbeitrag", grossResult:"Bruttogehalt:", tax:"Steuer (+Solidaritätszuschlag):", sgk:"Sozialabgaben:", net:"Nettogehalt:", breakdownTR:"SGK (14%) + İşsizlik (1%)", breakdownDE:"RV 9,3% + GKV 7,3%+½ ZZ + PV 2,4% + AV 1,3% + Solidaritätszuschlag 5,5%", warningTR:"⚠️ Bu hesaplama bilgilendirme amaçlıdır. Kesin sonuç için bir Steuerberater'a danışın.", warningDE:"⚠️ Diese Berechnung dient nur zur Information. Für ein genaues Ergebnis konsultieren Sie Ihren Steuerberater.", footer:"PACDI Games · Gehaltsrechner", nextLang:"en" },
        en: { title:"SALARY CALCULATOR", back:"← Back", country:"Country", gross:"Gross Salary", taxClass:"Tax Bracket", taxClassDE:"Tax Class", church:"Church Tax", children:"Number of Children (Care Ins.)", healthIns:"Health Insurance Add. Contribution", grossResult:"Gross Salary:", tax:"Tax (+Solidarity Surcharge):", sgk:"Social Insurance:", net:"Net Salary:", breakdownTR:"SGK (14%) + Unemployment (1%)", breakdownDE:"Pension 9.3% + Health 7.3%+½ add. + Care 2.4% + Unemp. 1.3% + Solidarity Surcharge 5.5%", warningTR:"⚠️ This calculation is for informational purposes only. Consult a tax advisor for exact results.", warningDE:"⚠️ This calculation is for informational purposes only. Consult a tax advisor for exact results.", footer:"PACDI Games · Salary Calculator", nextLang:"tr" }
    };
    var currentLang = (navigator.language||'en').toLowerCase().indexOf('de')===0 ? 'de' : (navigator.language||'en').toLowerCase().indexOf('tr')===0 ? 'tr' : 'en';
    
    function setLang(lang) {
        currentLang = lang;
        var t = L[lang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('labelCountry').innerText = t.country;
        document.getElementById('labelGross').innerText = t.gross;
        document.getElementById('labelTaxClass').innerText = t.taxClass;
        document.getElementById('labelTaxClassDE').innerText = t.taxClassDE;
        document.getElementById('labelChurch').innerText = t.church;
        document.getElementById('labelChildren').innerText = t.children;
        document.getElementById('labelHealthIns').innerText = t.healthIns;
        document.getElementById('labelGrossResult').innerText = t.grossResult;
        document.getElementById('labelTax').innerText = t.tax;
        document.getElementById('labelSGK').innerText = t.sgk;
        document.getElementById('labelNet').innerText = t.net;
        document.getElementById('footerText').innerText = t.footer;
        var warnText = (currentLang === 'de') ? L[currentLang].warningDE : L[currentLang].warningTR;
        document.getElementById('warningText').innerText = warnText;
        calculate();
    }

    // --- ALMANYA HESAPLAMA (STEUERKLASSE V DÜZELTİLDİ) ---
    function calculateDE(gross) {
        // Sozialabgaben (işçi payı) - 2026 oranları
        var renten = gross * 0.093;
        var kranken = gross * 0.073;
        var zusatz = parseFloat(document.getElementById('healthZusatz').value);
        var krankenZusatz = gross * (zusatz / 200);
        var pflegeBasis = 0.036;
        var children = parseInt(document.getElementById('children').value);
        if (children === 0) pflegeBasis = 0.042; // Çocuksuz %4,2 (2026)
        var pflege = gross * (pflegeBasis / 2);
        var arbeitslosen = gross * 0.013;

        var sozialTotal = renten + kranken + krankenZusatz + pflege + arbeitslosen;
        var zvE = gross - sozialTotal; // zu versteuerndes Einkommen (vergiye tabi gelir)

        var lohnsteuer = 0;
        var jahresZvE = zvE * 12;
        var steuerklasse = document.getElementById('taxClassDE').value;

        // Steuerklasse V ve VI: Grundfreibetrag uygulanmaz, daha yüksek vergi
        if (steuerklasse === '5' || steuerklasse === '6') {
            // Bu sınıflarda temel muafiyet yok, doğrudan progresif tarife uygulanır
            if (jahresZvE <= 12348) {
                lohnsteuer = jahresZvE * 0.14; // Temel muafiyet yok, ilk euro'dan itibaren vergi
            } else if (jahresZvE <= 17543) {
                var Y = (jahresZvE - 12348) / 10000.0;
                lohnsteuer = (932.30 * Y + 1400) * Y;
            } else if (jahresZvE <= 68480) {
                var Z = (jahresZvE - 17543) / 10000.0;
                lohnsteuer = (176.64 * Z + 2397) * Z + 1015.13;
            } else if (jahresZvE <= 277825) {
                lohnsteuer = 0.42 * jahresZvE - 10911.92;
            } else {
                lohnsteuer = 0.45 * jahresZvE - 19246.67;
            }
            lohnsteuer = lohnsteuer / 12;
        } else {
            // Diğer Steuerklasse'lar için standart progresif (Grundtabelle)
            if (jahresZvE <= 12348) {
                lohnsteuer = 0;
            } else if (jahresZvE <= 17543) {
                var Y = (jahresZvE - 12348) / 10000.0;
                lohnsteuer = (932.30 * Y + 1400) * Y;
            } else if (jahresZvE <= 68480) {
                var Z = (jahresZvE - 17543) / 10000.0;
                lohnsteuer = (176.64 * Z + 2397) * Z + 1015.13;
            } else if (jahresZvE <= 277825) {
                lohnsteuer = 0.42 * jahresZvE - 10911.92;
            } else {
                lohnsteuer = 0.45 * jahresZvE - 19246.67;
            }
            lohnsteuer = lohnsteuer / 12;
        }

        // Solidaritätszuschlag (Dayanışma Vergisi) - %5,5, Freigrenze 20.350€ (tek)
        var soli = 0;
        if (lohnsteuer * 12 > 20350) {
            soli = lohnsteuer * 0.055;
        }

        // Kirchensteuer
        var kirchensteuer = 0;
        if (document.getElementById('churchTax').value === 'yes') {
            kirchensteuer = lohnsteuer * 0.09;
        }

        var steuerTotal = lohnsteuer + soli + kirchensteuer;
        var netto = gross - sozialTotal - steuerTotal;

        return {
            sozial: sozialTotal,
            steuer: steuerTotal,
            netto: netto
        };
    }

    function calculate() {
        var country = document.getElementById('country').value;
        var gross = parseFloat(document.getElementById('grossSalary').value) || 0;
        var symbol = country === 'tr' ? '₺' : '€';

        document.getElementById('deFields').style.display = country === 'de' ? 'block' : 'none';
        document.getElementById('trFields').style.display = country === 'tr' ? 'block' : 'none';
        document.getElementById('grossResult').innerText = symbol + gross.toFixed(2);

        if (country === 'tr') {
            var sgkRate = 0.14, unempRate = 0.01;
            var sgk = gross * (sgkRate + unempRate);
            var taxBase = gross - sgk;
            var taxRate = parseFloat(document.getElementById('taxClassTR').value) / 100;
            var tax = taxBase * taxRate;
            var damgaVergisi = gross * 0.00759;
            var net = gross - sgk - tax - damgaVergisi;
            document.getElementById('sgkResult').innerText = symbol + sgk.toFixed(2);
            document.getElementById('taxResult').innerText = symbol + (tax + damgaVergisi).toFixed(2);
            document.getElementById('netResult').innerText = symbol + net.toFixed(2);
            document.getElementById('breakdownText').innerText = L[currentLang].breakdownTR + ' + Damga V. (%0,759)';
        } else {
            var result = calculateDE(gross);
            document.getElementById('sgkResult').innerText = symbol + result.sozial.toFixed(2);
            document.getElementById('taxResult').innerText = symbol + result.steuer.toFixed(2);
            document.getElementById('netResult').innerText = symbol + result.netto.toFixed(2);
            document.getElementById('breakdownText').innerText = L[currentLang].breakdownDE;
        }
    }

    document.getElementById('country').addEventListener('change', calculate);
    document.getElementById('grossSalary').addEventListener('input', calculate);
    document.getElementById('taxClassTR').addEventListener('change', calculate);
    document.getElementById('taxClassDE').addEventListener('change', calculate);
    document.getElementById('churchTax').addEventListener('change', calculate);
    document.getElementById('children').addEventListener('change', calculate);
    document.getElementById('healthZusatz').addEventListener('change', calculate);
    document.getElementById('langToggle').addEventListener('click', function() { setLang(L[currentLang].nextLang); });

    setLang(currentLang);
    calculate();
})();
</script>
</body>
</html>
