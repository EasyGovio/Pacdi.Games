<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alışveriş Listesi | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:24px 20px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:1.4rem; font-weight:800; color:#F6B45F; }
        .lang-btn { font-size:1.3rem; cursor:pointer; background:#0a1018; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid rgba(246,180,95,0.3); color:#F6B45F; }
        .top-actions { display:flex; gap:8px; align-items:center; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.75rem; background:#0a1018; padding:5px 10px; border-radius:30px; border:1px solid rgba(246,180,95,0.3); }
        .add-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        .input-row { display:flex; gap:8px; margin-bottom:8px; }
        .input-group { flex:1; text-align:left; }
        .input-group input, .input-group select { width:100%; padding:10px 12px; border-radius:12px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:0.85rem; outline:none; font-family:inherit; }
        .input-group select { cursor:pointer; appearance:none; -webkit-appearance:none; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="%23F6B45F"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat:no-repeat; background-position:right 8px center; }
        .input-group input:focus, .input-group select:focus { border-color:#F6B45F; }
        .btn { background:#F6B45F; border:none; font-weight:bold; padding:12px 24px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.9rem; width:100%; }
        .btn:active { transform:scale(0.96); }
        .btn.small { padding:8px 16px; font-size:0.75rem; width:auto; }
        .category-tags { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
        .cat-tag { background:#1e2a3a; border:1px solid rgba(246,180,95,0.3); color:#9bb7d4; padding:4px 10px; border-radius:20px; font-size:0.7rem; cursor:pointer; }
        .cat-tag.active { background:#F6B45F; color:#04162E; border-color:#F6B45F; }
        .list-area { background:#0a1018; border-radius:20px; padding:12px; max-height:300px; overflow-y:auto; }
        .list-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.05); gap:8px; }
        .item-info { display:flex; align-items:center; gap:8px; flex:1; }
        .item-check { width:22px; height:22px; border-radius:50%; border:2px solid rgba(246,180,95,0.3); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .item-check.checked { background:#2ECC71; border-color:#2ECC71; color:#04162E; font-size:0.7rem; }
        .item-name { color:#eaf2fb; font-size:0.85rem; }
        .item-name.done { text-decoration:line-through; color:#6c8fb0; }
        .item-cat { font-size:0.6rem; color:#F6B45F; background:rgba(246,180,95,0.1); padding:2px 6px; border-radius:10px; }
        .item-price { color:#2ECC71; font-size:0.75rem; margin-left:4px; }
        .del-item { background:transparent; border:1px solid #E74C3C; color:#E74C3C; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:0.7rem; flex-shrink:0; }
        .total-bar { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); border-radius:20px; padding:12px; margin-top:12px; display:flex; justify-content:space-between; align-items:center; }
        .total-text { color:#F6B45F; font-weight:bold; font-size:1rem; }
        .share-btn { background:#2ECC71; color:#04162E; border:none; padding:8px 16px; border-radius:30px; font-weight:bold; font-size:0.75rem; cursor:pointer; }
        .empty-state { color:#6c8fb0; padding:30px; font-size:0.9rem; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">🛒 ALIŞVERİŞ LİSTESİ</div>
        <div class="top-actions">
            <div class="lang-btn" id="langToggle" title="Dil değiştir">🌐</div>
            <a href="index.html" class="back-link" id="backLink">← Geri</a>
        </div>
    </div>
    <div class="add-area">
        <div class="input-row">
            <div class="input-group" style="flex:2;">
                <input type="text" id="itemName" placeholder="Ürün adı">
            </div>
            <div class="input-group" style="max-width:70px;">
                <input type="number" id="itemQty" placeholder="Adet" value="1" min="1">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <select id="itemCategory">
                    <option value="diger">Kategori</option>
                    <option value="sebze">🥬 Sebze</option>
                    <option value="meyve">🍎 Meyve</option>
                    <option value="et">🥩 Et</option>
                    <option value="sut">🥛 Süt</option>
                    <option value="temizlik">🧹 Temizlik</option>
                    <option value="icecek">🥤 İçecek</option>
                    <option value="diger">📦 Diğer</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="itemPrice" placeholder="Birim fiyat (ops.)" step="0.01">
            </div>
        </div>
        <button class="btn" id="addBtn" style="margin-bottom:8px;">➕ Listeye Ekle</button>
        <div class="category-tags" id="categoryTags">
            <div class="cat-tag active" onclick="filterCategory('all')">Tümü</div>
            <div class="cat-tag" onclick="filterCategory('sebze')">🥬 Sebze</div>
            <div class="cat-tag" onclick="filterCategory('meyve')">🍎 Meyve</div>
            <div class="cat-tag" onclick="filterCategory('et')">🥩 Et</div>
            <div class="cat-tag" onclick="filterCategory('sut')">🥛 Süt</div>
            <div class="cat-tag" onclick="filterCategory('temizlik')">🧹 Temizlik</div>
            <div class="cat-tag" onclick="filterCategory('diger')">📦 Diğer</div>
        </div>
    </div>
    <div class="list-area" id="listArea">
        <div class="empty-state" id="emptyState">Liste boş.</div>
    </div>
    <div class="total-bar" id="totalBar" style="display:none;">
        <div class="total-text">💰 Toplam: <span id="totalPrice">0</span></div>
        <button class="share-btn" onclick="shareList()">📤 Paylaş</button>
    </div>
    <div class="footer" id="footerText">PACDI Games · Alışveriş listesi</div>
</div>

<script>
var L = {
    tr: { title:"🛒 ALIŞVERİŞ LİSTESİ", back:"← Geri", add:"➕ Listeye Ekle", empty:"Liste boş.", total:"💰 Toplam:", footer:"PACDI Games · Alışveriş listesi", nextLang:"de", share:"📤 Liste kopyalandı!" },
    de: { title:"🛒 EINKAUFSLISTE", back:"← Zurück", add:"➕ Hinzufügen", empty:"Liste ist leer.", total:"💰 Summe:", footer:"PACDI Games · Einkaufsliste", nextLang:"en", share:"📤 Liste kopiert!" },
    en: { title:"🛒 SHOPPING LIST", back:"← Back", add:"➕ Add to List", empty:"List is empty.", total:"💰 Total:", footer:"PACDI Games · Shopping List", nextLang:"tr", share:"📤 List copied!" }
};
var currentLang = (navigator.language||'en').toLowerCase().indexOf('de')===0 ? 'de' : (navigator.language||'en').toLowerCase().indexOf('tr')===0 ? 'tr' : 'en';
var items = [];
var currentFilter = 'all';

function loadItems() {
    var saved = localStorage.getItem('pacdi_shopping_' + currentLang);
    if (saved) { try { items = JSON.parse(saved); } catch(e) { items = []; } }
    else items = [];
    renderAll();
}
function saveItems() { localStorage.setItem('pacdi_shopping_' + currentLang, JSON.stringify(items)); }

function setLang(lang) {
    currentLang = lang;
    var t = L[lang];
    document.getElementById('gameTitle').innerText = t.title;
    document.getElementById('backLink').innerText = t.back;
    document.getElementById('addBtn').innerText = t.add;
    document.getElementById('footerText').innerText = t.footer;
    loadItems();
}

function addItem() {
    var name = document.getElementById('itemName').value.trim();
    var qty = parseInt(document.getElementById('itemQty').value) || 1;
    var cat = document.getElementById('itemCategory').value;
    var price = parseFloat(document.getElementById('itemPrice').value) || 0;
    if (!name) return;
    items.push({ name:name, qty:qty, cat:cat, price:price, done:false });
    saveItems();
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = '1';
    document.getElementById('itemPrice').value = '';
    renderAll();
}

function toggleDone(idx) { items[idx].done = !items[idx].done; saveItems(); renderAll(); }
function deleteItem(idx) { items.splice(idx, 1); saveItems(); renderAll(); }

function filterCategory(cat) {
    currentFilter = cat;
    var tags = document.querySelectorAll('.cat-tag');
    for (var i=0; i<tags.length; i++) tags[i].classList.toggle('active', tags[i].textContent.includes(cat === 'all' ? 'Tümü' : '') || (cat !== 'all' && tags[i].textContent.toLowerCase().includes(cat)));
    renderList();
}

function shareList() {
    var t = L[currentLang];
    var text = '🛒 Alışveriş Listesi\n';
    for (var i=0; i<items.length; i++) {
        if (!items[i].done) text += '☐ ' + items[i].name + ' x' + items[i].qty + (items[i].price ? ' (' + (items[i].price * items[i].qty).toFixed(2) + ' TL)' : '') + '\n';
    }
    navigator.clipboard.writeText(text).then(function() { alert(t.share); });
}

function renderList() {
    var list = document.getElementById('listArea');
    var t = L[currentLang];
    var filtered = currentFilter === 'all' ? items : items.filter(function(i) { return i.cat === currentFilter; });
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">' + t.empty + '</div>'; }
    else {
        list.innerHTML = '';
        for (var i=0; i<items.length; i++) {
            if (currentFilter !== 'all' && items[i].cat !== currentFilter) continue;
            var item = items[i]; var origIdx = items.indexOf(item);
            var div = document.createElement('div'); div.className = 'list-item';
            div.innerHTML = 
                '<div class="item-info">' +
                '<div class="item-check' + (item.done ? ' checked' : '') + '" onclick="toggleDone('+origIdx+')">' + (item.done ? '✓' : '') + '</div>' +
                '<span class="item-name' + (item.done ? ' done' : '') + '">' + item.name + '</span>' +
                '<span class="item-cat">' + item.cat + '</span>' +
                (item.price ? '<span class="item-price">' + (item.price * item.qty).toFixed(2) + ' TL</span>' : '') +
                '</div>' +
                '<button class="del-item" onclick="deleteItem('+origIdx+')">✕</button>';
            list.appendChild(div);
        }
    }
    var total = items.reduce(function(s, i) { return s + (i.price ? i.price * i.qty : 0); }, 0);
    var bar = document.getElementById('totalBar');
    if (total > 0) {
        bar.style.display = 'flex';
        document.getElementById('totalPrice').innerText = total.toFixed(2) + ' TL';
    } else { bar.style.display = 'none'; }
}
function renderAll() { renderList(); }

window.toggleDone = toggleDone;
window.deleteItem = deleteItem;
window.filterCategory = filterCategory;
window.shareList = shareList;

document.getElementById('addBtn').addEventListener('click', addItem);
document.getElementById('langToggle').addEventListener('click', function() { setLang(L[currentLang].nextLang); });
setLang(currentLang);
</script>
</body>
</html>
