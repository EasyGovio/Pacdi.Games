<div class="game-container">
  <div class="header">
    <div class="logo">PACDI<span>Games</span></div>
    <a href="index.html" class="back-link">← Geri</a>

    <div>📏 Uzunluk: <span id="length">1</span></div>
    <div>🏆 En Uzun: <span id="bestScore">—</span></div>
    <button id="resetBtn">Yeni Oyun</button>
  </div>
  <div id="sequenceDisplay" class="sequence-box">???</div>
  <input type="text" id="userInput" placeholder="Diziyi boşlukla ayırarak girin (örn: 3 5 1)">
  <button id="submitBtn">Kontrol Et</button>
  <div class="message" id="message">Diziyi izle ve hatırla!</div>
</div>

<script>
  (function() {
    var currentSequence = [], currentLength = 1, maxLength = 0;
    var gameActive = true, showing = false, timeoutId = null;
    var bestKey = "numbersBest";

    function updateBestDisplay() {
      var b = localStorage.getItem(bestKey);
      document.getElementById("bestScore").innerText = b ? b : "—";
    }
    function saveBest() {
      if(currentLength-1 > maxLength) maxLength = currentLength-1;
      var best = localStorage.getItem(bestKey);
      if(!best || maxLength > parseInt(best)) {
        localStorage.setItem(bestKey, maxLength);
        updateBestDisplay();
      }
    }
    function generateRandomSequence(len) {
      var arr = [];
      for(var i=0;i<len;i++) arr.push(Math.floor(Math.random()*9)+1);
      return arr;
    }
    function showSequence() {
      if(timeoutId) clearTimeout(timeoutId);
      showing = true;
      document.getElementById("sequenceDisplay").innerText = currentSequence.join(" ");
      timeoutId = setTimeout(function() {
        document.getElementById("sequenceDisplay").innerText = "???";
        showing = false;
        document.getElementById("message").innerText = "Şimdi diziyi aynen gir (boşlukla ayırarak)";
        timeoutId = null;
      }, 2000);
    }
    function nextRound() {
      currentLength++;
      document.getElementById("length").innerText = currentLength;
      currentSequence = generateRandomSequence(currentLength);
      showSequence();
    }
    function checkAnswer() {
      if(showing) {
        document.getElementById("message").innerText = "Lütfen dizinin gösterilmesini bekle.";
        return;
      }
      var input = document.getElementById("userInput").value.trim().split(/\s+/).map(Number);
      if(input.length !== currentSequence.length) {
        document.getElementById("message").innerText = "Yanlış uzunluk! ("+currentSequence.length+" sayı girmelisiniz)";
        return;
      }
      var correct = true;
      for(var i=0;i<input.length;i++) if(input[i] !== currentSequence[i]) correct = false;
      if(correct) {
        document.getElementById("message").innerText = "Doğru! Sonraki tur...";
        document.getElementById("userInput").value = "";
        if(currentLength > maxLength) maxLength = currentLength;
        saveBest();
        nextRound();
      } else {
        gameActive = false;
        saveBest();
        document.getElementById("message").innerHTML = "❌ Oyun bitti! En uzun doğru dizi uzunluğu: "+maxLength+"<br><button onclick='resetGame()'>Tekrar Oyna</button>";
        document.getElementById("submitBtn").disabled = true;
      }
    }
    function resetGame() {
      if(timeoutId) clearTimeout(timeoutId);
      gameActive = true;
      currentLength = 1;
      maxLength = 0;
      document.getElementById("length").innerText = "1";
      currentSequence = generateRandomSequence(1);
      showSequence();
      document.getElementById("userInput").value = "";
      document.getElementById("submitBtn").disabled = false;
      updateBestDisplay();
      document.getElementById("message").innerText = "Yeni oyun! Diziyi izle.";
    }
    document.getElementById("submitBtn").addEventListener("click", checkAnswer);
    document.getElementById("resetBtn").addEventListener("click", resetGame);
    resetGame();
  })();
</script>

<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandalone = ('standalone' in navigator && navigator.standalone);
  var shown = sessionStorage.getItem('pwa-banner-shown');
  if (shown || isInStandalone) return;

  // iOS Safari — manuel yönlendirme
  if (isIOS) {
    setTimeout(function() {
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:14px 16px;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div>' +
            '<div style="color:#F6B45F;font-size:0.82rem;font-weight:700;margin-bottom:4px;">📲 Ana ekrana ekle</div>' +
            '<div style="color:#b0b5bf;font-size:0.75rem;line-height:1.5;">' +
              'Safari'de <strong style="color:#eaf2fb;">&#11015; Paylaş</strong> butonuna bas, ' +
              'ardından <strong style="color:#eaf2fb;">Ana Ekrana Ekle</strong> seçeneğini seç.' +
            '</div>' +
            '<div style="color:#4a6a88;font-size:0.68rem;margin-top:4px;">&#9432; iOS'ta otomatik kurulum desteklenmiyor — bu adım gerekli.</div>' +
          '</div>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" ' +
            'style="background:transparent;border:none;color:#7a9ab8;font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>' +
        '</div>';
      document.body.appendChild(bar);
      sessionStorage.setItem('pwa-banner-shown', '1');
    }, 3000);
    return;
  }

  // Android / Desktop Chrome — otomatik install prompt
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() {
      if (!deferredPrompt) return;
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +
        '</div>';
      document.body.appendChild(bar);
    }, 3000);
  });

  window.installPWA = function() {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    var b = document.getElementById('pwa-banner'); if (b) b.remove();
    sessionStorage.setItem('pwa-banner-shown', '1');
  };
})();
</script>
