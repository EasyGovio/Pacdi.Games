<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">YAPILACAKLAR</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="todo-area">
        <div class="input-row">
            <input type="text" class="todo-input" id="todoInput" placeholder="Yeni görev..." maxlength="100">
            <button class="add-btn" id="addBtn">Ekle</button>
        </div>
        <ul class="todo-list" id="todoList">
            <li class="empty-state" id="emptyState">Henüz görev yok.</li>
        </ul>
    </div>
    <div class="footer" id="footerText">PACDI Games · Görevlerini tamamla, hayatını düzenle.</div>
</div>
<script>
(function(){
    var langData = {
        tr: { title:"YAPILACAKLAR", back:"← Geri", placeholder:"Yeni görev...", add:"Ekle", empty:"Henüz görev yok.", footer:"PACDI Games · Görevlerini tamamla, hayatını düzenle." },
        de: { title:"AUFGABEN", back:"← Zurück", placeholder:"Neue Aufgabe...", add:"Hinzufügen", empty:"Noch keine Aufgaben.", footer:"PACDI Games · Aufgaben erledigen, Leben organisieren." },
        en: { title:"TO DO LIST", back:"← Back", placeholder:"New task...", add:"Add", empty:"No tasks yet.", footer:"PACDI Games · Complete tasks, organize your life." }
    };
    var currentLang = "tr";
    var todos = [];

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('todoInput').placeholder=t.placeholder;
        document.getElementById('addBtn').innerText=t.add;
        document.getElementById('footerText').innerText=t.footer;
        if(todos.length===0) document.getElementById('emptyState').innerText = t.empty;
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    function loadTodos() {
        var saved = localStorage.getItem('pacdi_todos_' + currentLang);
        if(saved) { try { todos = JSON.parse(saved); } catch(e){ todos = []; } }
        else todos = [];
        renderTodos();
    }

    function saveTodos() {
        localStorage.setItem('pacdi_todos_' + currentLang, JSON.stringify(todos));
    }

    function addTodo() {
        var input = document.getElementById('todoInput');
        var text = input.value.trim();
        if(!text) return;
        todos.push({ text:text, done:false });
        input.value = '';
        saveTodos();
        renderTodos();
        input.focus();
    }

    function toggleTodo(index) {
        todos[index].done = !todos[index].done;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(index) {
        todos.splice(index, 1);
        saveTodos();
        renderTodos();
    }

    function renderTodos() {
        var list = document.getElementById('todoList');
        list.innerHTML = '';
        if(todos.length === 0) {
            var empty = document.createElement('li');
            empty.className = 'empty-state';
            empty.id = 'emptyState';
            empty.innerText = langData[currentLang].empty;
            list.appendChild(empty);
            return;
        }
        for(var i=0;i<todos.length;i++) {
            var item = document.createElement('li');
            item.className = 'todo-item' + (todos[i].done ? ' done' : '');
            var check = document.createElement('button');
            check.className = 'check-btn';
            check.innerText = todos[i].done ? '✓' : '';
            check.addEventListener('click', (function(idx){ return function(){ toggleTodo(idx); }; })(i));
            var text = document.createElement('span');
            text.className = 'todo-text';
            text.innerText = todos[i].text;
            var del = document.createElement('button');
            del.className = 'del-btn';
            del.innerText = '✕';
            del.addEventListener('click', (function(idx){ return function(){ deleteTodo(idx); }; })(i));
            item.appendChild(check);
            item.appendChild(text);
            item.appendChild(del);
            list.appendChild(item);
        }
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    document.getElementById('todoInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addTodo(); });

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) { currentLang=l; updateLanguage(); loadTodos(); } });

    setLanguage('tr');
    loadTodos();
})();
</script>

<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandalone = ('standalone' in navigator && navigator.standalone);
  var shown = sessionStorage.getItem('pwa-banner-shown');
  if (shown || isInStandalone) return;

  // iOS Safari — manuel yönlendirme
  if (isIOS) {
    setTimeout(function() {
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:14px 16px;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div>' +
            '<div style="color:#F6B45F;font-size:0.82rem;font-weight:700;margin-bottom:4px;">📲 Ana ekrana ekle</div>' +

          '</div>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" ' +
            'style="background:transparent;border:none;color:#7a9ab8;font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>' +
        '</div>';
      document.body.appendChild(bar);
      sessionStorage.setItem('pwa-banner-shown', '1');
    }, 3000);
    return;
  }

  // Android / Desktop Chrome — otomatik install prompt
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() {
      if (!deferredPrompt) return;
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +
          '<button onclick="document.getElementById('pwa-banner').remove();sessionStorage.setItem('pwa-banner-shown','1')" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +
        '</div>';
      document.body.appendChild(bar);
    }, 3000);
  });

  window.installPWA = function() {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    var b = document.getElementById('pwa-banner'); if (b) b.remove();
    sessionStorage.setItem('pwa-banner-shown', '1');
  };
})();
</script>
