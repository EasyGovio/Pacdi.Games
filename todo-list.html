<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yapılacaklar | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .todo-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        .input-row { display:flex; gap:8px; margin-bottom:16px; }
        .todo-input { flex:1; padding:12px 16px; border-radius:16px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:0.95rem; outline:none; font-family:inherit; }
        .todo-input:focus { border-color:#F6B45F; }
        .add-btn { background:#F6B45F; border:none; font-weight:bold; padding:12px 20px; border-radius:16px; color:#04162E; cursor:pointer; font-size:0.9rem; white-space:nowrap; }
        .add-btn:active { transform:scale(0.96); }
        .todo-list { list-style:none; max-height:350px; overflow-y:auto; }
        .todo-item { display:flex; align-items:center; gap:8px; padding:10px 12px; background:#1e2a3a; border-radius:14px; margin-bottom:8px; transition:0.15s; }
        .todo-text { flex:1; color:#eaf2fb; font-size:0.9rem; text-align:left; word-break:break-word; }
        .todo-item.done .todo-text { text-decoration:line-through; color:#6c8fb0; }
        .check-btn { width:28px; height:28px; border-radius:50%; border:2px solid rgba(246,180,95,0.3); background:transparent; color:transparent; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .todo-item.done .check-btn { background:#2ECC71; border-color:#2ECC71; color:#04162E; }
        .del-btn { width:28px; height:28px; border-radius:50%; border:2px solid rgba(231,76,60,0.3); background:transparent; color:#E74C3C; cursor:pointer; font-size:0.8rem; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .del-btn:active { background:#E74C3C; color:#fff; }
        .empty-state { color:#6c8fb0; padding:30px; font-size:0.9rem; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">YAPILACAKLAR</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="todo-area">
        <div class="input-row">
            <input type="text" class="todo-input" id="todoInput" placeholder="Yeni görev..." maxlength="100">
            <button class="add-btn" id="addBtn">Ekle</button>
        </div>
        <ul class="todo-list" id="todoList">
            <li class="empty-state" id="emptyState">Henüz görev yok.</li>
        </ul>
    </div>
    <div class="footer" id="footerText">PACDI Games · Görevlerini tamamla, hayatını düzenle.</div>
</div>
<script>
(function(){
    var langData = {
        tr: { title:"YAPILACAKLAR", back:"← Geri", placeholder:"Yeni görev...", add:"Ekle", empty:"Henüz görev yok.", footer:"PACDI Games · Görevlerini tamamla, hayatını düzenle." },
        de: { title:"AUFGABEN", back:"← Zurück", placeholder:"Neue Aufgabe...", add:"Hinzufügen", empty:"Noch keine Aufgaben.", footer:"PACDI Games · Aufgaben erledigen, Leben organisieren." },
        en: { title:"TO DO LIST", back:"← Back", placeholder:"New task...", add:"Add", empty:"No tasks yet.", footer:"PACDI Games · Complete tasks, organize your life." }
    };
    var currentLang = "tr";
    var todos = [];

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('todoInput').placeholder=t.placeholder;
        document.getElementById('addBtn').innerText=t.add;
        document.getElementById('footerText').innerText=t.footer;
        if(todos.length===0) document.getElementById('emptyState').innerText = t.empty;
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    function loadTodos() {
        var saved = localStorage.getItem('pacdi_todos_' + currentLang);
        if(saved) { try { todos = JSON.parse(saved); } catch(e){ todos = []; } }
        else todos = [];
        renderTodos();
    }

    function saveTodos() {
        localStorage.setItem('pacdi_todos_' + currentLang, JSON.stringify(todos));
    }

    function addTodo() {
        var input = document.getElementById('todoInput');
        var text = input.value.trim();
        if(!text) return;
        todos.push({ text:text, done:false });
        input.value = '';
        saveTodos();
        renderTodos();
        input.focus();
    }

    function toggleTodo(index) {
        todos[index].done = !todos[index].done;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(index) {
        todos.splice(index, 1);
        saveTodos();
        renderTodos();
    }

    function renderTodos() {
        var list = document.getElementById('todoList');
        list.innerHTML = '';
        if(todos.length === 0) {
            var empty = document.createElement('li');
            empty.className = 'empty-state';
            empty.id = 'emptyState';
            empty.innerText = langData[currentLang].empty;
            list.appendChild(empty);
            return;
        }
        for(var i=0;i<todos.length;i++) {
            var item = document.createElement('li');
            item.className = 'todo-item' + (todos[i].done ? ' done' : '');
            var check = document.createElement('button');
            check.className = 'check-btn';
            check.innerText = todos[i].done ? '✓' : '';
            check.addEventListener('click', (function(idx){ return function(){ toggleTodo(idx); }; })(i));
            var text = document.createElement('span');
            text.className = 'todo-text';
            text.innerText = todos[i].text;
            var del = document.createElement('button');
            del.className = 'del-btn';
            del.innerText = '✕';
            del.addEventListener('click', (function(idx){ return function(){ deleteTodo(idx); }; })(i));
            item.appendChild(check);
            item.appendChild(text);
            item.appendChild(del);
            list.appendChild(item);
        }
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    document.getElementById('todoInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addTodo(); });

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) { currentLang=l; updateLanguage(); loadTodos(); } });

    setLanguage('tr');
    loadTodos();
})();
</script>
</body>
</html>
