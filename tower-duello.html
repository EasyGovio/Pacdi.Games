<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kuleden Kule | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:600px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .info-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1018; border-radius:40px; padding:7px 16px; margin-bottom:14px; }
        .player-turn { color:#F6B45F; font-weight:bold; font-size:0.9rem; }
        .new-btn { background:#F6B45F; border:none; font-weight:bold; padding:5px 14px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.78rem; }
        .towers-container { display:flex; justify-content:space-around; gap:10px; margin-bottom:16px; }
        .tower { display:flex; flex-direction:column-reverse; align-items:center; gap:2px; min-width:70px; min-height:100px; background:#0a1018; border-radius:16px; padding:8px; cursor:pointer; border:2px solid rgba(246,180,95,0.2); transition:0.1s; }
        .tower.selected { border-color:#F6B45F; background:rgba(246,180,95,0.1); }
        .disk { height:14px; border-radius:8px; margin:1px 0; }
        .disk.p1 { background:#3498DB; }
        .disk.p2 { background:#E74C3C; }
        .message { color:#F6B45F; font-size:0.9rem; font-weight:bold; min-height:24px; margin:4px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">KULEDEN KULE</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div class="info-bar">
        <div class="player-turn" id="turnDisplay">Sıra: <span style="color:#3498DB">Oyuncu 1</span></div>
        <button class="new-btn" onclick="resetGame()">↺ Yeni Oyun</button>
    </div>
    <div class="towers-container" id="towersContainer">
        <div class="tower" id="tower0"></div>
        <div class="tower" id="tower1"></div>
        <div class="tower" id="tower2"></div>
        <div class="tower" id="tower3"></div>
        <div class="tower" id="tower4"></div>
    </div>
    <div class="message" id="message">Sırayla bir diski seç, başka kuleye taşı</div>
    <div class="footer">PACDI Games · İki kişilik kule düellosu.</div>
</div>
<script>
(function(){
    var towers = [[], [], [], [], []];
    var currentPlayer = 0;
    var selectedTower = null;
    var gameOver = false;

    function initTowers() {
        towers = [[], [], [], [], []];
        // Oyuncu 1 diskleri: tower 0'da
        for(var i=3; i>=1; i--) towers[0].push({ player:0, size:i });
        // Oyuncu 2 diskleri: tower 4'te
        for(var i=3; i>=1; i--) towers[4].push({ player:1, size:i });
    }

    function resetGame() {
        initTowers();
        currentPlayer = 0;
        selectedTower = null;
        gameOver = false;
        document.getElementById('message').innerText = 'Sırayla bir diski seç, başka kuleye taşı';
        document.getElementById('turnDisplay').innerHTML = 'Sıra: <span style="color:#3498DB">Oyuncu 1</span>';
        renderTowers();
    }

    function renderTowers() {
        for(var t=0; t<5; t++) {
            var towerDiv = document.getElementById('tower' + t);
            towerDiv.innerHTML = '';
            towerDiv.classList.remove('selected');
            if(selectedTower === t) towerDiv.classList.add('selected');

            for(var d=0; d<towers[t].length; d++) {
                var disk = document.createElement('div');
                disk.className = 'disk ' + (towers[t][d].player === 0 ? 'p1' : 'p2');
                disk.style.width = (20 + towers[t][d].size * 10) + 'px';
                towerDiv.appendChild(disk);
            }
        }
    }

    function handleTowerClick(towerIdx) {
        if(gameOver) return;

        if(selectedTower === null) {
            // Kule seç
            if(towers[towerIdx].length > 0 && towers[towerIdx][towers[towerIdx].length-1].player === currentPlayer) {
                selectedTower = towerIdx;
                document.getElementById('message').innerText = 'Disk seçildi. Taşımak için başka bir kuleye tıkla';
            }
        } else {
            // Taşıma yap
            if(selectedTower === towerIdx) {
                selectedTower = null;
                document.getElementById('message').innerText = 'Seçim iptal edildi';
            } else {
                var srcTop = towers[selectedTower][towers[selectedTower].length-1];
                var canPlace = towers[towerIdx].length === 0 || towers[towerIdx][towers[towerIdx].length-1].size > srcTop.size;
                if(canPlace) {
                    towers[towerIdx].push(towers[selectedTower].pop());
                    selectedTower = null;
                    // Kazanma kontrolü
                    if(checkWin(currentPlayer)) {
                        gameOver = true;
                        document.getElementById('message').innerText = '🎉 Oyuncu ' + (currentPlayer+1) + ' kazandı! Disklerini topladı!';
                    } else {
                        currentPlayer = 1 - currentPlayer;
                        document.getElementById('message').innerText = 'Sıra Oyuncu ' + (currentPlayer+1) + '\'de';
                    }
                    document.getElementById('turnDisplay').innerHTML = 'Sıra: <span style="color:' + (currentPlayer===0?'#3498DB':'#E74C3C') + '">Oyuncu ' + (currentPlayer+1) + '</span>';
                } else {
                    document.getElementById('message').innerText = 'Buraya taşıyamazsın! Daha büyük disk var';
                    selectedTower = null;
                }
            }
        }
        renderTowers();
    }

    function checkWin(player) {
        // Oyuncunun tüm diskleri tek bir kulede mi?
        for(var t=0; t<5; t++) {
            if(towers[t].length === 3) {
                var allSame = true;
                for(var d=0; d<towers[t].length; d++) {
                    if(towers[t][d].player !== player) { allSame = false; break; }
                }
                if(allSame) return true;
            }
        }
        return false;
    }

    for(var i=0; i<5; i++) {
        document.getElementById('tower'+i).addEventListener('click', (function(idx) {
            return function() { handleTowerClick(idx); };
        })(i));
    }

    resetGame();
})();
</script>
</body>
</html>
