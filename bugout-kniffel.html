<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bugout Kniffel | PACDI Games</title>
    <script src="https://cdn.jsdelivr.net/npm/bugout@0.0.13/dist/bugout.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:520px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lobby-area, .game-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        h3 { color:#F6B45F; margin-bottom:10px; }
        .room-input { width:100%; padding:12px 16px; border-radius:16px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:1rem; text-align:center; outline:none; margin-bottom:10px; }
        .btn { background:#F6B45F; border:none; font-weight:bold; padding:10px 20px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.85rem; margin:4px; }
        .btn:disabled { opacity:0.3; pointer-events:none; }
        .dice-row { display:flex; justify-content:center; gap:10px; margin:14px 0; }
        .die { width:54px; height:54px; border-radius:14px; background:#1e2a3a; border:2px solid rgba(246,180,95,0.3); display:flex; align-items:center; justify-content:center; font-size:1.8rem; cursor:pointer; transition:0.1s; }
        .die.held { background:rgba(46,204,113,0.2); border-color:#2ECC71; }
        .scorecard { background:#0a1018; border-radius:20px; padding:12px; margin-top:10px; text-align:left; }
        .score-row { display:flex; justify-content:space-between; align-items:center; padding:4px 8px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .score-label { color:#9bb7d4; font-size:0.75rem; }
        .score-value { color:#eaf2fb; font-weight:bold; font-size:0.8rem; cursor:pointer; padding:2px 8px; border-radius:8px; }
        .score-value.empty { color:#F6B45F; background:rgba(246,180,95,0.1); }
        .message { color:#F6B45F; font-size:0.85rem; font-weight:bold; min-height:22px; margin:4px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:8px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">BUGOUT KNIFFEL</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div id="lobbyArea" class="lobby-area">
  <h3>Oyun Odasına Katıl</h3>
  <div style="color:#9bb7d4; font-size:0.72rem; margin-bottom:12px; line-height:1.5; text-align:left; background:rgba(246,180,95,0.05); padding:10px; border-radius:12px; border:1px solid rgba(246,180,95,0.15);">
    <strong style="color:#F6B45F;">📋 Nasıl oynanır?</strong><br>
    ❶ Kutuyu boş bırakıp <strong>"Odaya Bağlan"</strong>a bas.<br>
    ❷ Çıkan <strong>kodu arkadaşına</strong> gönder.<br>
    ❸ Arkadaşın kodu girip <strong>"Odaya Bağlan"</strong>a bassın.<br>
    ❹ 🎮 Oyun başlasın!
  </div>
  <input type="text" id="roomIdInput" class="room-input" placeholder="Arkadaşından aldığın kodu buraya yaz...">
  <button id="connectBtn" class="btn">Odaya Bağlan</button>
  <p style="color:#9bb7d4; font-size:0.8rem; margin-top:8px;" id="roomInfo"></p>
</div>
    <div id="gameArea" class="game-area hidden">
        <h3>🎲 Bugout Kniffel</h3>
        <div class="dice-row" id="diceRow"></div>
        <div style="margin:8px 0;">
            <button class="btn" id="rollBtn">🎲 Zar At</button>
            <span style="color:#9bb7d4; margin-left:10px;" id="rollsLeft">3 atış</span>
        </div>
        <div class="scorecard" id="scorecard"></div>
        <div class="message" id="gameMessage">Rakip bekleniyor...</div>
    </div>
    <div class="footer">PACDI Games · Bugout ile uzaktan kniffel.</div>
</div>
<script>
var bugout, myId, peerId, isHost = false;
var dice = [1,1,1,1,1], held = [false,false,false,false,false];
var rollsLeft = 3, myTurn = false, gameOver = false;
var scores = { me:{ upper:[null,null,null,null,null,null], lower:[null,null,null,null,null,null,null], total:0 },
               opp:{ upper:[null,null,null,null,null,null], lower:[null,null,null,null,null,null,null], total:0 } };
var upperLabels = ['1ler','2ler','3ler','4ler','5ler','6lar'];
var lowerLabels = ['3 Aynı','4 Aynı','Full','Küçük Kent','Büyük Kent','Kniffel','Şans'];
var hasRolled = false;

function sendMessage(data) { if(bugout && peerId) bugout.send(peerId, JSON.stringify(data)); }

function handleMessage(raw) {
    var msg; try { msg = JSON.parse(raw); } catch(e) { return; }
    if(msg.type === 'roll') { dice = msg.dice; rollsLeft = msg.rollsLeft; renderDice(); updateRolls(); }
    else if(msg.type === 'score') { scores.opp = msg.scores; myTurn = true; hasRolled = false; rollsLeft = 3; held = [false,false,false,false,false]; dice = [1,1,1,1,1]; renderDice(); renderScorecard(); updateRolls(); document.getElementById('gameMessage').innerText = 'Sıra sende! Zar at.'; checkGameOver(); }
    else if(msg.type === 'gameOver') { gameOver = true; document.getElementById('gameMessage').innerText = msg.winner==='me'?'🎉 Sen kazandın!':'😔 Kaybettin.'; }
}

function rollDice() {
    if(!myTurn || gameOver) return;
    if(rollsLeft > 0) {
        for(var i=0;i<5;i++) if(!held[i]) dice[i] = Math.floor(Math.random()*6)+1;
        rollsLeft--; hasRolled = true;
        sendMessage({ type:'roll', dice:dice, rollsLeft:rollsLeft });
        renderDice(); updateRolls();
    }
}

function renderDice() {
    var row = document.getElementById('diceRow');
    row.innerHTML = '';
    var faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    for(var i=0;i<5;i++) {
        var d = document.createElement('div');
        d.className = 'die' + (held[i]?' held':'');
        d.innerText = faces[dice[i]-1];
        if(myTurn && hasRolled && rollsLeft < 3) {
            d.addEventListener('click', (function(idx){ return function(){ held[idx]=!held[idx]; renderDice(); }; })(i));
        }
        row.appendChild(d);
    }
}

function updateRolls() {
    document.getElementById('rollsLeft').innerText = rollsLeft + ' atış';
    document.getElementById('rollBtn').disabled = !myTurn || rollsLeft <= 0 || gameOver;
}

function calcScore(isUpper, idx) {
    var counts = [0,0,0,0,0,0];
    for(var i=0;i<5;i++) counts[dice[i]-1]++;
    if(isUpper) return counts[idx] * (idx+1);
    switch(idx) {
        case 0: return counts.some(function(c){return c>=3;})?dice.reduce(function(a,b){return a+b;},0):0;
        case 1: return counts.some(function(c){return c>=4;})?dice.reduce(function(a,b){return a+b;},0):0;
        case 2: return counts.some(function(c){return c===3;})&&counts.some(function(c){return c===2;})?25:0;
        case 3: return ([1,2,3,4].every(function(v){return counts[v-1]>=1;})||[2,3,4,5].every(function(v){return counts[v-1]>=1;})||[3,4,5,6].every(function(v){return counts[v-1]>=1;}))?30:0;
        case 4: return ([1,2,3,4,5].every(function(v){return counts[v-1]>=1;})||[2,3,4,5,6].every(function(v){return counts[v-1]>=1;}))?40:0;
        case 5: return counts.some(function(c){return c>=5;})?50:0;
        case 6: return dice.reduce(function(a,b){return a+b;},0);
    }
    return 0;
}

function scoreCategory(isUpper, idx) {
    if(!myTurn || gameOver || !hasRolled) return;
    var arr = isUpper ? scores.me.upper : scores.me.lower;
    if(arr[idx] !== null) return;
    var pts = calcScore(isUpper, idx);
    arr[idx] = pts;
    scores.me.total += pts;
    myTurn = false; hasRolled = false; rollsLeft = 3; held = [false,false,false,false,false]; dice = [1,1,1,1,1];
    sendMessage({ type:'score', scores:scores.me });
    renderDice(); renderScorecard(); updateRolls();
    document.getElementById('gameMessage').innerText = 'Rakip düşünüyor...';
    checkGameOver();
}

function checkGameOver() {
    var allFilled = scores.me.upper.every(function(v){return v!==null;}) && scores.me.lower.every(function(v){return v!==null;}) &&
                    scores.opp.upper.every(function(v){return v!==null;}) && scores.opp.lower.every(function(v){return v!==null;});
    if(allFilled) {
        gameOver = true;
        var winner = scores.me.total > scores.opp.total ? 'me' : (scores.opp.total > scores.me.total ? 'opp' : 'draw');
        if(winner === 'me') { document.getElementById('gameMessage').innerText = '🎉 Sen kazandın!'; }
        else if(winner === 'opp') { document.getElementById('gameMessage').innerText = '😔 Kaybettin.'; }
        else { document.getElementById('gameMessage').innerText = '🤝 Berabere!'; }
        sendMessage({ type:'gameOver', winner:winner==='me'?'me':'opp' });
    }
}

function renderScorecard() {
    var card = document.getElementById('scorecard');
    var html = '<div style="display:flex;justify-content:space-around;font-weight:bold;color:#F6B45F;margin-bottom:4px;">';
    html += '<span>Sen: '+scores.me.total+'</span><span>Rakip: '+scores.opp.total+'</span></div>';
    for(var i=0;i<6;i++) {
        html += '<div class="score-row"><span class="score-label">'+upperLabels[i]+'</span>';
        html += '<span class="score-value'+(scores.me.upper[i]===null?' empty':'')+'" onclick="window._sc(true,'+i+')">'+(scores.me.upper[i]!==null?scores.me.upper[i]:'?')+'</span>';
        html += '<span style="color:#6c8fb0;font-size:0.7rem;">'+(scores.opp.upper[i]!==null?scores.opp.upper[i]:'-')+'</span></div>';
    }
    for(var j=0;j<7;j++) {
        html += '<div class="score-row"><span class="score-label">'+lowerLabels[j]+'</span>';
        html += '<span class="score-value'+(scores.me.lower[j]===null?' empty':'')+'" onclick="window._sc(false,'+j+')">'+(scores.me.lower[j]!==null?scores.me.lower[j]:'?')+'</span>';
        html += '<span style="color:#6c8fb0;font-size:0.7rem;">'+(scores.opp.lower[j]!==null?scores.opp.lower[j]:'-')+'</span></div>';
    }
    card.innerHTML = html;
}

window._sc = function(isUpper, idx) { scoreCategory(isUpper, idx); };

document.getElementById('rollBtn').addEventListener('click', rollDice);
document.getElementById('connectBtn').addEventListener('click', function() {
    var roomId = document.getElementById('roomIdInput').value.trim();
    bugout = roomId ? new Bugout(roomId) : new Bugout();
    bugout.address().then(function(address) {
        myId = address;
        document.getElementById('roomInfo').innerHTML = 'Senin adresin: <b>'+myId+'</b><br>Bu kodu arkadaşına gönder.';
        if(!roomId) isHost = true;
    });
    bugout.on('message', function(address, message) {
        if(!peerId) {
            peerId = address;
            document.getElementById('lobbyArea').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            myTurn = isHost;
            renderDice(); renderScorecard(); updateRolls();
            document.getElementById('gameMessage').innerText = isHost ? 'Sıra sende! Zar at.' : 'Rakip başlayacak...';
        }
        handleMessage(message);
    });
});
</script>
</body>
</html>
