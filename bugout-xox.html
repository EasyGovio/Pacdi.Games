<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bugout XOX Test | PACDI Games</title>
    <script src="bugout.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#04162E; font-family:sans-serif; color:#eaf2fb; padding:20px; text-align:center; }
        .btn { background:#F6B45F; border:none; padding:14px 28px; border-radius:40px; color:#04162E; font-weight:bold; font-size:1rem; cursor:pointer; margin:10px; }
        .info { color:#F6B45F; margin:10px 0; font-size:0.9rem; }
    </style>
</head>
<body>
    <h2 style="color:#F6B45F;">Bugout XOX - Bağlantı Testi</h2>
    <input type="text" id="roomInput" placeholder="Oda kodu (boş bırak= yeni oda)" style="padding:10px; width:80%; border-radius:10px; margin:10px 0;">
    <br>
    <button class="btn" id="connectBtn">Odaya Bağlan</button>
    <div class="info" id="status"></div>

    <script>
        document.getElementById('connectBtn').addEventListener('click', function() {
            var roomId = document.getElementById('roomInput').value.trim();
            var statusEl = document.getElementById('status');

            statusEl.innerText = 'Bağlantı kuruluyor...';

            try {
                var bugout = roomId ? new Bugout(roomId) : new Bugout();

                bugout.address().then(function(address) {
                    statusEl.innerHTML = '✅ Bağlantı başarılı!<br>📡 <b>Senin kodun:</b> ' + address + '<br><br>Bu kodu arkadaşına gönder.';
                }).catch(function(err) {
                    statusEl.innerText = '❌ Hata: ' + err.message;
                });

            } catch(e) {
                statusEl.innerText = '❌ Bugout yüklenemedi: ' + e.message;
            }
        });
    </script>
</body>
</html>
