<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tansiyon & Şeker Takibi | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:520px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:24px 20px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .logo { font-size:1.4rem; font-weight:800; color:#F6B45F; }
        .lang-btn { font-size:1.3rem; cursor:pointer; background:#0a1018; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:1px solid rgba(246,180,95,0.3); color:#F6B45F; }
        .top-actions { display:flex; gap:8px; align-items:center; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.75rem; background:#0a1018; padding:5px 10px; border-radius:30px; border:1px solid rgba(246,180,95,0.3); }
        .add-area { background:#0a1018; border-radius:28px; padding:20px 16px; margin-bottom:20px; }
        .input-row { display:flex; gap:8px; margin-bottom:10px; }
        .input-group { flex:1; text-align:left; }
        .input-group label { color:#9bb7d4; font-size:0.7rem; display:block; margin-bottom:4px; }
        .input-group input, .input-group select { width:100%; padding:10px 12px; border-radius:12px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:0.9rem; outline:none; font-family:inherit; }
        .input-group input:focus { border-color:#F6B45F; }
        .btn { background:#F6B45F; border:none; font-weight:bold; padding:12px 24px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.9rem; width:100%; }
        .btn:active { transform:scale(0.96); }
        .chart-area { background:#0a1018; border-radius:20px; padding:12px; margin:12px 0; }
        canvas { width:100%; height:200px; border-radius:12px; }
        .log-list { display:flex; flex-direction:column; gap:6px; max-height:250px; overflow-y:auto; }
        .log-item { background:#0a1018; border-radius:16px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(246,180,95,0.15); font-size:0.8rem; }
        .log-value { font-weight:bold; color:#F6B45F; }
        .log-value.normal { color:#2ECC71; }
        .log-value.high { color:#E74C3C; }
        .log-value.low { color:#3498DB; }
        .log-date { color:#6c8fb0; font-size:0.7rem; }
        .log-type { color:#9bb7d4; font-size:0.65rem; }
        .del-log { background:transparent; border:1px solid #E74C3C; color:#E74C3C; width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:0.6rem; }
        .empty-state { color:#6c8fb0; padding:30px; font-size:0.9rem; }
        .info-box { background:rgba(246,180,95,0.08); border:1px solid rgba(246,180,95,0.2); border-radius:12px; padding:10px; margin-bottom:12px; font-size:0.7rem; color:#9bb7d4; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">🩺 SAĞLIK TAKİBİ</div>
        <div class="top-actions">
            <div class="lang-btn" id="langToggle" title="Dil değiştir">🌐</div>
            <a href="index.html" class="back-link" id="backLink">← Geri</a>
        </div>
    </div>

    <div class="add-area">
        <div class="input-group" style="margin-bottom:10px;">
            <label id="labelType">Ölçüm Tipi</label>
            <select id="measureType">
                <option value="bp">Tansiyon (KB)</option>
                <option value="glucose">Kan Şekeri (BZ)</option>
            </select>
        </div>
        <div class="input-group" style="margin-bottom:10px;">
            <label id="labelDate">Tarih</label>
            <input type="date" id="measureDate">
        </div>
        <div class="input-group" style="margin-bottom:10px;">
            <label id="labelTime">Saat</label>
            <input type="time" id="measureTime">
        </div>
        <div id="bpFields">
            <div class="input-row">
                <div class="input-group">
                    <label id="labelSystolic">Sistolik (Büyük)</label>
                    <input type="number" id="systolic" placeholder="120" value="120">
                </div>
                <div class="input-group">
                    <label id="labelDiastolic">Diyastolik (Küçük)</label>
                    <input type="number" id="diastolic" placeholder="80" value="80">
                </div>
            </div>
            <div class="input-group" style="margin-bottom:10px;">
                <label id="labelPulse">Nabız</label>
                <input type="number" id="pulse" placeholder="72" value="72">
            </div>
        </div>
        <div id="glucoseFields" style="display:none;">
            <div class="input-group" style="margin-bottom:10px;">
                <label id="labelGlucose">Kan Şekeri (mg/dL)</label>
                <input type="number" id="glucose" placeholder="100" value="100">
            </div>
            <div class="input-group" style="margin-bottom:10px;">
                <label id="labelMeal">Öğün Durumu</label>
                <select id="mealStatus">
                    <option value="fasting">Açlık</option>
                    <option value="after">Tokluk (2 saat sonra)</option>
                    <option value="random">Rastgele</option>
                </select>
            </div>
        </div>
        <button class="btn" id="saveBtn">💾 Kaydet</button>
    </div>

    <div class="chart-area" id="chartArea">
        <canvas id="chartCanvas" width="460" height="200"></canvas>
    </div>

    <div class="info-box" id="infoBox">
        📊 Normal değerler: Tansiyon 120/80 mmHg, Nabız 60-100, Açlık şekeri 70-100 mg/dL, Tokluk şekeri <140 mg/dL
    </div>

    <div class="log-list" id="logList">
        <div class="empty-state" id="emptyState">Henüz kayıt yok.</div>
    </div>

    <div class="footer" id="footerText">PACDI Games · Sağlık takip defteri</div>
</div>

<script>
(function() {
    var L = {
        tr: { title:"🩺 SAĞLIK TAKİBİ", back:"← Geri", type:"Ölçüm Tipi", date:"Tarih", time:"Saat", systolic:"Sistolik (Büyük)", diastolic:"Diyastolik (Küçük)", pulse:"Nabız", glucose:"Kan Şekeri (mg/dL)", meal:"Öğün Durumu", save:"💾 Kaydet", empty:"Henüz kayıt yok.", info:"📊 Normal değerler: Tansiyon 120/80 mmHg, Nabız 60-100, Açlık şekeri 70-100 mg/dL, Tokluk şekeri <140 mg/dL", footer:"PACDI Games · Sağlık takip defteri", nextLang:"de" },
        de: { title:"🩺 GESUNDHEITSTRACKER", back:"← Zurück", type:"Messungstyp", date:"Datum", time:"Uhrzeit", systolic:"Systolisch (Oberwert)", diastolic:"Diastolisch (Unterwert)", pulse:"Puls", glucose:"Blutzucker (mg/dL)", meal:"Mahlzeitenstatus", save:"💾 Speichern", empty:"Noch keine Einträge.", info:"📊 Normalwerte: Blutdruck 120/80 mmHg, Puls 60-100, Nüchternzucker 70-100 mg/dL, Nach dem Essen <140 mg/dL", footer:"PACDI Games · Gesundheitstracker", nextLang:"en" },
        en: { title:"🩺 HEALTH TRACKER", back:"← Back", type:"Measurement Type", date:"Date", time:"Time", systolic:"Systolic (Upper)", diastolic:"Diastolic (Lower)", pulse:"Pulse", glucose:"Blood Sugar (mg/dL)", meal:"Meal Status", save:"💾 Save", empty:"No records yet.", info:"📊 Normal values: BP 120/80 mmHg, Pulse 60-100, Fasting sugar 70-100 mg/dL, After meal <140 mg/dL", footer:"PACDI Games · Health Tracker", nextLang:"tr" }
    };
    var currentLang = (navigator.language||'en').toLowerCase().indexOf('de')===0 ? 'de' : (navigator.language||'en').toLowerCase().indexOf('tr')===0 ? 'tr' : 'en';
    var logs = [];

    function loadLogs() {
        var saved = localStorage.getItem('pacdi_health_logs_' + currentLang);
        if (saved) { try { logs = JSON.parse(saved); } catch(e) { logs = []; } }
        else logs = [];
        renderAll();
    }

    function saveLogs() { localStorage.setItem('pacdi_health_logs_' + currentLang, JSON.stringify(logs)); }

    function setLang(lang) {
        currentLang = lang;
        var t = L[lang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('labelType').innerText = t.type;
        document.getElementById('labelDate').innerText = t.date;
        document.getElementById('labelTime').innerText = t.time;
        document.getElementById('labelSystolic').innerText = t.systolic;
        document.getElementById('labelDiastolic').innerText = t.diastolic;
        document.getElementById('labelPulse').innerText = t.pulse;
        document.getElementById('labelGlucose').innerText = t.glucose;
        document.getElementById('labelMeal').innerText = t.meal;
        document.getElementById('saveBtn').innerText = t.save;
        document.getElementById('infoBox').innerText = t.info;
        document.getElementById('footerText').innerText = t.footer;
        loadLogs();
    }

    document.getElementById('measureType').addEventListener('change', function() {
        var isBp = this.value === 'bp';
        document.getElementById('bpFields').style.display = isBp ? 'block' : 'none';
        document.getElementById('glucoseFields').style.display = isBp ? 'none' : 'block';
        drawChart();
    });

    function addLog() {
        var type = document.getElementById('measureType').value;
        var date = document.getElementById('measureDate').value || new Date().toISOString().split('T')[0];
        var time = document.getElementById('measureTime').value || new Date().toTimeString().split(' ')[0].substring(0,5);
        var entry = { type:type, date:date, time:time };

        if (type === 'bp') {
            entry.systolic = parseInt(document.getElementById('systolic').value) || 0;
            entry.diastolic = parseInt(document.getElementById('diastolic').value) || 0;
            entry.pulse = parseInt(document.getElementById('pulse').value) || 0;
        } else {
            entry.glucose = parseInt(document.getElementById('glucose').value) || 0;
            entry.meal = document.getElementById('mealStatus').value;
        }
        logs.unshift(entry);
        if (logs.length > 100) logs.pop();
        saveLogs();
        renderAll();
    }

    function deleteLog(idx) {
        logs.splice(idx, 1);
        saveLogs();
        renderAll();
    }

    function renderLogs() {
        var list = document.getElementById('logList');
        var t = L[currentLang];
        if (logs.length === 0) { list.innerHTML = '<div class="empty-state">' + t.empty + '</div>'; return; }
        list.innerHTML = '';
        for (var i = 0; i < logs.length; i++) {
            var log = logs[i];
            var item = document.createElement('div');
            item.className = 'log-item';
            var html = '<div><div class="log-date">' + log.date + ' ' + log.time + '</div>';
            if (log.type === 'bp') {
                var sysClass = log.systolic > 140 ? 'high' : (log.systolic < 90 ? 'low' : 'normal');
                var diaClass = log.diastolic > 90 ? 'high' : (log.diastolic < 60 ? 'low' : 'normal');
                html += '<span class="log-value ' + sysClass + '">' + log.systolic + '/' + log.diastolic + '</span> mmHg';
                html += ' · Nabız: <span class="log-value">' + log.pulse + '</span>';
            } else {
                var mealText = log.meal === 'fasting' ? 'Açlık' : (log.meal === 'after' ? 'Tokluk' : 'Rastgele');
                var gluClass = log.glucose > 140 ? 'high' : (log.glucose < 70 ? 'low' : 'normal');
                html += '<span class="log-value ' + gluClass + '">' + log.glucose + '</span> mg/dL';
                html += ' · <span class="log-type">' + mealText + '</span>';
            }
            html += '</div><button class="del-log" onclick="window._deleteLog('+i+')">✕</button>';
            item.innerHTML = html;
            list.appendChild(item);
        }
    }

    function drawChart() {
        var canvas = document.getElementById('chartCanvas');
        var ctx = canvas.getContext('2d');
        var type = document.getElementById('measureType').value;
        var w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        var filtered = logs.filter(function(l) { return l.type === type; }).slice(0, 10).reverse();
        if (filtered.length < 2) {
            ctx.fillStyle = '#6c8fb0';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Grafik için en az 2 ölçüm gerekli', w/2, h/2);
            return;
        }

        ctx.strokeStyle = 'rgba(246,180,95,0.3)';
        ctx.lineWidth = 1;
        for (var i = 1; i < 5; i++) {
            var y = (h - 30) * i / 5 + 10;
            ctx.beginPath();
            ctx.moveTo(30, y);
            ctx.lineTo(w - 10, y);
            ctx.stroke();
        }

        var values = filtered.map(function(l) {
            if (type === 'bp') return [l.systolic, l.diastolic];
            else return [l.glucose];
        });

        var maxVal = 0;
        values.forEach(function(v) { v.forEach(function(x) { if (x > maxVal) maxVal = x; }); });
        if (type === 'bp') maxVal = Math.max(maxVal, 160);
        else maxVal = Math.max(maxVal, 200);

        function drawLine(vals, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (var i = 0; i < vals.length; i++) {
                var x = 30 + (w - 40) * i / (vals.length - 1);
                var y = 10 + (h - 30) * (1 - vals[i] / maxVal);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        if (type === 'bp') {
            drawLine(values.map(function(v) { return v[0]; }), '#E74C3C');
            drawLine(values.map(function(v) { return v[1]; }), '#3498DB');
        } else {
            drawLine(values.map(function(v) { return v[0]; }), '#2ECC71');
        }

        ctx.fillStyle = '#9bb7d4';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(maxVal, 28, 14);
        ctx.fillText(Math.round(maxVal/2), 28, h/2 + 4);
        ctx.fillText('0', 28, h - 10);
    }

    function renderAll() {
        renderLogs();
        drawChart();
    }

    window._deleteLog = deleteLog;

    document.getElementById('saveBtn').addEventListener('click', addLog);
    document.getElementById('langToggle').addEventListener('click', function() { setLang(L[currentLang].nextLang); });
    document.getElementById('measureDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('measureTime').value = new Date().toTimeString().split(' ')[0].substring(0,5);
    setLang(currentLang);
})();
</script>
</body>
</html>
