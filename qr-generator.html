<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR Kod Oluşturucu | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); backdrop-filter:blur(2px); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .lang-selector { display:flex; gap:6px; margin-bottom:12px; justify-content:flex-end; }
        .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:3px 10px; border-radius:30px; cursor:pointer; }
        .lang-btn.active { background:#F6B45F; color:#04162E; }
        .qr-area { background:#0a1018; border-radius:28px; padding:24px 16px; margin-bottom:20px; }
        .qr-input { width:100%; padding:14px 16px; border-radius:16px; border:2px solid rgba(246,180,95,0.3); background:#1e2a3a; color:#eaf2fb; font-size:1rem; text-align:center; outline:none; font-family:inherit; margin-bottom:16px; }
        .qr-input:focus { border-color:#F6B45F; }
        .qr-display { display:flex; justify-content:center; margin:20px 0; min-height:200px; align-items:center; }
        .qr-display canvas, .qr-display img { border-radius:16px; background:white; padding:10px; }
        .generate-btn { background:#F6B45F; border:none; font-weight:bold; padding:14px 32px; border-radius:60px; color:#04162E; cursor:pointer; font-size:1rem; }
        .generate-btn:active { transform:scale(0.96); }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo" id="gameTitle">QR KOD</div>
        <a href="index.html" class="back-link" id="backLink">← Geri</a>
    </div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <button class="lang-btn" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <div class="qr-area">
        <input type="text" class="qr-input" id="qrInput" placeholder="Metin veya link girin..." value="https://pacdi.games">
        <button class="generate-btn" id="generateBtn">🔳 QR Kod Oluştur</button>
        <div class="qr-display" id="qrDisplay">
            <span style="color:#9bb7d4;">QR kod burada görünecek</span>
        </div>
    </div>
    <div class="footer" id="footerText">PACDI Games · Hızlı QR kod oluşturucu.</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
</script>
<script>
(function(){
    var langData = {
        tr: { title:"QR KOD", back:"← Geri", generate:"🔳 QR Kod Oluştur", placeholder:"Metin veya link girin...", empty:"QR kod burada görünecek", footer:"PACDI Games · Hızlı QR kod oluşturucu." },
        de: { title:"QR CODE", back:"← Zurück", generate:"🔳 QR Code erstellen", placeholder:"Text oder Link eingeben...", empty:"QR Code erscheint hier", footer:"PACDI Games · Schneller QR Code Generator." },
        en: { title:"QR CODE", back:"← Back", generate:"🔳 Generate QR Code", placeholder:"Enter text or link...", empty:"QR code will appear here", footer:"PACDI Games · Fast QR code generator." }
    };
    var currentLang = "tr";

    function updateLanguage() {
        var t=langData[currentLang];
        document.getElementById('gameTitle').innerText=t.title;
        document.getElementById('backLink').innerText=t.back;
        document.getElementById('generateBtn').innerText=t.generate;
        document.getElementById('qrInput').placeholder=t.placeholder;
        document.getElementById('footerText').innerText=t.footer;
    }

    function setLanguage(lang) {
        currentLang=lang; updateLanguage();
        var btns=document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
    }

    function generateQR() {
        var text = document.getElementById('qrInput').value.trim();
        var display = document.getElementById('qrDisplay');
        display.innerHTML = '';
        if(!text) {
            display.innerHTML = '<span style="color:#9bb7d4;">' + langData[currentLang].empty + '</span>';
            return;
        }
        if(typeof QRCode !== 'undefined') {
            new QRCode(display, {
                text: text,
                width: 200,
                height: 200,
                colorDark: '#04162E',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        } else {
            var img = document.createElement('img');
            img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(text);
            img.alt = 'QR Code';
            img.style.borderRadius = '12px';
            display.appendChild(img);
        }
    }

    document.getElementById('generateBtn').addEventListener('click', generateQR);
    document.getElementById('qrInput').addEventListener('keydown', function(e){ if(e.key==='Enter') generateQR(); });

    var langBtns=document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var l=this.getAttribute('data-lang'); if(l!==currentLang) setLanguage(l); });

    setLanguage('tr');
    generateQR();
})();
</script>
</body>
</html>
