<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Water Sort · Renk Sıralama | PACDI Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-container {
      max-width: 650px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(246, 180, 95, 0.3);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }

    .sub {
      font-size: 0.62rem;
      color: #9bb7d4;
      margin-top: 2px;
    }

    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.78rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a1018;
      border-radius: 60px;
      padding: 7px 16px;
      margin-bottom: 14px;
    }

    .info-box {
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.8rem;
    }

    .info-box span {
      color: #eaf2fb;
    }

    .new-btn {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 5px 14px;
      border-radius: 40px;
      color: #04162E;
      cursor: pointer;
      font-size: 0.78rem;
    }

    .tubes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      justify-items: center;
      margin: 20px 0;
    }

    .tube {
      width: 85px;
      background: #0a1018;
      border-radius: 40px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 2px solid #F6B45F40;
      transition: all 0.1s ease;
      backdrop-filter: blur(2px);
    }

    .tube.selected {
      border: 3px solid #F6B45F;
      background: rgba(246, 180, 95, 0.1);
      transform: scale(1.02);
    }

    .color-unit {
      width: 100%;
      height: 24px;
      border-radius: 20px;
      transition: transform 0.08s;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }

    .empty-slot {
      width: 100%;
      height: 24px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 20px;
      border: 1px dashed #F6B45F30;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      padding: 8px;
      background: #0a1018;
      border-radius: 40px;
      color: #eaf2fb;
      font-weight: bold;
      font-size: 0.8rem;
    }

    .footer {
      text-align: center;
      font-size: 0.6rem;
      color: #6c8fb0;
      margin-top: 12px;
    }

    @media (max-width: 550px) {
      .tube {
        width: 70px;
      }
      .color-unit, .empty-slot {
        height: 20px;
      }
      .tubes-grid {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">WATER SORT</div>
      <div class="sub">PACDI Games · Renk Sıralama</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="info-bar">
    <div class="info-box">📌 Hamle: <span id="moveCount">0</span></div>
    <div class="info-box">🏆 En İyi: <span id="bestScore">—</span></div>
    <button class="new-btn" id="newGameBtn">↺ Yeni Oyun</button>
  </div>

  <div id="tubesContainer" class="tubes-grid"></div>
  <div class="message" id="gameMsg">Bir tüpe dokun → top seç → başka tüpe taşı</div>
  <div class="footer">✔ Aynı renk üst üste eklenir · Boş tüpe her renk gider · Kazanmak için tüm tüpleri tek renk yap</div>
</div>

<script>
  (function() {
    // RENKLER (gold, yeşil, kırmızı, mavi, mor, turkuaz)
    var COLOR_LIST = ["#F6B45F", "#2ECC71", "#E74C3C", "#3498DB", "#9B59B6", "#1ABC9C"];

    var TUBE_COUNT = 6;
    var TUBE_CAP   = 4;

    var tubes = [];          // her tüp bir dizi (renk kodları)
    var selectedTube = null; // seçili tüp indeksi
    var moves = 0;
    var bestScore = 0;
    var gameActive = true;
    var bestKey = "watersort_best_pacdi";

    // DOM elementleri
    var container = document.getElementById('tubesContainer');
    var moveSpan = document.getElementById('moveCount');
    var bestSpan = document.getElementById('bestScore');
    var newGameBtn = document.getElementById('newGameBtn');
    var gameMsgDiv = document.getElementById('gameMsg');

    // En iyi skoru yükle/kaydet
    function loadBest() {
      var saved = localStorage.getItem(bestKey);
      bestScore = saved ? parseInt(saved, 10) : 0;
      bestSpan.innerText = bestScore || '—';
    }
    function saveBest() {
      if (moves < bestScore || bestScore === 0) {
        bestScore = moves;
        localStorage.setItem(bestKey, bestScore);
        bestSpan.innerText = bestScore;
      }
    }

    // Başlangıç dizilimi (rastgele ama çözülebilir olma ihtimali yüksek)
    function initGame() {
      // renk havuzu: her renkten 4 adet (toplam 24 birim)
      var colorPool = [];
      for (var c = 0; c < COLOR_LIST.length; c++) {
        for (var q = 0; q < 4; q++) {
          colorPool.push(COLOR_LIST[c]);
        }
      }
      // karıştır
      for (var i = colorPool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = colorPool[i];
        colorPool[i] = colorPool[j];
        colorPool[j] = temp;
      }

      // tüpleri oluştur (6 tüp, her biri max 4)
      tubes = [];
      for (var t = 0; t < TUBE_COUNT; t++) tubes.push([]);

      // rastgele dağıt (tüplerin 4 kapasitesini aşmadan)
      for (var idx = 0; idx < colorPool.length; idx++) {
        var placed = false;
        var deneme = 0;
        while (!placed && deneme < 50) {
          var rnd = Math.floor(Math.random() * TUBE_COUNT);
          if (tubes[rnd].length < TUBE_CAP) {
            tubes[rnd].push(colorPool[idx]);
            placed = true;
          }
          deneme++;
        }
        if (!placed) {
          for (var k = 0; k < TUBE_COUNT; k++) {
            if (tubes[k].length < TUBE_CAP) {
              tubes[k].push(colorPool[idx]);
              break;
            }
          }
        }
      }

      selectedTube = null;
      moves = 0;
      moveSpan.innerText = "0";
      gameActive = true;
      renderGame();
      gameMsgDiv.innerHTML = "Bir tüpe dokun → top seç → başka tüpe taşı";
    }

    // Görsel güncelleme
    function renderGame() {
      container.innerHTML = '';
      for (var i = 0; i < tubes.length; i++) {
        var tubeData = tubes[i];
        var tubeDiv = document.createElement('div');
        tubeDiv.className = 'tube';
        if (selectedTube === i) tubeDiv.classList.add('selected');
        tubeDiv.setAttribute('data-idx', i);
        // tüpün içindeki renkleri göster (alttan üste)
        for (var slot = 0; slot < TUBE_CAP; slot++) {
          var unitDiv = document.createElement('div');
          if (slot < tubeData.length) {
            unitDiv.className = 'color-unit';
            unitDiv.style.backgroundColor = tubeData[slot];
          } else {
            unitDiv.className = 'empty-slot';
          }
          tubeDiv.appendChild(unitDiv);
        }
        tubeDiv.addEventListener('click', (function(idx) {
          return function() { onTubeClick(idx); };
        })(i));
        container.appendChild(tubeDiv);
      }
    }

    // Hamle geçerlilik kontrolü
    function isValidMove(fromIdx, toIdx) {
      if (fromIdx === toIdx) return false;
      var srcTube = tubes[fromIdx];
      var dstTube = tubes[toIdx];
      if (srcTube.length === 0) return false;          // kaynak boş olamaz
      if (dstTube.length === TUBE_CAP) return false;    // hedef dolu
      if (dstTube.length === 0) return true;            // boş hedefe her şey taşınabilir
      var srcTop = srcTube[srcTube.length - 1];
      var dstTop = dstTube[dstTube.length - 1];
      return (srcTop === dstTop);                       // sadece aynı renk üst üste gelebilir
    }

    // Hamleyi uygula
    function applyMove(fromIdx, toIdx) {
      if (!isValidMove(fromIdx, toIdx)) return false;
      var movedColor = tubes[fromIdx].pop();
      tubes[toIdx].push(movedColor);
      moves++;
      moveSpan.innerText = moves;
      selectedTube = null;
      renderGame();
      return true;
    }

    // Kazanma kontrolü: her dolu tüpün tüm birimleri aynı renk
    function isGameWon() {
      var totalUnits = 0;
      for (var i = 0; i < tubes.length; i++) {
        var tube = tubes[i];
        if (tube.length === 0) continue;
        var firstColor = tube[0];
        for (var j = 1; j < tube.length; j++) {
          if (tube[j] !== firstColor) return false;
        }
        totalUnits += tube.length;
      }
      // toplam birim sayısı 24 olmalı (6 renk × 4)
      return totalUnits === 24;
    }

    // Tüpe tıklama olayı
    function onTubeClick(idx) {
      if (!gameActive) return;

      // seçim yoksa
      if (selectedTube === null) {
        if (tubes[idx].length > 0) {
          selectedTube = idx;
          renderGame();
          gameMsgDiv.innerHTML = "✅ Top seçildi. Hedef tüpe dokun.";
        } else {
          gameMsgDiv.innerHTML = "⚠️ Boş tüp seçemezsin. Önce dolu bir tüp seç.";
        }
        return;
      }

      // zaten seçili var → taşımayı dene
      var success = applyMove(selectedTube, idx);
      if (success) {
        if (isGameWon()) {
          gameActive = false;
          saveBest();
          gameMsgDiv.innerHTML = "🎉 TEBRİKLER! OYUNU KAZANDINIZ! 🎉";
          renderGame();
        } else {
          gameMsgDiv.innerHTML = "✔️ Hamle yapıldı. Devam et.";
        }
      } else {
        // geçersiz hamle
        gameMsgDiv.innerHTML = "❌ Geçersiz hamle! Aynı renk üst üste olmalı veya hedef boş olmalı.";
        selectedTube = null;
        renderGame();
      }
    }

    // Yeni oyun (sıfırla)
    function newGame() {
      initGame();
      gameMsgDiv.innerHTML = "🔄 Yeni oyun başladı. İyi şanslar!";
    }

    newGameBtn.addEventListener('click', newGame);
    loadBest();
    initGame();
  })();
</script>
</body>
</html>
