<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PACDI Dama | PACDI Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#04162E; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .game-container { max-width:500px; width:100%; background:rgba(4,22,46,0.85); border-radius:56px; padding:20px 16px 24px; box-shadow:0 20px 35px rgba(0,0,0,0.5); border:1px solid rgba(246,180,95,0.3); text-align:center; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .logo { font-size:1.3rem; font-weight:800; color:#F6B45F; }
        .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.78rem; background:#0a1018; padding:5px 12px; border-radius:40px; border:1px solid rgba(246,180,95,0.3); }
        .info-bar { display:flex; justify-content:space-between; align-items:center; background:#0a1018; border-radius:40px; padding:7px 16px; margin-bottom:14px; }
        .player-turn { color:#F6B45F; font-weight:bold; font-size:1rem; }
        .new-btn { background:#F6B45F; border:none; font-weight:bold; padding:5px 14px; border-radius:40px; color:#04162E; cursor:pointer; font-size:0.78rem; }
        canvas { display:block; margin:10px auto; border-radius:24px; border:2px solid rgba(246,180,95,0.3); max-width:400px; width:100%; aspect-ratio:1; cursor:pointer; background:#0a1018; }
        .message { color:#F6B45F; font-size:0.9rem; font-weight:bold; min-height:30px; margin:8px 0; }
        .footer { text-align:center; font-size:0.6rem; color:#6c8fb0; margin-top:12px; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <div class="logo">DAMA</div>
        <a href="index.html" class="back-link">← Geri</a>
    </div>
    <div class="info-bar">
        <div class="player-turn" id="turnDisplay">Sıra: <span style="color:#3498DB">Mavi</span></div>
        <button class="new-btn" onclick="resetGame()">↺ Yeni Oyun</button>
    </div>
    <canvas id="boardCanvas" width="400" height="400"></canvas>
    <div class="message" id="message">Sıra Mavi'de</div>
    <div class="footer">PACDI Games · İki kişilik dama, sırayla oynayın.</div>
</div>
<script>
(function(){
    var canvas = document.getElementById('boardCanvas');
    var ctx = canvas.getContext('2d');
    var size = 8;
    var cellSize = canvas.width / size;
    var board = [];
    var currentPlayer = 0;
    var selectedPiece = null;
    var gameOver = false;

    function initBoard() {
        board = [];
        for(var r=0;r<size;r++) {
            board[r] = [];
            for(var c=0;c<size;c++) {
                if(r<3 && (r+c)%2===0) board[r][c] = { player:1, king:false };
                else if(r>4 && (r+c)%2===0) board[r][c] = { player:0, king:false };
                else board[r][c] = null;
            }
        }
    }

    function resetGame() {
        initBoard();
        currentPlayer = 0;
        selectedPiece = null;
        gameOver = false;
        document.getElementById('message').innerText = 'Sıra Mavi\'de';
        document.getElementById('turnDisplay').innerHTML = 'Sıra: <span style="color:#3498DB">Mavi</span>';
        drawBoard();
    }

    function drawBoard() {
        var cs = cellSize;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(var r=0;r<size;r++) {
            for(var c=0;c<size;c++) {
                ctx.fillStyle = (r+c)%2===0 ? '#1e2a3a' : '#2c3e50';
                ctx.fillRect(c*cs, r*cs, cs, cs);
                if(board[r][c]) {
                    ctx.beginPath();
                    ctx.arc(c*cs+cs/2, r*cs+cs/2, cs/2.5, 0, Math.PI*2);
                    ctx.fillStyle = board[r][c].player === 0 ? '#3498DB' : '#E74C3C';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    if(board[r][c].king) {
                        ctx.fillStyle = '#F6B45F';
                        ctx.font = 'bold '+(cs/2)+'px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('★', c*cs+cs/2, r*cs+cs/2);
                    }
                }
            }
        }
        if(selectedPiece) {
            ctx.strokeStyle = '#F6B45F';
            ctx.lineWidth = 3;
            ctx.strokeRect(selectedPiece.c*cs+2, selectedPiece.r*cs+2, cs-4, cs-4);
        }
    }

    function hasJump(r, c) {
        var piece = board[r][c];
        if(!piece) return false;
        var dirs = [[-2,-2],[-2,2],[2,-2],[2,2]];
        if(!piece.king) {
            if(piece.player === 0) dirs = [[-2,-2],[-2,2]];
            else dirs = [[2,-2],[2,2]];
        }
        for(var d=0;d<dirs.length;d++) {
            var tr = r+dirs[d][0], tc = c+dirs[d][1];
            var mr = r+dirs[d][0]/2, mc = c+dirs[d][1]/2;
            if(tr>=0 && tr<size && tc>=0 && tc<size && board[mr] && board[mr][mc] && board[mr][mc].player !== currentPlayer && !board[tr][tc]) return true;
        }
        return false;
    }

    function isValidMove(fr, fc, tr, tc) {
        if(tr<0 || tr>=size || tc<0 || tc>=size) return false;
        if(board[tr][tc]) return false;
        var dr = tr - fr, dc = tc - fc;
        var piece = board[fr][fc];
        if(!piece) return false;
        if(Math.abs(dr) === 1 && Math.abs(dc) === 1) {
            if(!piece.king) {
                if(piece.player === 0 && dr <= 0) return false;
                if(piece.player === 1 && dr >= 0) return false;
            }
            return true;
        }
        if(Math.abs(dr) === 2 && Math.abs(dc) === 2) {
            var mr = fr + dr/2, mc = fc + dc/2;
            if(board[mr] && board[mr][mc] && board[mr][mc].player !== currentPlayer) return true;
        }
        return false;
    }

    function movePiece(fr, fc, tr, tc) {
        var piece = board[fr][fc];
        board[fr][fc] = null;
        board[tr][tc] = piece;
        var wasJump = Math.abs(tr-fr) === 2;
        if(wasJump) {
            var mr = (fr+tr)/2, mc = (fc+tc)/2;
            board[mr][mc] = null;
        }
        if((piece.player===0 && tr===0) || (piece.player===1 && tr===size-1)) piece.king = true;
        if(wasJump && hasJump(tr, tc)) {
            selectedPiece = {r:tr, c:tc};
            return false;
        }
        return true;
    }

    function switchTurn() {
        currentPlayer = 1 - currentPlayer;
        document.getElementById('message').innerText = 'Sıra ' + (currentPlayer===0?'Mavi':'Kırmızı') + '\'de';
        document.getElementById('turnDisplay').innerHTML = 'Sıra: <span style="color:' + (currentPlayer===0?'#3498DB':'#E74C3C') + '">' + (currentPlayer===0?'Mavi':'Kırmızı') + '</span>';
    }

    function checkWin() {
        var p0=0, p1=0, hasMove0=false, hasMove1=false;
        for(var r=0;r<size;r++) {
            for(var c=0;c<size;c++) {
                if(board[r][c]) {
                    if(board[r][c].player===0) p0++;
                    if(board[r][c].player===1) p1++;
                    var savedPlayer = currentPlayer;
                    currentPlayer = board[r][c].player;
                    if(hasJump(r,c)) {
                        if(board[r][c].player===0) hasMove0=true;
                        else hasMove1=true;
                    } else {
                        var dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
                        if(board[r][c].king) dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
                        else if(board[r][c].player===0) dirs = [[-1,-1],[-1,1]];
                        else dirs = [[1,-1],[1,1]];
                        for(var d=0;d<dirs.length;d++) {
                            var tr=r+dirs[d][0], tc=c+dirs[d][1];
                            if(tr>=0 && tr<size && tc>=0 && tc<size && !board[tr][tc]) {
                                if(board[r][c].player===0) hasMove0=true;
                                else hasMove1=true;
                            }
                        }
                    }
                    currentPlayer = savedPlayer;
                }
            }
        }
        if(p0===0 || !hasMove0) { gameOver=true; document.getElementById('message').innerText = '🎉 Kırmızı kazandı!'; }
        if(p1===0 || !hasMove1) { gameOver=true; document.getElementById('message').innerText = '🎉 Mavi kazandı!'; }
    }

    canvas.addEventListener('click', function(e) {
        if(gameOver) return;
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var cx = (e.clientX - rect.left) * scaleX;
        var cy = (e.clientY - rect.top) * scaleY;
        var c = Math.floor(cx / cellSize);
        var r = Math.floor(cy / cellSize);
        if(selectedPiece) {
            if(isValidMove(selectedPiece.r, selectedPiece.c, r, c)) {
                var turnEnded = movePiece(selectedPiece.r, selectedPiece.c, r, c);
                if(turnEnded) {
                    selectedPiece = null;
                    checkWin();
                    if(!gameOver) switchTurn();
                }
            } else {
                selectedPiece = null;
                if(board[r] && board[r][c] && board[r][c].player === currentPlayer) selectedPiece = {r:r, c:c};
            }
        } else {
            if(board[r] && board[r][c] && board[r][c].player === currentPlayer) selectedPiece = {r:r, c:c};
        }
        drawBoard();
    });

    resetGame();
})();
</script>
</body>
</html>
