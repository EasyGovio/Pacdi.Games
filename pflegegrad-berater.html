            pdfBtn: "📄 Als PDF speichern / drucken"
        },
        tr: {
            title: "BAKIM DERECESİ DANIŞMANI PRO",
            back: "← Geri",
            steps: "Adım {0} / {1}",
            footer: "PACDI Games · Almanya'da birlikte güçlüyüz",
            resultTitle1: "Tahmini bakım dereceniz: {0}",
            resultTitle2: "Bakım derecesi yok",
            pflegegeld: "Bakım parası (aylık): {0} €",
            sachleistungen: "Bakım hizmet yardımı (aylık): {0} €",
            kombinierbar: "Bu yardımlar kombine edilebilir (Kombinationsleistung). Örneğin %40 hizmet, %60 nakit olarak alınabilir.",

            pdfBtn: "📄 PDF olarak kaydet / yazdır"
        },
        en: {
            title: "CARE LEVEL ADVISOR PRO",
            back: "← Back",
            steps: "Step {0} of {1}",
            footer: "PACDI Games · Together strong in Germany",
            resultTitle1: "Your estimated care level: {0}",
            resultTitle2: "No care level",
            pflegegeld: "Care allowance (monthly): {0} €",
            sachleistungen: "Care benefits in kind (monthly): {0} €",
            kombinierbar: "These benefits can be combined (Kombinationsleistung). E.g. 40% as services, 60% as cash.",
            entlastung: "Relief amount: 125 € monthly",
            nbaInfo: "This preliminary assessment is based on simplified questions. The MDK uses 6 modules (mobility, cognitive abilities, self-care, etc.) with a 0–100 point system.",
            widerspruchTitle: "Filing an Objection",
            widerspruchText: "If your application was rejected, click the button below to view a sample objection letter.",
            widerspruchBtn: "📝 Show sample objection",
            copyBtn: "📋 Copy text",
            copied: "✅ Copied!",
            dilekceMuster: "Objection against the care insurance decision\n\nDear Sir or Madam,\n\nI hereby object to your decision dated [date], which set my care level at [X].\n\nReason:\n- The limitations in mobility, self-care and cognitive abilities were not sufficiently taken into account.\n- I request a re-assessment by the MDK.\n\nSincerely,\n[Name]",
            gerichtTitle: "Social Court",
            gerichtText: "If your objection is rejected, you can sue at the Social Court. Seek support from a social association (VdK, SoVD) or a lawyer.",
            videoTitle: "🎬 Important Tip: Preparing for the MDK Visit",
            videoText: "Watch our video: \"How to prepare your home for the MDK visit\" – many applications fail due to small details.",
            videoLinkText: "Watch video (YouTube)",
            communityTitle: "Community Support",
            communityText: "Many Turkish retirees in Germany are members of a pensioners' association (annual fee 60–70 €) or a community like DİTİB. These communities offer volunteer advice. You are not alone.",
            pdfBtn: "📄 Save as PDF / Print"
        }
    };
    var currentLang = 'de';
    var currentStep = 0;
    var answers = {};
    var questions = [
        { question:"Können Sie sich ohne Hilfe waschen und duschen?", opts:["Ja, ohne Probleme","Nur mit leichter Hilfe","Nur mit starker Hilfe","Überhaupt nicht"], key:"waschen", values:[0,1,2,3] },
        { question:"Können Sie sich ohne Hilfe an- und ausziehen?", opts:["Ja, ohne Probleme","Nur mit leichter Hilfe","Nur mit starker Hilfe","Überhaupt nicht"], key:"kleiden", values:[0,1,2,3] },
        { question:"Können Sie ohne Hilfe essen und trinken?", opts:["Ja, ohne Probleme","Nur mit leichter Hilfe","Nur mit starker Hilfe","Überhaupt nicht"], key:"ernaehrung", values:[0,1,2,3] },
        { question:"Können Sie ohne Hilfe aufstehen und ins Bett gehen?", opts:["Ja, ohne Probleme","Nur mit leichter Hilfe","Nur mit starker Hilfe","Überhaupt nicht"], key:"mobilitaet", values:[0,1,2,3] },
        { question:"Haben Sie Schwierigkeiten, Ihren Alltag zu strukturieren (z.B. Termine einhalten, Einkaufen planen)?", opts:["Keine Schwierigkeiten","Geringe Schwierigkeiten","Deutliche Schwierigkeiten","Sehr große Schwierigkeiten"], key:"alltag", values:[0,1,2,3] },
        { question:"Haben Sie kognitive Einschränkungen (z.B. Gedächtnis, Orientierung)?", opts:["Keine Einschränkungen","Leichte Vergesslichkeit","Deutliche Gedächtnislücken","Schwere Demenz"], key:"kognition", values:[0,1,2,3] }
    ];
    var totalSteps = questions.length;

    function updateLanguage() {
        var t = langData[currentLang];
        document.getElementById('gameTitle').innerText = t.title;
        document.getElementById('backLink').innerText = t.back;
        document.getElementById('footerText').innerText = t.footer;
        document.getElementById('backBtn').innerText = t.back;
    }
    function setLanguage(lang) {
        currentLang = lang; updateLanguage();
        var btns = document.querySelectorAll('.lang-btn');
        for(var i=0;i<btns.length;i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-lang')===lang);
        if(currentStep < totalSteps) renderQuestion(); else renderResult();
    }
    function renderQuestion() {
        var q = questions[currentStep];
        var t = langData[currentLang];
        document.getElementById('stepIndicator').innerText = t.steps.replace('{0}',currentStep+1).replace('{1}',totalSteps);
        document.getElementById('questionText').innerText = q.question;
        var grid = document.getElementById('optionsGrid'); grid.innerHTML = '';
        for(var i=0;i<q.opts.length;i++) {
            var btn = document.createElement('button'); btn.className='opt-btn'; btn.innerText=q.opts[i];
            btn.addEventListener('click', (function(key,value){ return function(){
                answers[key]=value; currentStep++;
                if(currentStep<totalSteps) renderQuestion(); else renderResult();
            }; })(q.key, q.values[i]));
            grid.appendChild(btn);
        }
        document.getElementById('backBtn').style.display = currentStep>0 ? 'inline-block' : 'none';
    }
    function renderResult() {
        var t = langData[currentLang];
        var totalScore = 0;
        for(var key in answers) totalScore += answers[key];
        var pflegegrad = 0;
        if(totalScore >= 1 && totalScore <= 4) pflegegrad = 1;
        else if(totalScore >= 5 && totalScore <= 8) pflegegrad = 2;
        else if(totalScore >= 9 && totalScore <= 12) pflegegrad = 3;
        else if(totalScore >= 13 && totalScore <= 15) pflegegrad = 4;
        else if(totalScore >= 16) pflegegrad = 5;
        var gelds = {
            pflegegeld: [0, 316, 545, 728, 901, 990],
            sachleistungen: [0, 761, 1363, 1693, 2099, 2396]
        };

        var html = '<div class="result-box" id="printArea">';
        if(pflegegrad > 0) {
            html += '<div class="result-title">' + t.resultTitle1.replace('{0}', pflegegrad) + '</div>';
            html += '<div class="result-detail">';
            html += '● ' + t.pflegegeld.replace('{0}', gelds.pflegegeld[pflegegrad]) + '<br>';
            html += '● ' + t.sachleistungen.replace('{0}', gelds.sachleistungen[pflegegrad]) + '<br>';
            html += '● ' + t.entlastung + '</div>';
            html += '<div class="info-badge">🔀 ' + t.kombinierbar + '</div>';
        } else {
            html += '<div class="result-title">' + t.resultTitle2 + '</div>';
            html += '<div class="result-detail">Basierend auf Ihren Antworten konnte kein Pflegegrad festgestellt werden.</div>';
        }
        html += '<div class="info-badge">📋 ' + t.nbaInfo + '</div>';

        // Video tavsiyesi
        html += '<div class="video-box"><strong>'+t.videoTitle+'</strong><br>'+t.videoText+'<br>';
        html += '<a href="https://youtube.com/@PACDI" target="_blank" class="video-link">▶ '+t.videoLinkText+'</a></div>';

        // Dilekçe
        html += '<div class="warning-box"><strong>⚠ ' + t.widerspruchTitle + ':</strong><br>' + t.widerspruchText + '</div>';
        html += '<div class="btn-group">';
        html += '<button class="action-btn outline" onclick="toggleDilekce()">' + t.widerspruchBtn + '</button>';
        html += '<button class="copy-btn" onclick="copyDilekce()">' + t.copyBtn + '</button>';
        html += '</div>';
        html += '<div class="dilekce-box" id="dilekceBox" style="display:none;">' + t.dilekceMuster + '</div>';

        html += '<div class="warning-box"><strong>⚖ ' + t.gerichtTitle + ':</strong><br>' + t.gerichtText + '</div>';
        html += '<div class="community-box"><strong>🤝 ' + t.communityTitle + ':</strong><br>' + t.communityText + '</div>';
        html += '<button class="action-btn" onclick="window.print()">' + t.pdfBtn + '</button>';
        html += '<button class="back-btn" onclick="resetBerater()">Wiederholen</button>';
        html += '</div>';
        document.getElementById('questionArea').innerHTML = html;
        document.getElementById('backBtn').style.display = 'none';
    }

    window.toggleDilekce = function() {
        var box = document.getElementById('dilekceBox');
        if(box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
    };

    window.copyDilekce = function() {
        var t = langData[currentLang];
        var text = t.dilekceMuster;
        if(navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function(){
                alert(t.copied);
            });
        } else {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert(t.copied);
        }
    };

    window.resetBerater = function() {
        currentStep = 0; answers = {};
        document.getElementById('questionArea').innerHTML = '<div class="step-indicator" id="stepIndicator"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><button class="back-btn" id="backBtn" style="display:none;">← Zurück</button>';
        updateLanguage(); renderQuestion();
    };

    document.getElementById('backBtn').addEventListener('click', function(){ if(currentStep>0){ currentStep--; renderQuestion(); } });
    var langBtns = document.querySelectorAll('.lang-btn');
    for(var i=0;i<langBtns.length;i++) langBtns[i].addEventListener('click', function(){ var lang=this.getAttribute('data-lang'); if(lang!==currentLang) setLanguage(lang); });

    setLanguage('de'); renderQuestion();
})();
</script>

<script>
(function(){
  var pageTitle = (document.title.split('|')[0] || document.title).trim();
  var pageUrl = window.location.href;
  var shareText = 'Bu ' + pageTitle + ' aracını faydalı buldum, senin de işine yarayabilir:';

  var bar = document.getElementById('pacdiShareBar');
  if (!bar) return;
  bar.innerHTML =
    '<div class="pacdi-share-label">🔗 Bu aracı paylaş</div>' +
    '<div class="pacdi-share-btns">' +
      '<button class="pacdi-share-btn" id="pacdiShareNative" style="display:none;">📤 Paylaş</button>' +
      '<a class="pacdi-share-btn" target="_blank" rel="noopener" href="https://api.whatsapp.com/send?text=' + encodeURIComponent(shareText + ' ' + pageUrl) + '">💬 WhatsApp</a>' +
      '<a class="pacdi-share-btn" target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(pageUrl) + '">𝕏</a>' +
      '<a class="pacdi-share-btn" target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(pageUrl) + '">Facebook</a>' +
      '<a class="pacdi-share-btn" target="_blank" rel="noopener" href="https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(pageUrl) + '">LinkedIn</a>' +
      '<button class="pacdi-share-btn" id="pacdiShareCopy">🔗 Kopyala</button>' +
    '</div>';

  if (navigator.share) {
    var nativeBtn = document.getElementById('pacdiShareNative');
    nativeBtn.style.display = 'inline-flex';
    nativeBtn.onclick = function(){
      navigator.share({ title: pageTitle, text: shareText, url: pageUrl }).catch(function(){});
    };
  }

  var copyBtn = document.getElementById('pacdiShareCopy');
  copyBtn.onclick = function(){
    navigator.clipboard.writeText(pageUrl).then(function(){
      var old = copyBtn.textContent;
      copyBtn.textContent = '✓ Kopyalandı!';
      setTimeout(function(){ copyBtn.textContent = old; }, 2000);
    }).catch(function(){});
  };
})();
</script>

<script>
(function() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isInStandalone = ('standalone' in navigator && navigator.standalone);
  var shown = sessionStorage.getItem('pwa-banner-shown');
  if (shown || isInStandalone) return;

  // iOS Safari — manuel yönlendirme
  if (isIOS) {
    setTimeout(function() {
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:14px 16px;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
          '<div>' +
            '<div style="color:#F6B45F;font-size:0.82rem;font-weight:700;margin-bottom:4px;">📲 Ana ekrana ekle</div>' +
            '<div style="color:#b0b5bf;font-size:0.75rem;line-height:1.5;">Safari&#39;de <strong style="color:#eaf2fb;">&#11015; Paylaş</strong> butonuna bas, ardından <strong style="color:#eaf2fb;">Ana Ekrana Ekle</strong> seçeneğini seç.</div>' +
            '<div style="color:#4a6a88;font-size:0.68rem;margin-top:4px;">&#9432; iOS&#39;ta otomatik kurulum desteklenmiyor — bu adım gerekli.</div>' +
          '</div>' +
          '<button onclick="document.getElementById(&#39;pwa-banner&#39;).remove();sessionStorage.setItem(&#39;pwa-banner-shown&#39;,&#39;1&#39;)" style="background:transparent;border:none;color:#7a9ab8;font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>' +
        '</div>';
      document.body.appendChild(bar);
      sessionStorage.setItem('pwa-banner-shown', '1');
    }, 3000);
    return;
  }

  // Android / Desktop Chrome — otomatik install prompt
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(function() {
      if (!deferredPrompt) return;
      var bar = document.createElement('div');
      bar.id = 'pwa-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#04162E;border-top:2px solid #F6B45F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui;';
      bar.innerHTML =
        '<span style="color:#eaf2fb;font-size:0.85rem;">📲 Ana ekrana ekle &mdash; daha hızlı aç!</span>' +
        '<div style="display:flex;gap:8px;">' +
          '<button onclick="installPWA()" style="background:#F6B45F;border:none;color:#04162E;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.82rem;">Ekle</button>' +
          '<button onclick="document.getElementById(&#39;pwa-banner&#39;).remove();sessionStorage.setItem(&#39;pwa-banner-shown&#39;,&#39;1&#39;)" style="background:transparent;border:1px solid rgba(246,180,95,0.3);color:#7a9ab8;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.82rem;">Sonra</button>' +
        '</div>';
      document.body.appendChild(bar);
    }, 3000);
  });

  window.installPWA = function() {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(){ deferredPrompt=null; }); }
    var b = document.getElementById('pwa-banner'); if (b) b.remove();
    sessionStorage.setItem('pwa-banner-shown', '1');
  };
})();
</script>
