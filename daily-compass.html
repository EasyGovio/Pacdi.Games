<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Daily Compass | PACDI Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #04162E;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-container {
      max-width: 500px;
      width: 100%;
      background: #1e2a3a;
      border-radius: 48px;
      padding: 22px 20px 28px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(246, 180, 95, 0.3);
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #F6B45F;
    }

    .sub {
      font-size: 0.62rem;
      color: #9bb7d4;
      margin-top: 2px;
    }

    .back-link {
      color: #F6B45F;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.78rem;
      background: #0a1018;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .lang-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .lang-btn {
      background: #0a1018;
      color: #F6B45F;
      border: 1px solid #F6B45F;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #F6B45F;
      color: #04162E;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0a1018;
      border-radius: 40px;
      padding: 7px 16px;
      margin-bottom: 14px;
    }

    .info-box {
      color: #F6B45F;
      font-weight: bold;
      font-size: 0.78rem;
    }

    .info-box span {
      color: #eaf2fb;
    }

    .new-btn {
      background: #F6B45F;
      border: none;
      font-weight: bold;
      padding: 5px 14px;
      border-radius: 40px;
      color: #04162E;
      cursor: pointer;
      font-size: 0.78rem;
    }

    #instruction {
      font-size: 1.2rem;
      margin-bottom: 20px;
      padding: 8px;
      background: #0a1018;
      border-radius: 40px;
      color: #eaf2fb;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
    }

    .compass-container {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto 20px;
      border: 6px solid #F6B45F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(246, 180, 95, 0.2);
      background: rgba(10, 16, 24, 0.4);
    }

    .direction {
      position: absolute;
      font-weight: bold;
      font-size: 1.3rem;
      color: #F6B45F;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    }

    .n {
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .s {
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .w {
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .o {
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    #needle {
      width: 10px;
      height: 120px;
      background: linear-gradient(to bottom, #E74C3C 50%, #eaf2fb 50%);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform-origin: center center;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 20px 0 16px;
    }

    .btn-move {
      background: #1e2a3a;
      border: 2px solid #1ABC9C;
      color: #1ABC9C;
      padding: 16px 20px;
      font-size: 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.05s linear;
      touch-action: manipulation;
    }

    .btn-move:active {
      background: #1ABC9C;
      color: #04162E;
      transform: scale(0.96);
    }

    #feedback {
      font-size: 0.9rem;
      margin: 12px 0 8px;
      min-height: 40px;
      color: #2ECC71;
      font-weight: bold;
    }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #F6B45F;
    }

    .score-row span {
      color: #eaf2fb;
    }

    .footer {
      text-align: center;
      font-size: 0.6rem;
      color: #6c8fb0;
      margin-top: 12px;
    }

    @media (max-width: 550px) {
      .compass-container {
        width: 220px;
        height: 220px;
      }
      #needle {
        height: 100px;
      }
      .btn-move {
        padding: 12px 16px;
        font-size: 1rem;
      }
      .direction {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div>
      <div class="logo">DAILY COMPASS</div>
      <div class="sub">PACDI Games · Yön Bulma</div>
    </div>
    <a href="index.html" class="back-link">← Geri</a>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" data-lang="TR">TR</button>
    <button class="lang-btn" data-lang="DE">DE</button>
    <button class="lang-btn" data-lang="EN">EN</button>
  </div>

  <div class="info-bar">
    <div class="info-box">🎯 Doğru: <span id="scoreNum">0</span></div>
    <div class="info-box">🏆 En İyi: <span id="bestNum">—</span></div>
    <button class="new-btn" id="newBtn">↺ Yeni Oyun</button>
  </div>

  <div id="instruction">Hazırlanıyor...</div>

  <div class="compass-container">
    <div class="direction n">N</div>
    <div class="direction s">S</div>
    <div class="direction w">W</div>
    <div class="direction o">E</div>
    <div id="needle"></div>
  </div>

  <div id="feedback"></div>

  <div class="controls">
    <button class="btn-move" id="leftBtn">← SOL</button>
    <button class="btn-move" id="rightBtn">SAĞ →</button>
  </div>

  <div class="score-row">
    <div>📌 Hedef yönü bul, iğneyi çevir</div>
  </div>
  <div class="footer">Her doğru +1 puan · Hızlı ve doğru çevir</div>
</div>

<script>
  (function() {
    var texts = {
      TR: {
        instruct: "İğneyi şu yöne çevir:",
        success: "✓ Harika! +1 puan",
        retry: "❌ Tekrar deneyelim...",
        wait: "Hazırlanıyor...",
        directions: { N: "Kuzey (N)", E: "Doğu (E)", S: "Güney (S)", W: "Batı (W)" }
      },
      DE: {
        instruct: "Drehe die Nadel nach:",
        success: "✓ Hervorragend! +1 Punkt",
        retry: "❌ Versuchen wir es noch einmal...",
        wait: "Vorbereitung...",
        directions: { N: "Norden (N)", E: "Osten (O)", S: "Süden (S)", W: "Westen (W)" }
      },
      EN: {
        instruct: "Turn the needle to:",
        success: "✓ Great! +1 point",
        retry: "❌ Let's try again...",
        wait: "Preparing...",
        directions: { N: "North (N)", E: "East (E)", S: "South (S)", W: "West (W)" }
      }
    };

    var currentLang = "TR";
    var currentRotation = 0, targetAngle = 0, score = 0, bestScore = 0, isLocked = false, timeoutId = null;
    var DIRECTIONS = [{ angle: 0, key: "N" }, { angle: 90, key: "E" }, { angle: 180, key: "S" }, { angle: 270, key: "W" }];
    var instructionEl = document.getElementById('instruction'), feedbackEl = document.getElementById('feedback'), needleEl = document.getElementById('needle');
    var scoreSpan = document.getElementById('scoreNum'), bestSpan = document.getElementById('bestNum'), leftBtn = document.getElementById('leftBtn'), rightBtn = document.getElementById('rightBtn'), newBtn = document.getElementById('newBtn'), langBtns = document.querySelectorAll('.lang-btn');

    function loadBest() { var s = localStorage.getItem('dailycompass_best'); bestScore = s ? parseInt(s,10) : 0; bestSpan.textContent = bestScore > 0 ? bestScore : '—'; }
    function saveBest() { if (score > bestScore) { bestScore = score; localStorage.setItem('dailycompass_best', bestScore); bestSpan.textContent = bestScore; } }
    function newTarget() { var r = Math.floor(Math.random() * DIRECTIONS.length); targetAngle = DIRECTIONS[r].angle; var dirKey = DIRECTIONS[r].key; instructionEl.innerHTML = texts[currentLang].instruct + ' <strong style="color:#F6B45F;">' + texts[currentLang].directions[dirKey] + '</strong>'; }
    function resetGame() { if (timeoutId) clearTimeout(timeoutId); isLocked = false; score = 0; scoreSpan.textContent = "0"; currentRotation = 0; needleEl.style.transform = "rotate(0deg)"; feedbackEl.innerHTML = ""; newTarget(); }
    function correctAnswer() { if (isLocked) return; isLocked = true; score++; scoreSpan.textContent = score; saveBest(); feedbackEl.innerHTML = texts[currentLang].success; feedbackEl.style.color = "#2ECC71"; timeoutId = setTimeout(function() { isLocked = false; feedbackEl.innerHTML = ""; newTarget(); timeoutId = null; }, 1200); }
    function rotate(degDelta) { if (isLocked) return; currentRotation += degDelta; var norm = ((currentRotation % 360) + 360) % 360; needleEl.style.transform = "rotate(" + norm + "deg)"; if (norm === targetAngle) correctAnswer(); }
    function newGame() { if (timeoutId) clearTimeout(timeoutId); isLocked = false; score = 0; scoreSpan.textContent = "0"; currentRotation = 0; needleEl.style.transform = "rotate(0deg)"; feedbackEl.innerHTML = ""; loadBest(); newTarget(); }
    function setLanguage(lang) { currentLang = lang; for (var i = 0; i < langBtns.length; i++) { var btn = langBtns[i]; if (btn.getAttribute('data-lang') === lang) btn.classList.add('active'); else btn.classList.remove('active'); } var currentTargetKey = null; for (var j = 0; j < DIRECTIONS.length; j++) if (DIRECTIONS[j].angle === targetAngle) currentTargetKey = DIRECTIONS[j].key; if (currentTargetKey) instructionEl.innerHTML = texts[currentLang].instruct + ' <strong style="color:#F6B45F;">' + texts[currentLang].directions[currentTargetKey] + '</strong>'; else instructionEl.innerHTML = texts[currentLang].wait; if (feedbackEl.innerHTML.indexOf("Harika") !== -1 || feedbackEl.innerHTML.indexOf("Hervorragend") !== -1 || feedbackEl.innerHTML.indexOf("Great") !== -1) feedbackEl.innerHTML = texts[currentLang].success; else if (feedbackEl.innerHTML.indexOf("Tekrar") !== -1 || feedbackEl.innerHTML.indexOf("Versuchen") !== -1 || feedbackEl.innerHTML.indexOf("again") !== -1) feedbackEl.innerHTML = texts[currentLang].retry; }
    leftBtn.addEventListener('click', function() { rotate(-90); }); leftBtn.addEventListener('touchstart', function(e) { e.preventDefault(); rotate(-90); });
    rightBtn.addEventListener('click', function() { rotate(90); }); rightBtn.addEventListener('touchstart', function(e) { e.preventDefault(); rotate(90); });
    newBtn.addEventListener('click', newGame);
    for (var i = 0; i < langBtns.length; i++) { langBtns[i].addEventListener('click', function() { var lang = this.getAttribute('data-lang'); setLanguage(lang); }); }
    loadBest(); newTarget(); currentRotation = 0; needleEl.style.transform = "rotate(0deg)"; feedbackEl.innerHTML = "";
  })();
</script>
</body>
</html>
