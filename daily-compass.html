<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Günlük Pusula | PACDI Games</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
    body { background:#04162E; font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif; min-height:100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    .game-container { max-width: 480px; width:100%; background: rgba(4,22,46,0.85); border-radius: 48px; padding: 24px 20px; box-shadow: 0 20px 35px rgba(0,0,0,0.5); backdrop-filter: blur(4px); border: 1px solid rgba(246,180,95,0.3); }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; }
    .logo { font-size: 1.4rem; font-weight: 800; color: #F6B45F; letter-spacing: -0.3px; }
    .back-link { color:#F6B45F; text-decoration:none; font-weight:bold; font-size:0.8rem; background:#0a1018; padding:6px 14px; border-radius:40px; }
    .lang-selector { display:flex; gap:8px; justify-content:flex-end; margin-bottom: 16px; }
    .lang-btn { background:#0a1018; border:1px solid #F6B45F; color:#F6B45F; font-size:0.7rem; padding:4px 12px; border-radius:30px; cursor:pointer; }
    .lang-btn.active { background:#F6B45F; color:#04162E; }
    .date-area { background:#0a1018; border-radius: 24px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .hicri-date { font-size: 1.6rem; color: #F6B45F; font-weight: bold; }
    .miladi-date { font-size: 0.9rem; color: #9bb7d4; margin-top: 4px; }
    .prayer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .prayer-card { background: #0a1018; border-radius: 20px; padding: 16px 12px; text-align: center; border: 1px solid rgba(246,180,95,0.2); }
    .prayer-name { font-size: 0.8rem; color: #6c8fb0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .prayer-time { font-size: 1.5rem; font-weight: 800; color: #F6B45F; }
    .verse-box { background: linear-gradient(145deg, rgba(246,180,95,0.1), rgba(10,16,24,0.8)); border: 1px solid rgba(246,180,95,0.3); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    .verse-text { font-size: 0.95rem; color: #eaf2fb; line-height: 1.6; font-style: italic; margin-bottom: 12px; }
    .verse-source { font-size: 0.75rem; color: #F6B45F; text-align: right; }
    .compass-area { text-align: center; margin-bottom: 20px; }
    .compass-circle { width: 80px; height: 80px; border-radius: 50%; background: #0a1018; margin: 10px auto; display: flex; align-items: center; justify-content: center; border: 2px solid #F6B45F; position: relative; }
    .compass-needle { width: 4px; height: 30px; background: #F6B45F; border-radius: 2px; transform-origin: bottom; }
    .footer { text-align: center; color: #6c8fb0; font-size: 0.65rem; margin-top: 12px; }
  </style>
</head>
<body>
<div class="game-container">
  <div class="top-bar">
    <div class="logo" id="gameTitle">GÜNLÜK PUSULA</div>
    <a href="index.html" class="back-link" id="backLink">← Geri</a>
  </div>
  <div class="lang-selector" id="langSelector">
    <button class="lang-btn active" data-lang="tr">TR</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>

  <div class="date-area">
    <div class="hicri-date" id="hicriDate">1 Şaban 1447</div>
    <div class="miladi-date" id="miladiDate">26 Nisan 2026 Cumartesi</div>
  </div>

  <div class="prayer-grid" id="prayerGrid">
    <div class="prayer-card"><div class="prayer-name">İmsak</div><div class="prayer-time" id="imsak">--:--</div></div>
    <div class="prayer-card"><div class="prayer-name">Güneş</div><div class="prayer-time" id="gunes">--:--</div></div>
    <div class="prayer-card"><div class="prayer-name">Öğle</div><div class="prayer-time" id="ogle">--:--</div></div>
    <div class="prayer-card"><div class="prayer-name">İkindi</div><div class="prayer-time" id="ikindi">--:--</div></div>
    <div class="prayer-card"><div class="prayer-name">Akşam</div><div class="prayer-time" id="aksam">--:--</div></div>
    <div class="prayer-card"><div class="prayer-name">Yatsı</div><div class="prayer-time" id="yatsi">--:--</div></div>
  </div>

  <div class="verse-box">
    <div class="verse-text" id="verseText">"Allah sabredenlerle beraberdir."</div>
    <div class="verse-source" id="verseSource">Bakara 2/153</div>
  </div>

  <div class="compass-area">
    <div class="compass-circle">
      <div class="compass-needle" id="compassNeedle" style="transform: rotate(135deg);"></div>
    </div>
    <div style="color:#9bb7d4; font-size:0.8rem; margin-top:6px;" id="cityName">Berlin</div>
  </div>

  <div class="footer" id="footerText">Günlük Pusula · PACDI Games</div>
</div>

<script>
  (function() {
    // Simulated Data (Berlin for Demo)
    var currentCity = "Berlin";
    var dailyPrayers = {
      imsak: "04:12", gunes: "06:05", ogle: "13:10", ikindi: "16:55", aksam: "20:05", yatsi: "21:48"
    };
    
    function updateDisplay() {
      var now = new Date();
      var options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('miladiDate').innerText = now.toLocaleDateString('tr-TR', options);
      
      // Update prayer times (static for now, will be dynamic later)
      document.getElementById('imsak').innerText = dailyPrayers.imsak;
      document.getElementById('gunes').innerText = dailyPrayers.gunes;
      document.getElementById('ogle').innerText = dailyPrayers.ogle;
      document.getElementById('ikindi').innerText = dailyPrayers.ikindi;
      document.getElementById('aksam').innerText = dailyPrayers.aksam;
      document.getElementById('yatsi').innerText = dailyPrayers.yatsi;
    }

    updateDisplay();
    
    // Language Handling
    var langData = {
      tr: { title: "GÜNLÜK PUSULA", back: "← Geri", footer: "Günlük Pusula · PACDI Games" },
      de: { title: "TAGES KOMPASS", back: "← Zurück", footer: "Tageskompass · PACDI Games" },
      en: { title: "DAILY COMPASS", back: "← Back", footer: "Daily Compass · PACDI Games" }
    };
    var currentLang = "tr";
    
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var lang = this.getAttribute('data-lang');
        document.getElementById('gameTitle').innerText = langData[lang].title;
        document.getElementById('backLink').innerText = langData[lang].back;
        document.getElementById('footerText').innerText = langData[lang].footer;
        document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
      });
    });
  })();
</script>
</body>
</html>
